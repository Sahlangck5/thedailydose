<!DOCTYPE html>
<html lang="en">
<head>
  <!-- PWA Icon Setup -->
  <link rel="apple-touch-icon" href="https://drive.google.com/thumbnail?id=1HaI-1_J2JvgLHV1_VkLUno4-rlWEozHv&sz=w1000">
  <link rel="icon" type="image/png" href="https://drive.google.com/thumbnail?id=1HaI-1_J2JvgLHV1_VkLUno4-rlWEozHv&sz=w1000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Daily Dose">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" id="pwa-manifest">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Dose</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#FDF6EC;--card:#FFFDF8;--brd:#EDE0CC;
  --txt:#3D2B1F;--txt2:#8B7355;--txt3:#C4A882;
  --ibg:#FFF9F2;--ibrd:#DDD0B8;--sbg:#F5EDE0;--stxt:#8B7355;
  --hdr:#FFFDF8;--shad:rgba(139,100,60,.1);
  --grn:#7BAB8B;--grn-l:#EAF4ED;--grn-b:#B8D4BE;
  --rose:#D4A0A0;--rose-l:#FBF0F0;--rose-b:#E8C4C4;
  --blue:#90B8D8;--blue-l:#EBF4FB;
  --peach:#F0B898;--peach-l:#FEF4EC;
  --lav:#B8A4D8;--lav-l:#F5F0FC;
}
body.dark{
  /* Deep Ghibli night sky */
  --bg:#0D0E1F;--card:#161828;--brd:#272A45;
  --txt:#F0EAD6;--txt2:#9B94B8;--txt3:#524E6E;
  --ibg:#1B1D32;--ibrd:#333660;--sbg:#1B1D32;--stxt:#B0AACC;
  --hdr:#101120;--shad:rgba(0,0,0,.55);
  --grn:#8DBFA0;--grn-l:#0E2A1C;--grn-b:#1E5035;
  --rose:#C8909A;--rose-l:#2A1520;--rose-b:#6A2840;
  --blue:#88B4D8;--blue-l:#101E34;
  --peach:#D4906A;--peach-l:#221408;
  --lav:#A894D4;--lav-l:#160E2E;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;color:var(--txt);font-size:16px;transition:background .3s,color .3s}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#login-screen.hidden{display:none}
.login-box{background:var(--card);border:2px solid var(--brd);border-radius:28px;padding:36px 30px;width:100%;max-width:400px;box-shadow:0 16px 60px var(--shad)}
.login-logo{text-align:center;margin-bottom:8px}
.login-title{font-family:'Fredoka One',cursive;font-size:30px;color:var(--grn);text-align:center;letter-spacing:.5px}
.login-sub{font-size:15px;color:var(--txt2);text-align:center;margin-bottom:28px;margin-top:4px;font-weight:600}
.login-err{font-size:14px;color:#C85858;text-align:center;min-height:20px;margin-bottom:8px;line-height:1.4;font-weight:700}
.login-err.ok{color:var(--grn)}
.login-tabs{display:flex;background:var(--sbg);border-radius:16px;padding:4px;margin-bottom:20px}
.login-tab{flex:1;padding:10px;border:none;background:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--stxt);transition:all .2s}
.login-tab.on{background:var(--card);color:var(--grn);box-shadow:0 3px 14px var(--shad);font-weight:800}
.login-inp{width:100%;padding:13px 16px;border:2px solid var(--ibrd);border-radius:16px;font-size:16px;background:var(--ibg);color:var(--txt);font-family:'Nunito',sans-serif;margin-bottom:12px;font-weight:600;transition:border-color .2s}
.login-inp:focus{outline:none;border-color:var(--grn);box-shadow:0 0 0 4px var(--grn-l)}
.login-btn{width:100%;padding:15px;background:var(--grn);color:#fff;border:none;border-radius:30px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:4px;transition:all .2s;box-shadow:0 6px 20px rgba(123,171,139,.35);letter-spacing:.3px}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(123,171,139,.45)}
.login-btn:disabled{opacity:.55;cursor:default;transform:none;box-shadow:none}

/* PIN */
#pin-screen{position:fixed;inset:0;background:var(--hdr);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px}
#pin-screen.hidden{display:none}
.pin-dots{display:flex;gap:16px;margin:4px 0}
.pin-dot{width:20px;height:20px;border-radius:50%;border:2.5px solid var(--grn);background:transparent;transition:background .15s}
.pin-dot.on{background:var(--grn)}
.pin-grid{display:grid;grid-template-columns:repeat(3,80px);gap:12px;width:270px;justify-content:center}
.pin-btn{width:80px;height:80px;border-radius:50%;border:2px solid var(--brd);background:var(--card);font-size:22px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--txt);transition:all .15s;box-shadow:0 4px 14px var(--shad);display:flex;align-items:center;justify-content:center}
.pin-btn:active{transform:scale(.93)}
.pin-emerg{background:var(--rose-l);color:#C85858;border:2px solid var(--rose-b);padding:14px 20px;border-radius:16px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:6px;width:270px;text-align:center}

/* EMERGENCY */
#emerg-overlay{position:fixed;inset:0;background:var(--card);z-index:4000;overflow-y:auto;padding:20px;display:none}
#emerg-overlay.show{display:block}
#archive-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5000;display:flex;align-items:flex-end;justify-content:center}
#archive-modal.hidden{display:none}
.archive-sheet{background:var(--card);border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:480px;box-shadow:0 -8px 32px var(--shad)}
.archive-reason-btn{width:100%;padding:14px 16px;border:2px solid var(--brd);border-radius:14px;background:var(--sbg);color:var(--txt);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;text-align:left;transition:all .2s;display:block}
.archive-reason-btn:hover{border-color:var(--grn);background:var(--grn-l)}
.archived-section-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--sbg);border:1.5px solid var(--brd);border-radius:16px;cursor:pointer;margin-top:24px;margin-bottom:8px;user-select:none}
.archived-card{background:var(--card);border:1.5px dashed var(--brd);border-radius:16px;padding:14px 16px;margin-bottom:10px;opacity:0.8}
.emerg-close{position:absolute;top:16px;right:16px;font-size:28px;cursor:pointer;background:none;border:none;color:var(--txt)}
.emerg-hdr{background:linear-gradient(135deg,#D06868,#B85050);color:#fff;border-radius:22px;padding:22px;margin-bottom:16px;text-align:center}
.emerg-name{font-family:'Fredoka One',cursive;font-size:32px;letter-spacing:.5px}
.emerg-meta{font-size:15px;opacity:.9;margin-top:6px;font-weight:600}
.esec{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;padding:16px 18px;margin-bottom:12px;box-shadow:0 4px 18px var(--shad)}
.esec-t{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.e-allergy{display:inline-block;background:var(--rose-l);color:#C85858;border:2px solid var(--rose-b);border-radius:20px;padding:5px 14px;font-size:15px;font-weight:800;margin:3px}
.e-cond{display:inline-block;background:var(--blue-l);color:#5888A8;border:2px solid #C0D8EC;border-radius:20px;padding:5px 14px;font-size:15px;margin:3px;font-weight:700}
.e-med{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--brd)}
.e-med:last-child{border-bottom:none}
.e-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* MAIN APP */
#pp{max-width:600px;margin:0 auto;padding-bottom:40px}
.hdr{background:linear-gradient(135deg,var(--hdr) 0%,#F5EDDF 100%);border-bottom:2px solid var(--brd);padding:10px 20px 10px;position:sticky;top:0;z-index:100}
body.dark .hdr{background:linear-gradient(135deg,#101120 0%,#14162C 100%)}
.hdr-row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.logo{font-family:'Fredoka One',cursive;font-size:23px;color:var(--grn);letter-spacing:.5px}
.tagline{font-size:11px;color:var(--txt3);margin-top:2px;font-weight:700;letter-spacing:.3px}
.hdr-right{display:flex;align-items:center;gap:8px}
.sync-chip{font-size:13px;color:var(--txt3);min-width:80px;text-align:right;font-weight:700}
.prof-btn{display:flex;align-items:center;gap:8px;padding:11px 18px;background:var(--sbg);border:2px solid var(--brd);border-radius:30px;cursor:pointer;font-size:16px;font-weight:800;color:var(--txt);position:relative;white-space:nowrap;max-width:200px;transition:all .2s}
.prof-btn:hover{border-color:var(--grn)}
.pdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.pname-t{overflow:hidden;text-overflow:ellipsis;max-width:100px}
.pmenu{position:absolute;top:calc(100% + 8px);right:0;background:var(--card);border:2px solid var(--brd);border-radius:22px;box-shadow:0 10px 40px var(--shad);z-index:200;min-width:190px;overflow:hidden}
.pmenu-item{padding:14px 18px;font-size:15px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--txt);border-bottom:1px solid var(--brd);font-weight:700;transition:background .15s}
.pmenu-item:last-child{border-bottom:none}
.pmenu-item:hover{background:var(--sbg)}
.pmenu-item.cur{font-weight:800;color:var(--grn)}
.nav{background:var(--hdr);border-bottom:2px solid var(--brd);display:flex;position:sticky;top:142px;z-index:99}
body.dark .nav{background:#101120;border-bottom-color:#1E2248}
.tab{flex:1;padding:14px 4px 12px;font-size:14px;color:var(--txt2);text-align:center;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;line-height:1;transition:color .2s;font-weight:700}
.tab.on{color:#e07b00;background:rgba(224,123,0,0.10);border-bottom:3px solid #e07b00;border-radius:8px 8px 0 0;font-weight:800;box-shadow:inset 0 0 0 1px rgba(224,123,0,0.18)}
.tab-ico-wrap{display:block;margin-bottom:3px;height:36px;display:flex;align-items:center;justify-content:center}
.sub-nav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.sub-tab{padding:9px 18px;border-radius:30px;font-size:14px;border:2px solid var(--brd);background:var(--sbg);color:var(--stxt);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .2s}
.sub-tab:hover{border-color:var(--grn)}
.sub-tab.on{background:var(--grn);color:#fff;border-color:var(--grn);font-weight:800}
.content{padding:18px}
.card{background:var(--card);border:1.5px solid var(--brd);border-radius:22px;padding:18px 20px;margin-bottom:14px;box-shadow:0 4px 22px var(--shad)}
.sechdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.sectitle{font-family:'Fredoka One',cursive;font-size:22px;color:var(--txt);letter-spacing:.3px}
.empty{text-align:center;padding:48px 20px;color:var(--txt2)}
.empty-t{font-family:'Fredoka One',cursive;font-size:20px;color:var(--txt);margin:12px 0 8px}
.dose-card{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:opacity .2s;box-shadow:0 4px 16px var(--shad)}
.done{opacity:.4}
.chkbtn{width:36px;height:36px;border-radius:50%;border:2.5px solid var(--ibrd);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;color:transparent;font-family:'Nunito',sans-serif;transition:all .2s}
.chkbtn.chk{background:var(--grn);border-color:var(--grn);color:#fff;box-shadow:0 4px 14px rgba(123,171,139,.4)}
.snz{font-size:12px;padding:5px 12px;border-radius:30px;border:2px solid var(--brd);background:var(--sbg);color:var(--stxt);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;transition:all .2s}
.snz:hover{border-color:var(--grn);color:var(--grn)}
.mbar{width:5px;border-radius:10px;align-self:stretch;flex-shrink:0;min-height:22px}
.tshdr{font-size:12px;font-weight:800;color:var(--txt2);margin:18px 0 10px;display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.9px}
.refill-box{background:var(--peach-l);border:1.5px solid #F0C8A0;border-radius:18px;padding:14px 16px;margin-top:14px}
body.dark .refill-box{background:#2A1A10;border-color:#5A3A20}
.prog-chip{font-size:13px;color:#5A8A6A;background:var(--grn-l);padding:7px 16px;border-radius:30px;font-weight:800;border:1.5px solid var(--grn-b)}
body.dark .prog-chip{color:var(--grn)}
.badge{font-size:12px;padding:4px 11px;border-radius:30px;display:inline-block;font-weight:800;border:1.5px solid transparent}
.bi{background:var(--blue-l);color:#5888A8;border-color:#C0D8EC}
.bg{background:var(--grn-l);color:#5A8A6A;border-color:var(--grn-b)}
.bs{background:var(--sbg);color:var(--stxt);border-color:var(--brd)}
body.dark .bi{background:var(--blue-l);color:var(--blue);border-color:#2A4060}
.fld{margin-bottom:16px}
.lbl{display:block;font-size:12px;font-weight:800;color:var(--txt2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;padding:12px 14px;border:2px solid var(--ibrd);border-radius:16px;font-size:15px;background:var(--ibg);color:var(--txt);font-family:'Nunito',sans-serif;font-weight:600;transition:border-color .2s}
.inp:focus{outline:none;border-color:var(--grn);box-shadow:0 0 0 4px var(--grn-l)}
select.inp{cursor:pointer}
textarea.inp{min-height:80px;resize:vertical}
.btnp{background:var(--grn);color:#fff;border:none;padding:12px 22px;border-radius:30px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;box-shadow:0 4px 16px rgba(123,171,139,.32);letter-spacing:.2px}
.btnp:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(123,171,139,.45)}
.btnp:active{transform:translateY(0)}
.btnp:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}
.btns{background:var(--sbg);color:var(--stxt);border:2px solid var(--brd);padding:12px 20px;border-radius:30px;font-size:15px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .2s}
.btns:hover{border-color:var(--grn);color:var(--grn)}
.btnd{background:var(--rose-l);color:#C85858;border:1.5px solid var(--rose-b);padding:8px 12px;border-radius:14px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
body.dark .btnd{background:#3a0e0e;color:#f48fb1;border-color:#804040}
.btng{background:var(--grn-l);color:#5A8A6A;border:2px solid var(--grn-b);padding:12px 20px;border-radius:30px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
.btng:hover{background:var(--grn);color:#fff}
body.dark .btng{color:var(--grn)}
.tt{padding:8px 14px;border-radius:30px;font-size:14px;border:2px solid var(--brd);background:var(--sbg);color:var(--stxt);cursor:pointer;font-family:'Nunito',sans-serif;margin:0 6px 7px 0;font-weight:700;transition:all .2s}
.tt:hover{border-color:var(--grn)}
.tt.on{background:var(--grn-l);color:#5A8A6A;border-color:var(--grn-b);font-weight:800}
body.dark .tt.on{color:var(--grn)}
.cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;display:inline-block;transition:all .2s;box-shadow:0 2px 8px var(--shad)}
.cdot.on{border-color:var(--txt)}
.selcard{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:2px solid var(--ibrd);border-radius:18px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:15px;text-align:left;margin-bottom:10px;width:100%;color:var(--txt);font-weight:700;transition:all .2s}
.selcard:hover{border-color:var(--grn)}
.selcard.on{border-color:var(--grn);background:var(--grn-l);color:#5A8A6A}
body.dark .selcard.on{background:var(--grn-l)}
.ai-box{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;padding:18px;margin-top:14px;font-size:15px;line-height:1.8;color:var(--txt);white-space:pre-wrap;box-shadow:0 4px 18px var(--shad)}
.disc{background:var(--peach-l);border:1.5px solid #F0D0B0;border-radius:16px;padding:12px 16px;font-size:13px;color:#8B5E3C;margin-bottom:16px;line-height:1.5;font-weight:700}
body.dark .disc{background:#2A1E10;border-color:#5A4020;color:#D4A060}
.chklbl{display:flex;align-items:center;gap:12px;font-size:15px;color:var(--txt);cursor:pointer;font-weight:700}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.sbox{border:2px solid var(--brd);border-radius:22px;padding:16px;min-height:110px}
.slbl{font-size:12px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;margin-bottom:2px}
.stime{font-size:12px;margin-bottom:12px;opacity:.75;font-weight:600}
.pitem{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.pdotm{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:3px}
.pname{font-size:14px;font-weight:800;color:var(--txt);line-height:1.3}
.psub{font-size:12px;color:var(--txt3);margin-top:1px;font-weight:600}
.tips{background:var(--lav-l);border:1.5px solid #D8CCF0;border-radius:20px;padding:16px}
body.dark .tips{background:var(--lav-l);border-color:#3A3060}
.tip{font-size:14px;color:#6A5A8A;line-height:1.75;padding:8px 0;border-bottom:1px solid #E0D4F8;font-weight:600}
body.dark .tip{color:#A090C0;border-color:#3A3060}
.tip:last-child{border-bottom:none}
.mood-row{display:flex;gap:8px;flex-wrap:wrap}
.mbtn{font-size:26px;padding:6px 9px;border:2.5px solid transparent;border-radius:14px;cursor:pointer;background:none;line-height:1;transition:all .2s}
.mbtn:hover{transform:scale(1.12)}
.mbtn.on{border-color:var(--grn);background:var(--grn-l);transform:scale(1.12)}
body.dark .mbtn.on{background:var(--grn-l)}
.sx-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.sx{padding:7px 14px;border-radius:30px;font-size:13px;border:2px solid var(--brd);background:var(--sbg);color:var(--stxt);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .2s}
.sx:hover{border-color:var(--rose)}
.sx.on{background:var(--rose-l);color:#C85858;border-color:var(--rose-b);font-weight:800}
body.dark .sx.on{background:#3a0e0e;color:#f48fb1}
.jcard{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;padding:16px 18px;margin-bottom:12px;box-shadow:0 4px 16px var(--shad)}
.jhdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.jdate{font-size:13px;color:var(--txt3);font-weight:800}
.jtext{font-size:15px;color:var(--txt);line-height:1.75;white-space:pre-wrap;font-weight:500}
.j-sx-badge{font-size:12px;padding:3px 10px;border-radius:30px;background:var(--rose-l);color:#C85858;border:1.5px solid var(--rose-b);display:inline-block;margin:2px;font-weight:800}
body.dark .j-sx-badge{background:#3a0e0e;color:#f48fb1}
.ins-card{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 4px 18px var(--shad)}
.ins-title{font-size:13px;font-weight:800;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px}
.heatmap{display:grid;grid-template-columns:repeat(14,1fr);gap:4px;margin-top:10px}
.hm-day{aspect-ratio:1;border-radius:5px}
.streak-num{font-family:'Fredoka One',cursive;font-size:48px;color:var(--grn);line-height:1}

// ===== CLOUD SYNC =====
function setSyncStatus(s){const el=document.getElementById('sync-chip');if(!el)return;const m={loading:'⏳ Loading…',saving:'🔄 Saving…',synced:'✓ Synced',error:'⚠️ Offline'};el.textContent=m[s]||'';}

async function loadCloud(){
  if(!currentUser)return;
  setSyncStatus('loading');
  try{
    const{data,error}=await sb.from('user_data').select('profiles,settings').eq('id',currentUser.id).single();
    if(error&&error.code!=='PGRST116')throw error;
    if(data&&data.profiles&&data.profiles.length){
      profiles=data.profiles;
      if(data.settings)settings={...settings,...data.settings};
    } else {
      // New user — migrate local data if any
      try{const r=localStorage.getItem('dd_profiles_v1');if(r)profiles=JSON.parse(r);}catch(e){}
      if(!profiles.length)profiles=[mkProf('My Profile')];
      await saveCloud();
    }
    if(!activeId||!profiles.find(p=>p.id===activeId))activeId=profiles[0]?.id;
    setSyncStatus('synced');
  }catch(e){setSyncStatus('error');tryLoadLocal();}
}

async function saveCloud(){
  if(!currentUser)return;
  try{
    await sb.from('user_data').upsert({id:currentUser.id,profiles,settings:{darkMode:settings.darkMode,notifSlots:settings.notifSlots,pin:settings.pin,pinIdleMinutes:settings.pinIdleMinutes,trustedDevices:settings.trustedDevices||[]},care_enabled:ap().careEnabled||false,care_code:currentUser?currentUser.id.replace(/-/g,'').substring(0,8).toUpperCase():null,updated_at:new Date().toISOString()},{onConflict:'id'});
    setSyncStatus('synced');
    // also cache locally
    try{localStorage.setItem('dd_profiles_v1',JSON.stringify(profiles));}catch(e){}
  }catch(e){setSyncStatus('error');}
}

function scheduleSave(){setSyncStatus('saving');clearTimeout(saveTimer);saveTimer=setTimeout(saveCloud,1500);}
function saveSet(){try{localStorage.setItem(SetK,JSON.stringify(settings));}catch(e){}scheduleSave();}

function tryLoadLocal(){
  try{const r=localStorage.getItem('dd_profiles_v1');if(r)profiles=JSON.parse(r);}catch(e){}
  try{const r=localStorage.getItem(SetK);if(r)settings={...settings,...JSON.parse(r)};}catch(e){}
  if(!profiles.length)profiles=[mkProf('My Profile')];
  if(!activeId||!profiles.find(p=>p.id===activeId))activeId=profiles[0]?.id;
}

let loginTab='in';
function setLoginTab(t){
  loginTab=t;
  document.getElementById('lt-in').classList.toggle('on',t==='in');
  document.getElementById('lt-up').classList.toggle('on',t==='up');
  document.getElementById('login-btn').textContent=t==='in'?'Sign in':'Create account';

  document.getElementById('forgot-wrap').style.display=t==='in'?'block':'none';
  document.getElementById('login-err').textContent='';
}
function setLoginErr(msg,ok=false){const el=document.getElementById('login-err');el.textContent=msg;el.className='login-err'+(ok?' ok':'');}
function setLoginLoading(on){document.getElementById('login-btn').disabled=on;document.getElementById('login-btn').textContent=on?'Please wait…':(loginTab==='in'?'Sign in':'Create account');}

async function doAuth(){
  const email=(document.getElementById('login-email').value||'').trim();
  const pwd=document.getElementById('login-pwd').value||'';
  if(!email||!pwd){setLoginErr('Please enter your email and password.');return;}
  setLoginLoading(true);setLoginErr('');
  if(loginTab==='in'){
    var signInResult;
    try{signInResult=await sb.auth.signInWithPassword({email,password:pwd});}
    catch(e){setLoginErr('Connection failed — check your internet and try again.');setLoginLoading(false);return;}
    const{error}=signInResult;
    if(error){setLoginErr(error.message==='Failed to fetch'?'Connection failed — check your internet connection.':error.message);setLoginLoading(false);}
  } else {
    const pwd2=document.getElementById('login-pwd2').value||'';
    if(pwd.length<6){setLoginErr('Password must be at least 6 characters.');setLoginLoading(false);return;}
    if(pwd!==pwd2){setLoginErr('Passwords do not match.');setLoginLoading(false);return;}
    const{error}=await sb.auth.signUp({email,password:pwd});
    setLoginLoading(false);
    if(error)setLoginErr(error.message);
    else setLoginErr('✅ Account created! Check your email to confirm, then sign in.',true);
  }
}
async function resetPwd(){
  const email=(document.getElementById('login-email').value||'').trim();
  if(!email){setLoginErr('Enter your email above first.');return;}
  const{error}=await sb.auth.resetPasswordForEmail(email);
  setLoginErr(error?error.message:'📧 Reset link sent! Check your email.',!error);
}
async function logout(){if(!confirm('Sign out?'))return;await sb.auth.signOut();}

function showEmergency(pid){
  const p=pid?profiles.find(x=>x.id===pid):ap();if(!p)return;

  <div class="esec"><div class="esec-t" style="color:#1565c0">🏥 MEDICAL CONDITIONS</div>${p.conditions?.length?p.conditions.map(c=>`<span class="e-cond">${esc(c)}</span>`).join(''):'<span style="color:var(--txt3);font-size:15px">None recorded</span>'}</div>

  const p=profiles.find(x=>x.id===pid)||ap();let rows='';

async function runDashInteractionCheck(){
  const meds=ap().meds||[];
  if(meds.length<2){showToast('Add more medications to check interactions.');return;}
  showToast('⚠️ Checking interactions…');
  _interactionWarnings={};
  const names=meds.map(m=>`${m.name}${m.dosage?' ('+m.dosage+')':''}`);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json',...apiHeaders()},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,
        system:'You are a medication safety assistant. Be brief, clear, and practical. General info only, not medical advice. If no interactions found, say so clearly.',
        messages:[{role:'user',content:`Check for any notable interactions between these medications: ${names.join(', ')}. List any interactions found, one per line, as "MedA + MedB: brief description". If none, respond with exactly "No known interactions found."`}]})});
    const d=await r.json();
    const txt=(d.content?.map(b=>b.text||'').join('')||'').trim();
    if(txt.toLowerCase().includes('no known')){
      showToast('✅ No known interactions found!');
    } else {
      // Parse interactions into cache
      txt.split('\n').filter(l=>l.trim()&&l.includes(':')).forEach((l,i)=>{_interactionWarnings['w'+i]=l.trim();});
      if(!Object.keys(_interactionWarnings).length)_interactionWarnings['w0']=txt;
      render();showToast('⚠️ Interactions found — see dashboard');
    }
  }catch(e){showToast('Could not check interactions. Try again.');}
}
function toggleDose(k){
  const d={...(ap().doses||{})};
  const slot=k.split('-').slice(1).join('-');
  const slotHour=SLOT_HRS[slot]||12;
  const nowHour=new Date().getHours();
  const isLate=!d[k]&&Math.abs(nowHour-slotHour)>=2;
  d[k]=!d[k]?{taken:true,time:new Date().toISOString(),late:isLate}:null;
  upAP({doses:d});saveD();checkNewBadges();render();
}
function saveD(){const p=ap(),today=new Date().toDateString(),h={...(p.history||{})};h[today]={...(p.doses||{})};const keys=Object.keys(h).sort((a,b)=>new Date(b)-new Date(a));if(keys.length>90)keys.slice(90).forEach(k=>delete h[k]);upAP({history:h});}

function startAdd(){editing={id:null,name:'',type:'prescription',dosage:'',frequency:'Once daily',times:['morning'],withFood:false,quantity:'',refillAt:'',notes:'',color:COLORS[0]};view='add';document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v==='meds'));render();}

function dupMed(id){const m={...(ap().meds||[]).find(x=>x.id===id),id:'m'+Date.now(),name:(ap().meds||[]).find(x=>x.id===id).name+' (copy)'};upAP({meds:[...(ap().meds||[]),m]});showToast('📄 Duplicated!');}
function moveMed(id,dir){const ms=[...(ap().meds||[])],i=ms.findIndex(m=>m.id===id);if(i+dir<0||i+dir>=ms.length)return;[ms[i],ms[i+dir]]=[ms[i+dir],ms[i]];upAP({meds:ms});}
function delMed(id){const m=(ap().meds||[]).find(x=>x.id===id);if(confirm(`Remove "${m?.name}"?`)){upAP({meds:(ap().meds||[]).filter(x=>x.id!==id)});render();}}
function archiveMed(id){pendingArchiveId=id;document.getElementById('archive-modal').classList.remove('hidden');}
function confirmArchive(reason){
  if(!pendingArchiveId)return;
  document.getElementById('archive-modal').classList.add('hidden');
  const meds=ap().meds||[],archived=ap().archivedMeds||[];
  const med=meds.find(m=>m.id===pendingArchiveId);
  if(!med){pendingArchiveId=null;return;}
  const archivedMed={...med,archivedDate:new Date().toISOString(),archiveReason:reason};
  upAP({meds:meds.filter(m=>m.id!==pendingArchiveId),archivedMeds:[...archived,archivedMed]});
  const name=med.name;pendingArchiveId=null;
  showArchived=true;render();showToast(`📦 ${name} archived`);
}
function cancelArchive(){pendingArchiveId=null;document.getElementById('archive-modal').classList.add('hidden');}
function restoreMed(id){
  const archived=ap().archivedMeds||[];

  const {archivedDate,archiveReason,...restoredMed}=med;
  const medHistory=[...(restoredMed.medHistory||[]),{action:'Restored from archive',date:new Date().toISOString()}];
  upAP({meds:[...(ap().meds||[]),{...restoredMed,medHistory}],archivedMeds:archived.filter(m=>m.id!==id)});
  render();showToast(`✅ ${med.name} restored!`);
}
function deleteArchived(id){const med=(ap().archivedMeds||[]).find(m=>m.id===id);if(confirm(`Permanently delete "${med?.name}" from archive? This cannot be undone.`)){upAP({archivedMeds:(ap().archivedMeds||[]).filter(m=>m.id!==id)});render();}}

function saveFrm(){
  const name=(document.getElementById('fn')?.value||'').trim();if(!name){alert('Please enter a name.');return;}
  const wasNew=!editing.id;
  editing.name=name;editing.type=document.getElementById('ft')?.value||'prescription';
  editing.medForm=document.getElementById('fform')?.value||'Tablet';
  editing.dosageAmount=(document.getElementById('fdamt')?.value||'').trim();
  editing.dosageUnit=document.getElementById('fdunit')?.value||'mg';
  const amt=editing.dosageAmount,unt=editing.dosageUnit;
  editing.dosage=amt?(amt+' '+unt):((document.getElementById('fd')?.value||'').trim());
  editing.frequency=document.getElementById('ff')?.value;
  editing.quantity=document.getElementById('fq')?.value||'';editing.refillAt=document.getElementById('fr')?.value||'';
  editing.withFood=document.getElementById('ff2')?.checked||false;editing.notes=(document.getElementById('fno')?.value||'').trim();
  editing.rxNumber=(document.getElementById('frx')?.value||'').trim();
  editing.startDate=document.getElementById('fstart')?.value||'';
  editing.expiryDate=document.getElementById('fexp')?.value||'';
  editing.customReminder=(document.getElementById('fremind')?.value||'').trim();
  // track history
  if(!editing.medHistory)editing.medHistory=[];
  if(wasNew)editing.medHistory=[{date:new Date().toISOString(),action:'Started'}];
  else editing.medHistory=[...editing.medHistory,{date:new Date().toISOString(),action:'Updated'}];
  const ms=[...(ap().meds||[])];
  if(editing.id){const i=ms.findIndex(m=>m.id===editing.id);if(i>=0)ms[i]={...editing};else ms.push({...editing,id:'m'+Date.now()});}
  else{ms.push({...editing,id:'m'+Date.now()});}
  // auto interaction check
  if(wasNew&&ms.length>1){
    const newMed=editing.name;
    const others=ms.filter(m=>m.id!==editing.id).map(m=>m.name).join(', ');
    setTimeout(()=>autoInteractionCheck(newMed,others),500);
  }
  upAP({meds:ms});goTo('meds');
}

async function scanLabelForPrefill(input){
  const file=input.files[0];if(!file)return;
  const st=document.getElementById('scan-st2');
  if(!getApiKey())return noKeyMsg(st)&&void 0;
  if(st){st.style.color='#1976d2';st.textContent='🔍 Scanning label — this takes a few seconds...';}
  try{
    const b64=await compressImg(file);
    const prompt=`You are reading a prescription label or medication packaging. Extract ALL visible fields. For each field provide confidence: "high" (clearly visible) or "low" (partially visible/inferred).

Return ONLY valid JSON:
{
  "isLabel": true,
  "name": {"value": "Metformin", "confidence": "high"},
  "dosageAmount": {"value": "500", "confidence": "high"},
  "dosageUnit": {"value": "mg", "confidence": "high"},
  "frequency": {"value": "Twice daily", "confidence": "high"},
  "rxNumber": {"value": "1234567", "confidence": "low"},
  "expiryDate": {"value": "2026-03-01", "confidence": "high"},
  "quantity": {"value": "90", "confidence": "high"},
  "withFood": {"value": true, "confidence": "low"},
  "notes": {"value": "Take with meals", "confidence": "high"}
}

Rules:
- If not a medication label/packaging: {"isLabel": false}
- dosageUnit must be one of: mg, mcg, g, mL, IU, units, %
- frequency must be one of: Once daily, Twice daily, Three times daily, Every other day, Weekly, With meals, As needed
- expiryDate format: YYYY-MM-DD
- Omit fields not found (don't include them in JSON)`;
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json',...apiHeaders()},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:prompt}]}]})});
    const d=await r.json();
    console.log('Scan API status:',r.status,'response:',JSON.stringify(d).substring(0,300));
    if(!r.ok){if(st){st.style.color='#c62828';st.textContent='⚠️ API error '+r.status+': '+(d.error?.message||'unknown error');}return;}
    const txt=(d.content?.map(b=>b.text||'').join('')||'').replace(/```json|```/g,'').trim();
    const info=JSON.parse(txt);
    if(!info.isLabel){
      if(st){st.style.color='#c62828';st.textContent='⚠️ Couldn\'t detect a medication label — please fill in manually.';}
      return;
    }
    let filled=0,review=0;
    function applyField(elId,fieldData,isCheckbox=false){
      if(!fieldData||fieldData.value===undefined||fieldData.value===null)return;
      const el=document.getElementById(elId);
      if(!el)return;
      const cls=fieldData.confidence==='high'?'scan-field-green':'scan-field-yellow';
      if(fieldData.confidence==='high')filled++;else review++;
      if(isCheckbox){el.checked=!!fieldData.value;}
      else{el.value=fieldData.value;}
      el.classList.add(cls);
      // add confidence badge to label
      const lbl=el.closest('.fld')?.querySelector('.lbl');
      if(lbl&&!lbl.querySelector('.scan-conf-green,.scan-conf-yellow')){
        const badge=document.createElement('span');
        badge.className=fieldData.confidence==='high'?'scan-conf-green':'scan-conf-yellow';
        badge.textContent=fieldData.confidence==='high'?'✓ Scanned':'⚠️ Review';
        lbl.appendChild(badge);
      }
    }
    // Apply all fields
    if(info.name){applyField('fn',info.name);if(info.name.value)editing.name=info.name.value;}
    if(info.dosageAmount)applyField('fdamt',info.dosageAmount);
    if(info.dosageUnit)applyField('fdunit',info.dosageUnit);
    if(info.frequency)applyField('ff',info.frequency);
    if(info.rxNumber)applyField('frx',info.rxNumber);
    if(info.expiryDate)applyField('fexp',info.expiryDate);
    if(info.quantity)applyField('fq',info.quantity);
    if(info.withFood)applyField('ff2',info.withFood,true);
    if(info.notes)applyField('fno',info.notes);
    const total=filled+review;
    if(total===0){
      if(st){st.style.color='#c62828';st.textContent='⚠️ Label found but couldn\'t read details — please fill in manually.';}
    } else {
      if(st){st.style.color='#1b7a4e';st.textContent=`✅ ${filled} field${filled!==1?'s':''} filled${review>0?` · ⚠️ ${review} field${review!==1?'s':''} need review`:''}`;}
    }
  }catch(e){
    if(st){st.style.color='#c62828';st.textContent='⚠️ Scan error: '+e.message;}
    console.error('Scan error full:',e);
  }
}
function compressImg(file){return new Promise(res=>{const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{const cv=document.createElement('canvas'),r=Math.min(1024/img.width,1024/img.height,1);cv.width=img.width*r;cv.height=img.height*r;cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);res(cv.toDataURL('image/jpeg',.75).split(',')[1]);};img.src=e.target.result;};rd.readAsDataURL(file);});}

function rInsights(){
  const p=ap(),meds=p.meds||[],doses=p.doses||{},history=p.history||{};
  if(!meds.length)return`<div class="sectitle" style="margin-bottom:16px">📊 Insights — ${esc(p.name)}</div><div class="empty"><div style="font-size:52px">📊</div><div class="empty-t">No data yet</div><div style="font-size:15px">Add medications and check off doses to see insights here.</div></div>`;
  const total=meds.reduce((a,m)=>a+(m.times?.length||0),0);
  let streak=0;if(total>0){let d=new Date();d.setDate(d.getDate()-1);for(let i=0;i<90;i++){const ds=d.toDateString(),dh=history[ds];if(!dh)break;if(Object.values(dh).filter(Boolean).length<total)break;streak++;d.setDate(d.getDate()-1);}}
  const days28=[];for(let i=27;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days28.push(d);}
  const hm=days28.map(d=>{const ds=d.toDateString();if(ds===new Date().toDateString())return total?Math.round(Object.values(doses).filter(v=>v&&(v===true||v.taken)).length/total*100):null;const dh=history[ds];if(!dh||!total)return null;return Math.round(Object.values(dh).filter(Boolean).length/total*100);});
  function hmc(v){if(v===null)return'var(--sbg)';if(v>=80)return'#1b7a4e';if(v>=50)return'#f9a825';if(v>0)return'#e57373';return'#ddd';}
  const valid=hm.filter(v=>v!==null),avg=valid.length?Math.round(valid.reduce((a,b)=>a+b,0)/valid.length):0;
  const recentMoods=(p.journal||[]).slice(0,14).reverse();
  return`<div class="sectitle" style="margin-bottom:16px">📊 Insights — ${esc(p.name)}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
    <div class="ins-card" style="text-align:center"><div class="ins-title">🔥 Streak</div><div class="streak-num">${streak}</div><div style="font-size:14px;color:var(--txt2);margin-top:5px">day${streak!==1?'s':''} in a row</div></div>
    <div class="ins-card" style="text-align:center"><div class="ins-title">📈 Avg</div><div class="streak-num" style="color:${avg>=80?'#1b7a4e':avg>=50?'#f9a825':'#e57373'}">${avg}%</div><div style="font-size:14px;color:var(--txt2);margin-top:5px">last 28 days</div></div>
  </div>
  <div class="ins-card"><div class="ins-title">📅 28-Day Adherence</div><div class="heatmap">${buildHeatmap(hm,days28)}</div><div style="display:flex;gap:14px;margin-top:12px;font-size:12px;color:var(--txt3)"><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#1b7a4e;margin-right:5px"></span>80%+</span><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#f9a825;margin-right:5px"></span>50–79%</span><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#e57373;margin-right:5px"></span>&lt;50%</span><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:var(--sbg);margin-right:5px"></span>No data</span></div></div>
  ${recentMoods.length?`<div class="ins-card"><div class="ins-title">😊 Mood Trend</div><div class="mood-trend">${buildMoodTrend(recentMoods)}</div></div>`:''}
  <div class="ins-card"><div class="ins-title">🤒 Side Effect Patterns (all time)</div>${rSideEffectChart()}</div>
  <div class="ins-card"><div class="ins-title">📋 Today's Progress</div>${SLOTS.filter(s=>s.id!=='as_needed').map(s=>{const sm=meds.filter(m=>m.times?.includes(s.id));if(!sm.length)return'';const dn=sm.filter(m=>doses[`${m.id}-${s.id}`]).length,pct=Math.round(dn/sm.length*100);return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:15px;margin-bottom:5px"><span>${s.icon} ${s.l}</span><span style="color:var(--txt2)">${dn}/${sm.length}</span></div><div style="height:8px;background:var(--sbg);border-radius:4px"><div style="height:8px;background:${pct===100?'#1b7a4e':'#1976d2'};border-radius:4px;width:${pct}%"></div></div></div>`;}).join('')}</div>
  ${rGlucoseInsights(p)}
  ${rCycleInsights(p)}`;

function rGlucoseInsights(p){
  const readings=(p.glucose||[]);
  if(!readings.length)return'';
  const last30=readings.filter(r=>new Date(r.date)>new Date(Date.now()-30*24*60*60*1000));
  if(!last30.length)return'';

  // Averages by context
  const byCtx={};
  last30.forEach(r=>{
    if(!r.glucose)return;
    if(!byCtx[r.context])byCtx[r.context]=[];
    byCtx[r.context].push(parseFloat(r.glucose));
  });
  const ctxLabels={fasting:'Fasting',before:'Pre-meal',after:'Post-meal',bedtime:'Bedtime',other:'Other'};
  const ctxStats=Object.entries(byCtx).map(([ctx,vals])=>{
    const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
    const inRange=ctx==='fasting'?(avg<=130):(ctx==='after'?(avg<=180):(avg<=180));
    return{ctx,avg,inRange,count:vals.length};
  });

  // Spark line data — last 14 readings
  const spark=readings.slice(-14);
  const sparkMax=Math.max(...spark.map(r=>parseFloat(r.glucose)||0),200);
  const sparkMin=Math.min(...spark.map(r=>parseFloat(r.glucose)||70),70);
  const sparkH=48,sparkW=200;
  const pts=spark.map((r,i)=>{
    const x=Math.round((i/(spark.length-1||1))*sparkW);
    const y=Math.round(sparkH-((parseFloat(r.glucose)-sparkMin)/(sparkMax-sparkMin||1))*sparkH);
    return`${x},${y}`;
  }).join(' ');

  // Ketone distribution
  const ketones=last30.filter(r=>r.ketones);
  const ketCounts={};
  ketones.forEach(r=>{ketCounts[r.ketones]=(ketCounts[r.ketones]||0)+1;});
  const ketOrder=['neg','trace','small','moderate','large','xlarge'];
  const ketLabels={neg:'Negative',trace:'Trace',small:'Small',moderate:'Moderate',large:'Large',xlarge:'Extra Large'};

  // Overall avg
  const allVals=last30.map(r=>parseFloat(r.glucose)).filter(v=>!isNaN(v));
  const overallAvg=allVals.length?Math.round(allVals.reduce((a,b)=>a+b,0)/allVals.length):0;
  const avgColor=overallAvg<=130?'#1b7a4e':overallAvg<=180?'#f9a825':'#c62828';

  let h=`<div class="ins-card"><div class="ins-title">🩸 Glucose Trends (last 30 days)</div>`;

  // Overall avg + spark
  h+=`<div style="display:flex;align-items:center;gap:16px;margin-bottom:14px">
    <div style="text-align:center">
      <div style="font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px">Avg glucose</div>
      <div style="font-size:28px;font-weight:800;color:${avgColor}">${overallAvg}</div>
      <div style="font-size:11px;color:var(--txt3)">mg/dL</div>
    </div>
    <div style="flex:1">
      <svg viewBox="0 0 ${sparkW} ${sparkH}" style="width:100%;height:48px">
        <line x1="0" y1="${Math.round(sparkH-((130-sparkMin)/(sparkMax-sparkMin||1))*sparkH)}" x2="${sparkW}" y2="${Math.round(sparkH-((130-sparkMin)/(sparkMax-sparkMin||1))*sparkH)}" stroke="#1b7a4e" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
        ${spark.length>1?`<polyline points="${pts}" fill="none" stroke="${avgColor}" stroke-width="2" stroke-linejoin="round"/>`:''}
        ${spark.map((r,i)=>{const x=Math.round((i/(spark.length-1||1))*sparkW);const y=Math.round(sparkH-((parseFloat(r.glucose)-sparkMin)/(sparkMax-sparkMin||1))*sparkH);const col=parseFloat(r.glucose)<=180?'#1b7a4e':'#c62828';return`<circle cx="${x}" cy="${y}" r="2.5" fill="${col}"/>`;}).join('')}
      </svg>
      <div style="font-size:10px;color:var(--txt3);text-align:right">last ${spark.length} readings</div>
    </div>
  </div>`;

  // By context
  if(ctxStats.length){
    h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;margin-bottom:14px">`;
    ctxStats.forEach(({ctx,avg,inRange,count})=>{
      h+=`<div style="background:var(--sbg);border-radius:10px;padding:8px;text-align:center">
        <div style="font-size:10px;color:var(--txt3);margin-bottom:2px">${ctxLabels[ctx]||ctx}</div>
        <div style="font-size:18px;font-weight:800;color:${inRange?'#1b7a4e':'#c62828'}">${avg}</div>
        <div style="font-size:10px;color:var(--txt3)">${count} reading${count!==1?'s':''}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Ketone distribution
  if(ketones.length){
    h+=`<div style="font-size:13px;font-weight:800;color:var(--txt);margin-bottom:8px">Ketone levels (${ketones.length} readings)</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">`;
    ketOrder.filter(k=>ketCounts[k]).forEach(k=>{
      const pct=Math.round(ketCounts[k]/ketones.length*100);
      h+=`<div style="background:var(--sbg);border-radius:8px;padding:6px 10px;text-align:center">
        <div style="font-size:11px;color:var(--grn);font-weight:700">${ketLabels[k]}</div>
        <div style="font-size:13px;font-weight:800;color:var(--txt)">${pct}%</div>
      </div>`;
    });
    h+=`</div>`;
  }

  h+=`<div style="font-size:11px;color:var(--txt3);font-style:italic">Target: Fasting 80–130 · Post-meal &lt;180 mg/dL. General info only.</div></div>`;

}

function rCycleInsights(p){
  const periods=p.periods||[];
  if(!periods.length)return'';
  const completed=periods.filter(per=>per.endDate);
  if(!completed.length&&!periods.find(per=>per.active))return'';

  // Cycle lengths between periods
  const sorted=periods.slice().sort((a,b)=>new Date(a.startDate)-new Date(b.startDate));
  const gaps=[];
  for(let i=1;i<sorted.length;i++){
    const gap=Math.floor((new Date(sorted[i].startDate)-new Date(sorted[i-1].startDate))/(1000*60*60*24));
    if(gap>0&&gap<365)gaps.push(gap);
  }

  // Duration of each period
  const durations=completed.map(per=>Math.floor((new Date(per.endDate)-new Date(per.startDate))/(1000*60*60*24))+1);

  // Symptom frequency across all periods
  const sxCounts={};
  periods.forEach(per=>(per.days||[]).forEach(d=>(d.symptoms||[]).forEach(s=>{sxCounts[s]=(sxCounts[s]||0)+1;})));
  const topSx=Object.entries(sxCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Flow frequency
  const flowCounts={};
  periods.forEach(per=>(per.days||[]).forEach(d=>{if(d.flow)flowCounts[d.flow]=(flowCounts[d.flow]||0)+1;}));
  const flowLabels={spotting:'Spotting',light:'Light',medium:'Medium',heavy:'Heavy'};
  const flowColors={spotting:'#f48fb1',light:'#f06292',medium:'#e91e63',heavy:'#880e4f'};

  let h=`<div class="ins-card"><div class="ins-title">🩸 Cycle Insights</div>`;

  // Summary stats
  h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">`;
  h+=`<div style="background:var(--sbg);border-radius:10px;padding:10px;text-align:center">
    <div style="font-size:11px;color:var(--txt3)">Periods logged</div>
    <div style="font-size:22px;font-weight:800;color:var(--txt)">${periods.length}</div>
  </div>`;
  if(durations.length){
    const avgDur=Math.round(durations.reduce((a,b)=>a+b,0)/durations.length);
    h+=`<div style="background:var(--sbg);border-radius:10px;padding:10px;text-align:center">
      <div style="font-size:11px;color:var(--txt3)">Avg duration</div>
      <div style="font-size:22px;font-weight:800;color:var(--txt)">${avgDur}</div>
      <div style="font-size:11px;color:var(--txt3)">days</div>
    </div>`;
  }
  if(gaps.length){
    const avgGap=Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length);
    h+=`<div style="background:var(--sbg);border-radius:10px;padding:10px;text-align:center">
      <div style="font-size:11px;color:var(--txt3)">Avg gap</div>
      <div style="font-size:22px;font-weight:800;color:var(--txt)">${avgGap}</div>
      <div style="font-size:11px;color:var(--txt3)">days</div>
    </div>`;
  }
  h+=`</div>`;

  // Flow breakdown
  if(Object.keys(flowCounts).length){
    const totalFlow=Object.values(flowCounts).reduce((a,b)=>a+b,0);
    h+=`<div style="font-size:13px;font-weight:800;color:var(--txt);margin-bottom:8px">Flow breakdown</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">`;
    ['spotting','light','medium','heavy'].filter(f=>flowCounts[f]).forEach(f=>{
      const pct=Math.round(flowCounts[f]/totalFlow*100);
      h+=`<div style="background:var(--sbg);border-radius:8px;padding:6px 10px;text-align:center;border-left:3px solid ${flowColors[f]}">
        <div style="font-size:11px;color:var(--txt3)">${flowLabels[f]}</div>
        <div style="font-size:14px;font-weight:800;color:var(--txt)">${pct}%</div>
        <div style="font-size:10px;color:var(--txt3)">${flowCounts[f]} day${flowCounts[f]!==1?'s':''}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Top symptoms
  if(topSx.length){
    h+=`<div style="font-size:13px;font-weight:800;color:var(--txt);margin-bottom:8px">Most common symptoms</div>
    <div style="display:flex;flex-direction:column;gap:6px">`;
    const maxCount=topSx[0][1];
    topSx.forEach(([sx,count])=>{
      const pct=Math.round(count/maxCount*100);
      h+=`<div><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span style="color:var(--txt)">${sx}</span><span style="color:var(--txt3)">${count}x</span></div>
        <div style="height:6px;background:var(--sbg);border-radius:3px"><div style="height:6px;background:#e91e63;border-radius:3px;width:${pct}%"></div></div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Note about irregular cycles
  h+=`<div style="font-size:11px;color:var(--txt3);margin-top:12px;font-style:italic">Irregular cycle tracking — patterns shown for reference only, no predictions made.</div>`;
  h+=`</div>`;
  return h;
}

  upAP({[fillKey]:fill});render();
}

function expCSV(){const p=ap(),meds=p.meds||[];const hdr=['Name','Type','Dosage','Frequency','Times','With Food','Qty','Refill At','Notes'];const rows=meds.map(m=>[m.name,m.type,m.dosage||'',m.frequency||'',(m.times||[]).join('; '),m.withFood?'Yes':'No',m.quantity||'',m.refillAt||'',m.notes||'']);const csv=[hdr,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');dl(new Blob([csv],{type:'text/csv'}),`TheDailyDose_${p.name}_${new Date().toISOString().slice(0,10)}.csv`);}
function copyText(){const p=ap(),meds=p.meds||[];let txt=`THE DAILY DOSE — ${p.name.toUpperCase()}\nGenerated: ${new Date().toLocaleDateString()}\n${'='.repeat(40)}\n\n`;SLOTS.forEach(s=>{const sm=meds.filter(m=>m.times?.includes(s.id));if(!sm.length)return;txt+=`${s.icon} ${s.l.toUpperCase()}\n${'-'.repeat(26)}\n`;sm.forEach(m=>{txt+=`• ${m.name}`;if(m.dosage)txt+=` — ${m.dosage}`;if(m.frequency)txt+=` (${m.frequency})`;if(m.withFood)txt+=' [with food]';if(m.notes)txt+=`\n  Note: ${m.notes}`;txt+='\n';});txt+='\n';});navigator.clipboard.writeText(txt).then(()=>showToast('📋 Copied!')).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('📋 Copied!');});}
function printList(){const p=ap(),meds=p.meds||[];let rows='';SLOTS.forEach(s=>{const sm=meds.filter(m=>m.times?.includes(s.id));if(!sm.length)return;rows+=`<tr style="background:#f9f7f4"><td colspan="5" style="padding:8px 12px;font-weight:700">${s.icon} ${s.l}</td></tr>`;sm.forEach(m=>{rows+=`<tr><td style="padding:7px 12px">● ${m.name}</td><td>${{prescription:'Rx',supplement:'Supplement',otc:'OTC'}[m.type]||m.type}</td><td>${m.dosage||'—'}</td><td>${m.frequency||'—'}</td><td>${m.withFood?'Yes':'—'}</td></tr>`;});});const pw=window.open('','_blank');pw.document.write(`<!DOCTYPE html><html><head><title>${p.name} — Medication List</title><style>body{font-family:'Nunito',sans-serif;padding:24px;max-width:700px;font-size:14px}table{width:100%;border-collapse:collapse}td,th{border:1px solid #ddd;padding:7px 12px;text-align:left}th{background:#f5ede0;font-weight:700}@media print{button{display:none}}</style></head><body><h1 style="font-size:22px;margin-bottom:4px">☀️ The Daily Dose — ${p.name}</h1><p style="color:#888;font-size:13px;margin-bottom:20px">Generated ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</p><table><thead><tr><th>Name</th><th>Type</th><th>Dosage</th><th>Frequency</th><th>With Food</th></tr></thead><tbody>${rows}</tbody></table><p style="margin-top:20px;font-size:11px;color:#aaa">General use only, not medical advice.</p><script>window.print();<\/script></body></html>`);pw.document.close();}
function expBackup(){const data={version:4,exported:new Date().toISOString(),profiles,settings:{darkMode:settings.darkMode,notifSlots:settings.notifSlots,pin:settings.pin}};dl(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),`TheDailyDose_Backup_${new Date().toISOString().slice(0,10)}.json`);showToast('💾 Backup downloaded!');}
function impBackup(input){const file=input.files[0];if(!file)return;const rd=new FileReader();rd.onload=e=>{try{const data=JSON.parse(e.target.result);if(!data.profiles)throw new Error();if(!confirm(`Restore backup from ${new Date(data.exported||Date.now()).toLocaleDateString()}?\n\nThis will replace ALL current data.`))return;profiles=data.profiles;activeId=profiles[0]?.id;if(data.settings)settings={...settings,...data.settings};document.body.classList.toggle('dark',settings.darkMode);scheduleSave();updateProfHdr();render();showToast('✅ Backup restored!');}catch(e){alert('Could not restore — invalid backup file.');}};rd.readAsText(file);}
function expJournal(){const p=ap();let txt=`THE DAILY DOSE — ${p.name.toUpperCase()} JOURNAL\n${'='.repeat(44)}\n\n`;(p.journal||[]).forEach(e=>{txt+=`${fmtDate(e.date)} · ${fmtTime(e.date)}\nMood: ${e.mood||'😊'}`;if(e.sx&&e.sx.length)txt+=`\nSymptoms: ${e.sx.join(', ')}`;txt+=`\n\n${e.text}\n\n${'-'.repeat(32)}\n\n`;});dl(new Blob([txt],{type:'text/plain'}),`TheDailyDose_${p.name}_Journal_${new Date().toISOString().slice(0,10)}.txt`);}

// ===== NOTIFICATIONS =====
function startNotifCheck(){
  // Glucose fasting reminder check (runs every minute)
  setInterval(()=>{
    if(!settings.glucoseRemindersOn||!settings.glucoseFastingTime)return;
    if(Notification.permission!=='granted'&&settings.notif===false)return;
    const now=new Date(),h=now.getHours(),min=now.getMinutes();
    const [th,tm]=settings.glucoseFastingTime.split(':').map(Number);
    const key='gluc-fast-'+now.toDateString();
    if(h===th&&min===tm&&!firedNotifs[key]){
      firedNotifs[key]=true;
      if(Notification.permission==='granted'){
        new Notification('🩸 Daily Dose — Fasting Glucose',{body:'Time to log your fasting glucose! Tap to open.'});
      } else {
        showToast('🩸 Time to log your fasting glucose!');
      }
    }
  },60000);
  setInterval(()=>{if(!settings.notif||Notification.permission!=='granted')return;const now=new Date(),today=now.toDateString(),h=now.getHours(),min=now.getMinutes();SLOTS.filter(s=>s.id!=='as_needed').forEach(s=>{if(!settings.notifSlots?.includes(s.id))return;const target=SLOT_HRS[s.id],key=`${today}-${s.id}`;if(h===target&&min<5&&!firedNotifs[key]){const meds=ap().meds||[],doses=ap().doses||{},undone=meds.filter(m=>m.times?.includes(s.id)&&!doses[`${m.id}-${s.id}`]);if(undone.length){firedNotifs[key]=true;new Notification('☀️ The Daily Dose',{body:`${s.icon} ${s.l} time! ${undone.map(m=>m.name).join(', ')}`});}}});},60000);}

function getDeviceId(){
  let id;
  try{id=localStorage.getItem('dd_device_id');}catch(e){}
  if(!id){id='dev_'+Math.random().toString(36).slice(2)+Date.now().toString(36);try{localStorage.setItem('dd_device_id',id);}catch(e){}}
  return id;
}
function getDeviceName(){
  const ua=navigator.userAgent;
  if(/iPhone/.test(ua))return'iPhone';
  if(/iPad/.test(ua))return'iPad';
  if(/Android/.test(ua))return'Android device';
  if(/Mac/.test(ua))return'Mac';
  if(/Windows/.test(ua))return'Windows PC';
  return'Browser';
}
function registerTrustedDevice(){
  const devId=getDeviceId();
  const existing=(settings.trustedDevices||[]).find(d=>d.id===devId);
  if(!existing){
    const devName=getDeviceName()+' ('+new Date().toLocaleDateString('en-US',{month:'short',year:'numeric'})+')';
    settings.trustedDevices=[...(settings.trustedDevices||[]),{id:devId,name:devName,addedAt:new Date().toISOString()}];
    saveSet();
  }
}
function isThisDeviceTrusted(){
  return (settings.trustedDevices||[]).some(d=>d.id===getDeviceId());
}
function removeTrustedDevice(id){if(!confirm('Remove this trusted device?'))return;settings.trustedDevices=(settings.trustedDevices||[]).filter(d=>d.id!==id);saveSet();render();showToast('Device removed');}
function removeAllTrustedDevices(){if(!confirm('Sign out all trusted devices? All devices will need email login again.'))return;settings.trustedDevices=[];saveSet();render();showToast('All devices signed out');}

// ===== IDLE LOCK TIMER =====
function startIdleTimer(){
  // Clear any existing timer
  clearIdleTimer();
  if(!settings.pin)return;
  lastActiveTime=Date.now();
  // Check idle every 30 seconds
  idleLockTimer=setInterval(()=>{
    const idleMs=(settings.pinIdleMinutes||5)*60*1000;
    if(Date.now()-lastActiveTime>=idleMs){
      lockApp();
    }
  },30000);
  // Reset timer on user activity
  ['click','keydown','touchstart','scroll','mousemove'].forEach(ev=>{
    document.addEventListener(ev,resetIdleTimer,{passive:true});
  });
  // Lock when tab is hidden / switched away
  document.addEventListener('visibilitychange',handleVisibilityChange);
}
function resetIdleTimer(){lastActiveTime=Date.now();}
function clearIdleTimer(){
  if(idleLockTimer){clearInterval(idleLockTimer);idleLockTimer=null;}
}
let _hiddenAt=null;
function handleVisibilityChange(){
  if(document.hidden){
    // Tab hidden — just record when, camera/file picker also triggers this
    _hiddenAt=Date.now();
  } else {
    // Came back — only lock if hidden longer than idle threshold
    const hiddenMs=Date.now()-(_hiddenAt||Date.now());
    const idleMs=(settings.pinIdleMinutes||5)*60*1000;
    if(hiddenMs>=idleMs){
      lockApp();
    } else {
      lastActiveTime=Date.now(); // camera/quick switch — reset activity
    }
    _hiddenAt=null;
  }
}
function lockApp(){
  if(!settings.pin)return;
  appLocked=true;
  document.getElementById('pin-screen').classList.remove('hidden');
  pinBuf='';
  for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.classList.remove('on');}
  setTimeout(checkBiometricAvailable,300);
}

// ===== REFILL COUNTDOWN =====
function calcRefillDays(m){
  if(!m.quantity||!m.frequency)return null;
  const qty=Number(m.quantity);if(!qty)return null;
  const dosesPerDay={
    'Once daily':1,'Twice daily':2,'Three times daily':3,
    'Every other day':0.5,'Weekly':1/7,'With meals':3,'As needed':null
  }[m.frequency];
  if(!dosesPerDay)return null;
  return Math.floor(qty/dosesPerDay);
}

// ===== WEEKLY VIEW =====
function rWeekView(){
  const p=ap(),meds=p.meds||[],doses=p.doses||{};
  const days=[];
  for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-d.getDay()+i);days.push(d);}
  let h=`<div class="week-grid">`;
  const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  days.forEach(d=>{
    const isToday=d.toDateString()===new Date().toDateString();
    const dots=meds.map(m=>{
      const slots=m.times||[];
      return slots.map(s=>{
        const k=`${m.id}-${s}`;
        const taken=isToday?(doses[k]&&(doses[k]===true||doses[k].taken)):false;
        return`<div class="week-pill" style="background:${taken?m.color||COLORS[0]:'var(--brd)'}"></div>`;
      }).join('');
    }).join('');
    h+=`<div class="week-day${isToday?' today':''}">
      <div class="week-day-lbl">${DAY_NAMES[d.getDay()]}</div>
      <div class="week-day-date">${d.getDate()}</div>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:2px">${dots}</div>
    </div>`;
  });
  h+=`</div>
  <div style="font-size:12px;color:var(--txt3);margin-bottom:10px">● = taken &nbsp; ○ = scheduled</div>`;
  return h;
}

function rSideEffectChart(){
  const journal=ap().journal||[];

  const counts={};
  journal.forEach(e=>{(e.sx||[]).forEach(s=>{counts[s]=(counts[s]||0)+1;});});

      <div class="sx-bar-lbl">${esc(sx)}</div>

}

// ===== AUTO INTERACTION CHECK =====
async function autoInteractionCheck(newMed,others){
  showToast(`⚠️ Checking interactions for ${newMed}…`);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json',...apiHeaders()},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:400,system:'You are a medication safety assistant. Be brief and clear. General info only, not medical advice.',messages:[{role:'user',content:`Quick check: are there any notable interactions between ${newMed} and: ${others}? If yes, briefly state what. If none known, say "No known interactions found." Keep under 3 sentences.`}]})});
    const d=await r.json();
    const txt=d.content?.map(b=>b.text||'').join('')||'';
    if(txt.toLowerCase().includes('no known'))showToast(`✅ No known interactions with ${newMed}`);
    else if(txt){
      if(confirm(`⚠️ Possible interaction found for ${newMed}:\n\n${txt}\n\nOpen the Interactions checker for details?`))
        {toolTab='check';goTo('tools');}
    }
  }catch(e){console.log('Auto-check failed silently');}
}

const BADGES=[
  {id:'first',ico:'🌱',lbl:'First dose',desc:'Check off your first dose',check:p=>Object.values(p.history||{}).some(d=>Object.values(d).some(v=>v&&(v===true||v.taken)))},
  {id:'week',ico:'⭐',lbl:'7-day streak',desc:'7 days in a row',check:p=>calcStreak(p)>=7},
  {id:'fortnight',ico:'🌟',lbl:'2-week streak',desc:'14 days in a row',check:p=>calcStreak(p)>=14},
  {id:'month',ico:'🏆',lbl:'30-day streak',desc:'30 days in a row',check:p=>calcStreak(p)>=30},
  {id:'century',ico:'💎',lbl:'100 days',desc:'100-day streak',check:p=>calcStreak(p)>=100},
  {id:'journaler',ico:'📓',lbl:'Journaler',desc:'Write 10 journal entries',check:p=>(p.journal||[]).length>=10},
  {id:'goalset',ico:'🎯',lbl:'Goal setter',desc:'Set a wellness goal',check:p=>(p.goals||[]).length>=1},
  {id:'hydrated',ico:'💧',lbl:'Hydrated',desc:'Hit water goal 3 days',check:p=>checkWaterBadge(p)},
];

function calcStreak(p){
  const hist=p.history||{};
  const total=(p.meds||[]).reduce((a,m)=>a+(m.times?.length||0),0);
  if(!total)return 0;
  let streak=0,d=new Date();d.setDate(d.getDate()-1);
  for(let i=0;i<200;i++){
    const dh=hist[d.toDateString()];
    if(!dh)break;
    if(Object.values(dh).filter(v=>v&&(v===true||v.taken)).length<total)break;
    streak++;d.setDate(d.getDate()-1);
  }
  return streak;
}

function checkWaterBadge(p){
  const wh=p.waterHistory||{};
  const goal=(p.goals||[]).find(g=>g.type==='water');
  const target=goal?goal.target:8;
  return Object.values(wh).filter(v=>v>=target).length>=3;
}

const FLOW_LEVELS=[{id:'spotting',lbl:'Spotting',ico:'🔸'},{id:'light',lbl:'Light',ico:'🟡'},{id:'medium',lbl:'Medium',ico:'🟠'},{id:'heavy',lbl:'Heavy',ico:'🔴'}];

function rCycle(){

  <div style="font-size:15px;color:var(--txt2);margin-bottom:16px">Irregular cycle tracking — log as it happens</div>`;

  if(current){

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">

    </div>`;
    // Daily log history for current
    if(current.days&&current.days.length){
      h+=`<div class="card" style="margin-bottom:14px"><div style="font-size:14px;font-weight:800;color:var(--txt);margin-bottom:10px">This period — daily log</div>`;
      current.days.slice().reverse().forEach(d=>{
        const fl=FLOW_LEVELS.find(f=>f.id===d.flow);
        h+=`<div style="padding:7px 0;border-bottom:1px solid var(--brd)">
          <div style="display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:700;color:var(--txt)">${new Date(d.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span><span style="font-size:13px">${fl?fl.ico+' '+fl.lbl:''}</span></div>
          ${d.symptoms&&d.symptoms.length?`<div style="font-size:12px;color:var(--txt3);margin-top:2px">${d.symptoms.join(', ')}</div>`:''}

      <div style="font-size:13px;color:var(--txt3);margin-bottom:14px">Tap below when your period starts</div>
      <button class="btnp" style="padding:12px 28px;font-size:15px" onclick="startPeriod()">🩸 Period started</button>
    </div>`;
  }

  // Past periods
  if(past.length){
    h+=`<div class="card"><div style="font-size:15px;font-weight:800;color:var(--txt);margin-bottom:12px">Period history</div>`;
    past.forEach(p=>{
      const dur=p.endDate?Math.floor((new Date(p.endDate)-new Date(p.startDate))/(1000*60*60*24))+1:'ongoing';
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--brd)">

let _periodDayFlow='',_periodDaySx=[];
function startPeriod(){
  const periods=ap().periods||[];
  const np={id:'per'+Date.now(),startDate:new Date().toISOString(),active:true,days:[]};
  upAP({periods:[...periods,np]});render();showToast('🩸 Period started!');
}
function endPeriod(id){
  const periods=(ap().periods||[]).map(p=>p.id===id?{...p,active:false,endDate:new Date().toISOString()}:p);
  upAP({periods});render();showToast('Period ended — logged!');
}
function logPeriodDay(pid,flow){
  _periodDayFlow=flow;
  document.querySelectorAll('[id^="fl-"]').forEach(b=>b.classList.remove('on'));
  const btn=document.getElementById('fl-'+flow);if(btn)btn.classList.add('on');
}
function togglePeriodSx(pid,sx){
  if(_periodDaySx.includes(sx))_periodDaySx=_periodDaySx.filter(s=>s!==sx);
  else _periodDaySx=[..._periodDaySx,sx];
  document.querySelectorAll('[id^="psx-"]').forEach(b=>{const s=b.id.replace('psx-','').replace(/-/g,' ');b.classList.toggle('on',_periodDaySx.includes(s));});
}
function savePeriodDay(pid){
  if(!_periodDayFlow){alert('Select a flow level first.');return;}
  const entry={date:new Date().toISOString().slice(0,10),flow:_periodDayFlow,symptoms:[..._periodDaySx]};
  const periods=(ap().periods||[]).map(p=>{
    if(p.id!==pid)return p;
    const days=(p.days||[]).filter(d=>d.date!==entry.date);
    return{...p,days:[...days,entry]};
  });
  upAP({periods});_periodDayFlow='';_periodDaySx=[];render();showToast('✅ Day logged!');
}
function delPeriod(id){if(confirm('Delete this period record?')){upAP({periods:(ap().periods||[]).filter(p=>p.id!==id)});render();}}

  <div style="font-size:15px;color:var(--txt2);margin-bottom:16px">Get general guidance on what to do — always confirm with your doctor</div>

  h+=`<button class="btnp" style="width:100%;padding:14px;font-size:16px" ${missOn?'disabled':''} onclick="checkMissDose()">${missOn?'⏳ Looking up...':'💊 What should I do?'}</button>`;
  if(missRes)h+=`<div class="miss-box"><div style="font-size:14px;font-weight:800;color:var(--txt2);margin-bottom:8px">General guidance:</div>${esc(missRes)}</div>`;

async function checkMissDose(){
  const sel=document.getElementById('miss-sel')?.value||'';
  const [name,dosage,freq]=sel.split('|');
  if(!name)return;
  missOn=true;missRes='';
  document.getElementById('mc').innerHTML=await rMissDose();
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json',...apiHeaders()},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,system:'You are a helpful medication information assistant. Provide general guidance only, never specific medical advice. Be warm, clear, and practical.',messages:[{role:'user',content:`Someone missed a dose of ${name}${dosage?' ('+dosage+')':''}${freq?', taken '+freq:''}. What is the general guidance about what to do when you miss a dose of this medication? Should they take it when they remember, skip it, double up? What should they watch for? Keep it practical and under 150 words. Remind them to follow their doctor's specific instructions.`}]})});
    const d=await r.json();
    missRes=d.content?.map(b=>b.text||'').join('')||'Could not get guidance.';
  }catch(e){missRes='Could not connect right now. Please check your connection and try again.';}
  missOn=false;
  document.getElementById('mc').innerHTML=await rMissDose();
}

// ===== TIMING SUGGESTION (single med) =====
let suggestOn=false;
async function suggestTiming(){
  const name=(document.getElementById('fn')?.value||'').trim();
  if(!name){alert('Enter a medication or supplement name first.');return;}
  const box=document.getElementById('suggest-box');
  if(!box)return;
  box.innerHTML=`<div style="font-size:13px;color:var(--grn);font-weight:700;padding:8px 0">✨ Analyzing ${name}...</div>`;
  const others=(ap().meds||[]).filter(m=>m.name!==name).map(m=>`${m.name}${m.dosage?' ('+m.dosage+')':''}${m.times?.length?' – '+m.times.join('/'):''}${m.withFood?' – with food':''}`).join(', ');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json',...apiHeaders()},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,
      system:'You are a friendly medication timing expert. Give practical, specific advice. Always note this is general information only, not medical advice. Respond ONLY in this exact JSON format with no other text: {"bestTime":"morning|afternoon|evening|night|as_needed","withFood":true|false,"reasoning":"1-2 sentence explanation why","tips":"1-2 practical tips","conflict":"any timing conflict with other meds, or empty string"}',
      messages:[{role:'user',content:`Best time to take: ${name}. Current medications the person also takes: ${others||'none'}. Provide timing recommendation.`}]})
    });
    const d=await r.json();
    const raw=d.content?.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    const info=JSON.parse(raw);

    // Map bestTime to SLOT id
    const timeMap={'morning':'morning','afternoon':'afternoon','evening':'evening','night':'night','as_needed':'as_needed'};
    const slotId=timeMap[info.bestTime]||'morning';
    const slotLabel={'morning':'🌅 Morning','afternoon':'☀️ Afternoon','evening':'🌆 Evening','night':'🌙 Night','as_needed':'⚡ As needed'}[slotId]||'🌅 Morning';

    box.innerHTML=`<div style="background:var(--grn-l);border:1.5px solid var(--grn-b);border-radius:14px;padding:14px;margin-top:4px">
      <div style="font-size:14px;font-weight:800;color:var(--grn);margin-bottom:8px">✨ Recommendation for ${esc(name)}</div>
      <div style="display:flex;gap:10px;margin-bottom:10px">
        <div style="background:var(--card);border:1.5px solid var(--grn-b);border-radius:10px;padding:8px 14px;font-size:14px;font-weight:700;color:var(--txt)">⏰ ${slotLabel}</div>
        <div style="background:var(--card);border:1.5px solid var(--grn-b);border-radius:10px;padding:8px 14px;font-size:14px;font-weight:700;color:var(--txt)">${info.withFood?'🍽️ With food':'💧 Without food'}</div>
      </div>
      <div style="font-size:14px;color:var(--txt);line-height:1.65;margin-bottom:8px">${esc(info.reasoning)}</div>
      ${info.tips?`<div style="font-size:13px;color:var(--txt2);line-height:1.65;margin-bottom:8px">💡 ${esc(info.tips)}</div>`:''}
      ${info.conflict?`<div style="font-size:13px;color:#C85858;font-weight:700;background:var(--rose-l);border:1px solid var(--rose-b);border-radius:8px;padding:8px 12px;margin-bottom:8px">⚠️ ${esc(info.conflict)}</div>`:''}
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btnp" style="font-size:13px;padding:8px 14px" onclick="applyTimingSuggestion('${slotId}',${info.withFood})">✅ Apply this suggestion</button>
        <div style="font-size:11px;color:var(--txt3);align-self:center;font-style:italic">General info only — not medical advice</div>
      </div>
    </div>`;
  }catch(e){
    box.innerHTML=`<div style="font-size:13px;color:var(--txt3);padding:8px 0">Could not get suggestion. Check your connection and try again.</div>`;
  }
}

function applyTimingSuggestion(slotId, withFood){
  // Set the time slot
  if(!editing.times)editing.times=[];
  if(!editing.times.includes(slotId))editing.times=[slotId];
  editing.withFood=withFood;
  // Update UI checkboxes
  document.querySelectorAll('.tt').forEach(el=>{

// ===== PUSH NOTIFICATIONS (Service Worker) =====
function registerServiceWorker(){
  if(!('serviceWorker' in navigator))return;
  // Inline service worker as blob
  var swCode=[
    'var CACHE="tdd-v1";',
    'self.addEventListener("install",function(e){self.skipWaiting();});',
    'self.addEventListener("activate",function(e){e.waitUntil(self.clients.claim());});',
    'self.addEventListener("push",function(e){',
    '  var data=e.data?e.data.json():{title:"The Daily Dose",body:"Time for your medication!"};',
    '  e.waitUntil(self.registration.showNotification(data.title||"☀️ The Daily Dose",{',
    '    body:data.body||"Time for your medication!",',
    '    icon:data.icon||"",',
    '    badge:data.badge||"",',
    '    tag:data.tag||"tdd",',
    '    requireInteraction:false,',
    '    data:data',
    '  }));',
    '});',
    'self.addEventListener("notificationclick",function(e){',
    '  e.notification.close();',
    '  e.waitUntil(clients.openWindow("/"));',
    '});'
  ].join('\n');
  var blob=new Blob([swCode],{type:'application/javascript'});
  var swURL=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL).then(function(reg){
    console.log('SW registered');
    window._swReg=reg;
    scheduleNotifications(reg);
  }).catch(function(e){
    console.warn('SW registration failed:',e.message);
  });
}

function scheduleNotifications(reg){
  if(!settings.notif||Notification.permission!=='granted')return;
  // Clear existing timers, set new ones based on slot hours
  SLOTS.filter(function(s){return s.id!=='as_needed';}).forEach(function(s){
    if(!settings.notifSlots||!settings.notifSlots.includes(s.id))return;
    var now=new Date();
    var target=new Date();
    target.setHours(SLOT_HRS[s.id]||8,0,0,0);
    if(target<=now)target.setDate(target.getDate()+1);
    var delay=target-now;
    setTimeout(function(){
      var meds=ap().meds||[];
      var doses=ap().doses||{};
      var undone=meds.filter(function(m){
        return m.times&&m.times.includes(s.id)&&!doses[m.id+'-'+s.id];
      });
      if(!undone.length)return;
      var body=undone.map(function(m){return m.name;}).join(', ');
      if(reg&&reg.active){
        reg.active.postMessage({type:'notify',title:'☀️ '+s.l+' meds!',body:body});
      } else {
        new Notification('☀️ '+s.l+' meds!',{body:body});
      }
      // Reschedule for tomorrow
      scheduleNotifications(reg);
    },delay);
  });
}

async function enableNotifications(){
  var perm=await Notification.requestPermission();
  if(perm!=='granted'){
    alert('Please allow notifications in your browser settings to get reminders.');
    return false;
  }
  settings.notif=true;
  saveSet();
  registerServiceWorker();
  showToast('🔔 Notifications enabled!');
  return true;
}

async function doLookupCare(){
  var code=(document.getElementById('care-input')?.value||careInput).trim().toUpperCase();
  if(code.length<6){
    var el=document.getElementById('care-err');
    if(el)el.textContent='Please enter a valid 8-character code.';
    return;
  }
  careInput=code;
  var data=await lookupCareCode(code);
  if(!data){
    careData=null;
    var el=document.getElementById('care-err');
    if(el)el.textContent='Code not found or sharing is disabled. Ask them to enable sharing first.';
    render();
    return;
  }
  careData=data;
  render();
  showToast('✅ Connected!');
}

function toggleCareEnabled(){
  var p=ap();
  upAP({careEnabled:!p.careEnabled});
  saveCareSettings();
  render();
  showToast((ap().careEnabled?'✅ Sharing enabled':'🔒 Sharing disabled'));
}

function copyCareCode(code){
  navigator.clipboard.writeText(code).then(function(){
    showToast('📋 Care code copied!');
  }).catch(function(){
    prompt('Your care code:',code);
  });
}

function printCareCardById(nameOrId){

}
