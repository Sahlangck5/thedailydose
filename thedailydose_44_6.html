<style>
:root{
  --bg:#FDF6EC;--card:#FFFDF8;--brd:#EDE0CC;
  --txt:#3D2B1F;--txt2:#8B7355;--txt3:#C4A882;
  --ibg:#FFF9F2;--ibrd:#DDD0B8;--sbg:#F5EDE0;--stxt:#8B7355;
  --hdr:#FFFDF8;--shad:rgba(139,100,60,.1);
  --grn:#7BAB8B;--grn-l:#EAF4ED;--grn-b:#B8D4BE;
  --rose:#D4A0A0;--rose-l:#FBF0F0;--rose-b:#E8C4C4;
  --blue:#90B8D8;--blue-l:#EBF4FB;
  --peach:#F0B898;--peach-l:#FEF4EC;
  --lav:#B8A4D8;--lav-l:#F5F0FC;
}
body.dark{
  /* Deep Ghibli night sky */
  --bg:#0D0E1F;--card:#161828;--brd:#272A45;
  --txt:#F0EAD6;--txt2:#9B94B8;--txt3:#524E6E;
  --ibg:#1B1D32;--ibrd:#333660;--sbg:#1B1D32;--stxt:#B0AACC;
  --hdr:#101120;--shad:rgba(0,0,0,.55);
  --grn:#8DBFA0;--grn-l:#0E2A1C;--grn-b:#1E5035;
  --rose:#C8909A;--rose-l:#2A1520;--rose-b:#6A2840;
  --blue:#88B4D8;--blue-l:#101E34;
  --peach:#D4906A;--peach-l:#221408;
  --lav:#A894D4;--lav-l:#160E2E;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;color:var(--txt);font-size:16px;transition:background .3s,color .3s}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#login-screen.hidden{display:none}
.login-box{background:var(--card);border:2px solid var(--brd);border-radius:28px;padding:36px 30px;width:100%;max-width:400px;box-shadow:0 16px 60px var(--shad)}
.login-logo{text-align:center;margin-bottom:8px}
.login-title{font-family:'Fredoka One',cursive;font-size:30px;color:var(--grn);text-align:center;letter-spacing:.5px}
.login-sub{font-size:15px;color:var(--txt2);text-align:center;margin-bottom:28px;margin-top:4px;font-weight:600}
.login-err{font-size:14px;color:#C85858;text-align:center;min-height:20px;margin-bottom:8px;line-height:1.4;font-weight:700}
.login-err.ok{color:var(--grn)}
.login-tabs{display:flex;background:var(--sbg);border-radius:16px;padding:4px;margin-bottom:20px}
.login-tab{flex:1;padding:10px;border:none;background:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--stxt);transition:all .2s}
.login-tab.on{background:var(--card);color:var(--grn);box-shadow:0 3px 14px var(--shad);font-weight:800}
.login-inp{width:100%;padding:13px 16px;border:2px solid var(--ibrd);border-radius:16px;font-size:16px;background:var(--ibg);color:var(--txt);font-family:'Nunito',sans-serif;margin-bottom:12px;font-weight:600;transition:border-color .2s}
.login-inp:focus{outline:none;border-color:var(--grn);box-shadow:0 0 0 4px var(--grn-l)}
.login-btn{width:100%;padding:15px;background:var(--grn);color:#fff;border:none;border-radius:30px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:4px;transition:all .2s;box-shadow:0 6px 20px rgba(123,171,139,.35);letter-spacing:.3px}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(123,171,139,.45)}
.login-btn:disabled{opacity:.55;cursor:default;transform:none;box-shadow:none}

/* PIN */
#pin-screen{position:fixed;inset:0;background:var(--hdr);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px}
#pin-screen.hidden{display:none}
.pin-dots{display:flex;gap:16px;margin:4px 0}
.pin-dot{width:20px;height:20px;border-radius:50%;border:2.5px solid var(--grn);background:transparent;transition:background .15s}
.pin-dot.on{background:var(--grn)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:270px}
.pin-btn{padding:20px;border-radius:50%;border:2px solid var(--brd);background:var(--card);font-size:22px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--txt);transition:all .15s;box-shadow:0 4px 14px var(--shad)}
.pin-btn:active{transform:scale(.93)}
.pin-emerg{background:var(--rose-l);color:#C85858;border:2px solid var(--rose-b);padding:14px 20px;border-radius:16px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:6px;width:270px;text-align:center}

/* EMERGENCY */
#emerg-overlay{position:fixed;inset:0;background:var(--card);z-index:4000;overflow-y:auto;padding:20px;display:none}
#emerg-overlay.show{display:block}
#archive-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5000;display:flex;align-items:flex-end;justify-content:center}
#archive-modal.hidden{display:none}
.archive-sheet{background:var(--card);border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:480px;box-shadow:0 -8px 32px var(--shad)}
.archive-reason-btn{width:100%;padding:14px 16px;border:2px solid var(--brd);border-radius:14px;background:var(--sbg);color:var(--txt);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;text-align:left;transition:all .2s;display:block}
.archive-reason-btn:hover{border-color:var(--grn);background:var(--grn-l)}

body.dark .refill-warn{background:#2a1c08;color:#d4a060}
body.dark .refill-danger{background:#2a0e0e;color:#f48fb1}
.appt-card{background:var(--card);border:1.5px solid var(--brd);border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 3px 14px var(--shad)}
.appt-date-box{background:var(--grn-l);border:1.5px solid var(--grn-b);border-radius:12px;padding:8px 12px;text-align:center;flex-shrink:0;min-width:52px}
.appt-month{font-size:11px;font-weight:800;color:var(--grn);text-transform:uppercase;letter-spacing:.5px}
.appt-day{font-size:22px;font-weight:800;color:var(--grn);line-height:1}
.sx-chart{margin-top:10px}
.sx-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sx-bar-lbl{font-size:13px;color:var(--txt);min-width:110px;font-weight:600}
.sx-bar-bg{flex:1;height:16px;background:var(--sbg);border-radius:8px;overflow:hidden}
.sx-bar-fill{height:100%;background:var(--rose);border-radius:8px;transition:width .4s}
.sx-bar-cnt{font-size:12px;font-weight:800;color:var(--txt2);min-width:24px;text-align:right}
.pill-photo{width:56px;height:56px;border-radius:12px;object-fit:cover;border:2px solid var(--brd);flex-shrink:0}
.late-chip{font-size:11px;padding:2px 8px;border-radius:20px;background:#fff8e1;color:#f57c00;border:1px solid #ffe082;font-weight:700;margin-left:6px}
body.dark .late-chip{background:#2a1c08;color:#d4a060;border-color:#5a4020}
.history-row{font-size:12px;color:var(--txt3);padding:4px 0;border-bottom:1px solid var(--brd);display:flex;gap:8px}
.history-row:last-child{border-bottom:none}
.expiry-warn{font-size:12px;color:#f57c00;font-weight:700}
.expiry-danger{font-size:12px;color:#c62828;font-weight:700}
#qr-box{display:flex;justify-content:center;margin:14px 0}
#qr-box canvas,#qr-box img{border-radius:10px;border:3px solid var(--brd)}

/* ── Wellness / Streaks / Goals ── */
.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.badge-item{background:var(--card);border:1.5px solid var(--brd);border-radius:16px;padding:12px 8px;text-align:center;box-shadow:0 3px 12px var(--shad)}
.badge-item.earned{border-color:#E8B818;background:linear-gradient(135deg,#FFF8E0,#FFF0A0)}
body.dark .badge-item.earned{background:linear-gradient(135deg,#2A2000,#1A1800);border-color:#8B7000}
.badge-ico{font-size:28px;margin-bottom:4px}
.badge-lbl{font-size:11px;font-weight:800;color:var(--txt2)}
.badge-item.earned .badge-lbl{color:#8B6000}
body.dark .badge-item.earned .badge-lbl{color:#D4A000}
.badge-item.locked{opacity:.45}
.water-track{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.water-drop{font-size:26px;cursor:pointer;transition:transform .15s;line-height:1}
.water-drop:active{transform:scale(.88)}
.water-drop.filled{filter:hue-rotate(0deg)}
.water-drop.empty{filter:grayscale(1);opacity:.35}
.goal-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1.5px solid var(--brd)}
.goal-row:last-child{border-bottom:none}
.goal-prog{flex:1;height:10px;background:var(--sbg);border-radius:5px;overflow:hidden}
.goal-prog-fill{height:100%;border-radius:5px;transition:width .4s}
.vitals-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.vital-card{background:var(--card);border:1.5px solid var(--brd);border-radius:16px;padding:14px;box-shadow:0 3px 12px var(--shad)}
.vital-val{font-size:28px;font-weight:800;color:var(--txt);line-height:1;margin:4px 0}
.vital-unit{font-size:12px;color:var(--txt3);font-weight:600}
.vital-trend{font-size:12px;margin-top:4px;font-weight:700}
.vital-trend.up{color:#e57373}
.vital-trend.down{color:#7BAB8B}
.vital-trend.same{color:var(--txt3)}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.photo-thumb{aspect-ratio:1;border-radius:12px;object-fit:cover;border:1.5px solid var(--brd);width:100%}
.photo-date{font-size:11px;color:var(--txt3);text-align:center;margin-top:3px;font-weight:600}
.miss-box{background:var(--sbg);border:1.5px solid var(--brd);border-radius:14px;padding:14px;margin-top:10px;font-size:14px;line-height:1.75;color:var(--txt);white-space:pre-wrap}
.quick-call-btn{display:flex;align-items:center;gap:12px;background:var(--grn-l);border:2px solid var(--grn-b);border-radius:16px;padding:14px 16px;cursor:pointer;font-family:'Nunito',sans-serif;width:100%;margin-bottom:10px;transition:all .2s;text-decoration:none}
.quick-call-btn:hover{background:var(--grn);border-color:var(--grn)}
.quick-call-btn:hover .qc-name,.quick-call-btn:hover .qc-role,.quick-call-btn:hover .qc-num{color:#fff}
.qc-name{font-size:15px;font-weight:800;color:var(--txt)}
.qc-role{font-size:12px;color:var(--txt2)}
.qc-num{font-size:16px;font-weight:800;color:var(--grn);margin-left:auto}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:2px;animation:confetti-fall 2.5s ease-in forwards}
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* ── Onboarding ── */
#onboarding{position:fixed;inset:0;background:var(--bg);z-index:2500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#onboarding.hidden{display:none}
.ob-box{background:var(--card);border:1.5px solid var(--brd);border-radius:28px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 16px 60px var(--shad);text-align:center}
.ob-step-dots{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
.ob-dot{width:10px;height:10px;border-radius:50%;background:var(--brd);transition:background .3s}
.ob-dot.on{background:var(--grn)}
.ob-ico{font-size:56px;margin-bottom:12px;line-height:1}
.ob-title{font-family:'Fredoka One',cursive;font-size:26px;color:var(--txt);margin-bottom:8px}
.ob-sub{font-size:15px;color:var(--txt2);line-height:1.6;margin-bottom:24px;font-weight:600}
.ob-btn{width:100%;padding:14px;background:var(--grn);color:#fff;border:none;border-radius:30px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 6px 20px rgba(123,171,139,.35);margin-bottom:10px;transition:all .2s}
.ob-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(123,171,139,.45)}
.ob-skip{background:none;border:none;font-size:14px;color:var(--txt3);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;padding:6px}
.ob-checklist{text-align:left;margin-bottom:20px}
.ob-check-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--brd);font-size:15px;color:var(--txt);font-weight:600}
.ob-check-item:last-child{border-bottom:none}
.ob-check-ico{font-size:22px;flex-shrink:0}
/* ── Caregiver ── */
.care-card{background:var(--card);border:1.5px solid var(--brd);border-radius:16px;padding:16px 18px;margin-bottom:12px;box-shadow:0 3px 14px var(--shad)}
.care-code{font-size:28px;font-weight:800;letter-spacing:6px;color:var(--grn);text-align:center;padding:16px;background:var(--grn-l);border-radius:12px;border:2px dashed var(--grn-b);margin:10px 0;font-family:'Fredoka One',cursive}
.care-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:800}
.care-live{background:#e8f5ee;color:#1b7a4e;border:1px solid #a5d6be}
.care-readonly{background:#e3f0fc;color:#1565c0;border:1px solid #90caf9}
body.dark .care-live{background:#0e2a1c;color:#8dbfa0}
body.dark .care-readonly{background:#101e34;color:#64b5f6}

/* Biometric & forgot PIN */
.bio-btn{width:100%;padding:13px;background:var(--sbg);border:2px solid var(--grn-b);border-radius:30px;font-size:16px;font-weight:700;color:var(--grn);cursor:pointer;font-family:'Nunito',sans-serif;margin-top:8px;transition:all .2s}
.bio-btn:hover{background:var(--grn-l)}
.forgot-btn{background:none;border:none;font-size:13px;color:var(--txt3);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;padding:8px;margin-top:4px;text-decoration:underline}
.forgot-btn:hover{color:var(--grn)}
/* Trusted device list */
.device-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1.5px solid var(--brd);font-size:14px}
.device-row:last-child{border-bottom:none}
.device-name{font-weight:700;color:var(--txt)}
.device-meta{font-size:12px;color:var(--txt3);margin-top:2px}

/* Settings gear in header */
/* Profile area — profile button stacked above sync chip */
.prof-area{display:flex;flex-direction:column;align-items:flex-end;gap:4px}

// ===== CLOUD SYNC =====
function setSyncStatus(s){const el=document.getElementById('sync-chip');if(!el)return;const m={loading:'⏳ Loading…',saving:'🔄 Saving…',synced:'✓ Synced',error:'⚠️ Offline'};el.textContent=m[s]||'';}

async function loadCloud(){
  if(!currentUser)return;
  setSyncStatus('loading');
  try{
    const{data,error}=await sb.from('user_data').select('profiles,settings').eq('id',currentUser.id).single();
    if(error&&error.code!=='PGRST116')throw error;
    if(data&&data.profiles&&data.profiles.length){
      profiles=data.profiles;
      if(data.settings)settings={...settings,...data.settings};
    } else {
      // New user — migrate local data if any
      try{const r=localStorage.getItem('dd_profiles_v1');if(r)profiles=JSON.parse(r);}catch(e){}
      if(!profiles.length)profiles=[mkProf('My Profile')];
      await saveCloud();
    }
    if(!activeId||!profiles.find(p=>p.id===activeId))activeId=profiles[0]?.id;
    setSyncStatus('synced');
  }catch(e){setSyncStatus('error');tryLoadLocal();}
}

async function saveCloud(){
  if(!currentUser)return;
  try{
    await sb.from('user_data').upsert({id:currentUser.id,profiles,settings:{darkMode:settings.darkMode,notifSlots:settings.notifSlots,pin:settings.pin,pinIdleMinutes:settings.pinIdleMinutes,trustedDevices:settings.trustedDevices||[]},care_enabled:ap().careEnabled||false,care_code:currentUser?currentUser.id.replace(/-/g,'').substring(0,8).toUpperCase():null,updated_at:new Date().toISOString()},{onConflict:'id'});
    setSyncStatus('synced');
    // also cache locally
    try{localStorage.setItem('dd_profiles_v1',JSON.stringify(profiles));}catch(e){}
  }catch(e){setSyncStatus('error');}
}

function scheduleSave(){setSyncStatus('saving');clearTimeout(saveTimer);saveTimer=setTimeout(saveCloud,1500);}
function saveSet(){try{localStorage.setItem(SetK,JSON.stringify(settings));}catch(e){}scheduleSave();}

function tryLoadLocal(){
  try{const r=localStorage.getItem('dd_profiles_v1');if(r)profiles=JSON.parse(r);}catch(e){}
  try{const r=localStorage.getItem(SetK);if(r)settings={...settings,...JSON.parse(r)};}catch(e){}
  if(!profiles.length)profiles=[mkProf('My Profile')];
  if(!activeId||!profiles.find(p=>p.id===activeId))activeId=profiles[0]?.id;
}

// ===== AUTH / LOGIN =====
let loginTab='in';
function setLoginTab(t){
  loginTab=t;
  document.getElementById('lt-in').classList.toggle('on',t==='in');
  document.getElementById('lt-up').classList.toggle('on',t==='up');
  document.getElementById('login-btn').textContent=t==='in'?'Sign in':'Create account';
  document.getElementById('login-pwd2-wrap').style.display=t==='up'?'block':'none';
  document.getElementById('forgot-wrap').style.display=t==='in'?'block':'none';
  document.getElementById('login-err').textContent='';
}
function setLoginErr(msg,ok=false){const el=document.getElementById('login-err');el.textContent=msg;el.className='login-err'+(ok?' ok':'');}
function setLoginLoading(on){document.getElementById('login-btn').disabled=on;document.getElementById('login-btn').textContent=on?'Please wait…':(loginTab==='in'?'Sign in':'Create account');}

async function doAuth(){
  const email=(document.getElementById('login-email').value||'').trim();
  const pwd=document.getElementById('login-pwd').value||'';
  if(!email||!pwd){setLoginErr('Please enter your email and password.');return;}
  setLoginLoading(true);setLoginErr('');
  if(loginTab==='in'){
    var signInResult;
    try{signInResult=await sb.auth.signInWithPassword({email,password:pwd});}
    catch(e){setLoginErr('Connection failed — check your internet and try again.');setLoginLoading(false);return;}
    const{error}=signInResult;
    if(error){setLoginErr(error.message==='Failed to fetch'?'Connection failed — check your internet connection.':error.message);setLoginLoading(false);}
  } else {
    const pwd2=document.getElementById('login-pwd2').value||'';
    if(pwd.length<6){setLoginErr('Password must be at least 6 characters.');setLoginLoading(false);return;}
    if(pwd!==pwd2){setLoginErr('Passwords do not match.');setLoginLoading(false);return;}
    const{error}=await sb.auth.signUp({email,password:pwd});
    setLoginLoading(false);
    if(error)setLoginErr(error.message);
    else setLoginErr('✅ Account created! Check your email to confirm, then sign in.',true);
  }
}
async function resetPwd(){
  const email=(document.getElementById('login-email').value||'').trim();
  if(!email){setLoginErr('Enter your email above first.');return;}
  const{error}=await sb.auth.resetPasswordForEmail(email);
  setLoginErr(error?error.message:'📧 Reset link sent! Check your email.',!error);
}
async function logout(){if(!confirm('Sign out?'))return;await sb.auth.signOut();}

  }

function toggleDose(k){
  const d={...(ap().doses||{})};

  const nowHour=new Date().getHours();
  const isLate=!d[k]&&Math.abs(nowHour-slotHour)>=2;

async function scanLabelForPrefill(input){
  const file=input.files[0];if(!file)return;
  const st=document.getElementById('scan-st2');
  if(!getApiKey())return noKeyMsg(st)&&void 0;
  if(st){st.style.color='#1976d2';st.textContent='🔍 Scanning label — this takes a few seconds...';}
  try{
    const b64=await compressImg(file);
    const prompt=`You are reading a prescription label or medication packaging. Extract ALL visible fields. For each field provide confidence: "high" (clearly visible) or "low" (partially visible/inferred).

Return ONLY valid JSON:
{
  "isLabel": true,
  "name": {"value": "Metformin", "confidence": "high"},
  "dosageAmount": {"value": "500", "confidence": "high"},
  "dosageUnit": {"value": "mg", "confidence": "high"},
  "frequency": {"value": "Twice daily", "confidence": "high"},
  "rxNumber": {"value": "1234567", "confidence": "low"},
  "expiryDate": {"value": "2026-03-01", "confidence": "high"},
  "quantity": {"value": "90", "confidence": "high"},
  "withFood": {"value": true, "confidence": "low"},
  "notes": {"value": "Take with meals", "confidence": "high"}
}

Rules:
- If not a medication label/packaging: {"isLabel": false}
- dosageUnit must be one of: mg, mcg, g, mL, IU, units, %
- frequency must be one of: Once daily, Twice daily, Three times daily, Every other day, Weekly, With meals, As needed
- expiryDate format: YYYY-MM-DD
- Omit fields not found (don't include them in JSON)`;
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json',...apiHeaders()},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:prompt}]}]})});
    const d=await r.json();
    console.log('Scan API status:',r.status,'response:',JSON.stringify(d).substring(0,300));
    if(!r.ok){if(st){st.style.color='#c62828';st.textContent='⚠️ API error '+r.status+': '+(d.error?.message||'unknown error');}return;}
    const txt=(d.content?.map(b=>b.text||'').join('')||'').replace(/```json|```/g,'').trim();
    const info=JSON.parse(txt);
    if(!info.isLabel){
      if(st){st.style.color='#c62828';st.textContent='⚠️ Couldn\'t detect a medication label — please fill in manually.';}
      return;
    }
    let filled=0,review=0;
    function applyField(elId,fieldData,isCheckbox=false){
      if(!fieldData||fieldData.value===undefined||fieldData.value===null)return;
      const el=document.getElementById(elId);
      if(!el)return;
      const cls=fieldData.confidence==='high'?'scan-field-green':'scan-field-yellow';
      if(fieldData.confidence==='high')filled++;else review++;
      if(isCheckbox){el.checked=!!fieldData.value;}
      else{el.value=fieldData.value;}
      el.classList.add(cls);
      // add confidence badge to label
      const lbl=el.closest('.fld')?.querySelector('.lbl');
      if(lbl&&!lbl.querySelector('.scan-conf-green,.scan-conf-yellow')){
        const badge=document.createElement('span');
        badge.className=fieldData.confidence==='high'?'scan-conf-green':'scan-conf-yellow';
        badge.textContent=fieldData.confidence==='high'?'✓ Scanned':'⚠️ Review';
        lbl.appendChild(badge);
      }
    }
    // Apply all fields
    if(info.name){applyField('fn',info.name);if(info.name.value)editing.name=info.name.value;}
    if(info.dosageAmount)applyField('fdamt',info.dosageAmount);
    if(info.dosageUnit)applyField('fdunit',info.dosageUnit);
    if(info.frequency)applyField('ff',info.frequency);
    if(info.rxNumber)applyField('frx',info.rxNumber);
    if(info.expiryDate)applyField('fexp',info.expiryDate);
    if(info.quantity)applyField('fq',info.quantity);
    if(info.withFood)applyField('ff2',info.withFood,true);
    if(info.notes)applyField('fno',info.notes);
    const total=filled+review;
    if(total===0){
      if(st){st.style.color='#c62828';st.textContent='⚠️ Label found but couldn\'t read details — please fill in manually.';}
    } else {
      if(st){st.style.color='#1b7a4e';st.textContent=`✅ ${filled} field${filled!==1?'s':''} filled${review>0?` · ⚠️ ${review} field${review!==1?'s':''} need review`:''}`;}
    }
  }catch(e){
    if(st){st.style.color='#c62828';st.textContent='⚠️ Scan error: '+e.message;}
    console.error('Scan error full:',e);
  }
}
function compressImg(file){return new Promise(res=>{const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{const cv=document.createElement('canvas'),r=Math.min(1024/img.width,1024/img.height,1);cv.width=img.width*r;cv.height=img.height*r;cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);res(cv.toDataURL('image/jpeg',.75).split(',')[1]);};img.src=e.target.result;};rd.readAsDataURL(file);});}

  </div>
  <div class="ins-card"><div class="ins-title">📅 28-Day Adherence</div><div class="heatmap">${buildHeatmap(hm,days28)}</div><div style="display:flex;gap:14px;margin-top:12px;font-size:12px;color:var(--txt3)"><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#1b7a4e;margin-right:5px"></span>80%+</span><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#f9a825;margin-right:5px"></span>50–79%</span><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#e57373;margin-right:5px"></span>&lt;50%</span><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:var(--sbg);margin-right:5px"></span>No data</span></div></div>

function addEntry(){const text=(document.getElementById('jtext')?.value||'').trim();if(!text){alert('Write something first!');return;}const j=[{id:'j'+Date.now(),date:new Date().toISOString(),mood:jMood,sx:[...jSx],text},...(ap().journal||[])];jSx=[];upAP({journal:j});render();showToast('📝 Entry saved!');}

function rTools(){const sub=`<div class="sub-nav"><button class="sub-tab${toolTab==='sorter'?' on':''}" onclick="toolTab='sorter';render()">💊 Sorter</button><button class="sub-tab${toolTab==='check'?' on':''}" onclick="toolTab='check';render()">⚠️ Check</button><button class="sub-tab${toolTab==='info'?' on':''}" onclick="toolTab='info';render()">🔍 Info</button><button class="sub-tab${toolTab==='appts'?' on':''}" onclick="toolTab='appts';render()">📅 Appts</button></div>`;return sub+(toolTab==='sorter'?rSorter():toolTab==='check'?rInter():toolTab==='info'?rInfo():rAppointments());}

  ms.forEach(s=>{const sm=meds.filter(m=>m.times?.includes(s.id));h+=`<div class="sbox" style="background:${s.bg};border-color:${s.br}"><div class="slbl" style="color:${s.lc}">${s.icon} ${s.l}</div><div class="stime" style="color:${s.lc}">${s.d}</div>${sm.length?sm.map(m=>`<div class="pitem"><div class="pdotm" style="background:${m.color||COLORS[0]}"></div><div><div class="pname">${esc(m.name)}</div><div class="psub">${esc(m.dosage||'')}${m.withFood?' · w/food':''}</div></div></div>`).join(''):'<div style="color:var(--txt3);font-size:14px;font-style:italic">Empty</div>'}</div>`;});

  h+=`<div class="card" style="margin-bottom:14px"><div style="font-size:15px;font-weight:700;color:var(--txt2);margin-bottom:12px">🎨 Color Legend</div><div style="display:flex;flex-wrap:wrap;gap:12px">${meds.map(m=>`<div style="display:flex;align-items:center;gap:7px"><div style="width:14px;height:14px;border-radius:50%;background:${m.color||COLORS[0]}"></div><span style="font-size:15px;color:var(--txt)">${esc(m.name)}</span></div>`).join('')}</div></div>`;

function printSorter(){const p=ap(),meds=p.meds||[],ms=SLOTS.filter(s=>s.id!=='as_needed'),asN=meds.filter(m=>m.times?.includes('as_needed'));const cols=ms.map(s=>{const sm=meds.filter(m=>m.times?.includes(s.id));return`<td style="vertical-align:top;padding:12px;border:2px solid #e8e4df;min-width:90px;background:${s.bg}"><div style="font-weight:700;font-size:12px;color:${s.lc};margin-bottom:4px">${s.icon} ${s.l.toUpperCase()}</div><div style="font-size:11px;color:#aaa;margin-bottom:10px">${s.d}</div>${sm.map(function(m){var dd=m.dosage?('<div style="font-size:11px;color:#888;margin-left:16px">'+m.dosage+(m.withFood?' · with food':'')+'</div>'):'';return '<div style="margin-bottom:8px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+(m.color||'#999')+';margin-right:6px;vertical-align:middle"></span><strong style="font-size:13px">'+m.name+'</strong>'+dd+'</div>';}).join('')||'<div style="color:#ccc;font-style:italic;font-size:12px">Empty</div>'}</td>`;}).join('');const pw=window.open('','_blank');pw.document.write(`<!DOCTYPE html><html><head><title>Pill Sorter — ${p.name}</title><style>body{font-family:'Nunito',sans-serif;padding:24px;max-width:720px;font-size:14px}table{border-collapse:collapse;width:100%}.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}@media print{button{display:none}}</style></head><body><h1 style="font-size:20px;margin-bottom:4px">☀️ Pill Sorter: ${p.name}</h1><p style="color:#888;font-size:13px;margin-bottom:20px">Generated ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</p><table><tr>${cols}</tr></table>${asN.length?`<div style="margin-top:14px;padding:10px;border:1px dashed #ccc;border-radius:8px"><strong>⚡ As Needed:</strong> ${asN.map(m=>m.name+(m.dosage?' – '+m.dosage:'')).join(' | ')}</div>`:''}<div class="legend"><strong style="width:100%;font-size:12px;color:#555">COLOR LEGEND:</strong>${meds.map(function(m){return '<div style="display:flex;align-items:center;gap:6px;font-size:13px"><div style="width:12px;height:12px;border-radius:50%;background:'+(m.color||'#999')+'"></div>'+m.name+'</div>';}).join('')}</div><p style="margin-top:16px;font-size:11px;color:#aaa">The Daily Dose — General use only.</p><script>window.print();<\/script></body></html>`);pw.document.close();}
function rInter(){

// ===== IDLE LOCK TIMER =====
function startIdleTimer(){
  // Clear any existing timer
  clearIdleTimer();
  if(!settings.pin)return;
  lastActiveTime=Date.now();
  // Check idle every 30 seconds
  idleLockTimer=setInterval(()=>{
    const idleMs=(settings.pinIdleMinutes||5)*60*1000;
    if(Date.now()-lastActiveTime>=idleMs){
      lockApp();
    }
  },30000);
  // Reset timer on user activity
  ['click','keydown','touchstart','scroll','mousemove'].forEach(ev=>{
    document.addEventListener(ev,resetIdleTimer,{passive:true});
  });
  // Lock when tab is hidden / switched away
  document.addEventListener('visibilitychange',handleVisibilityChange);
}
function resetIdleTimer(){lastActiveTime=Date.now();}
function clearIdleTimer(){
  if(idleLockTimer){clearInterval(idleLockTimer);idleLockTimer=null;}
}
function handleVisibilityChange(){
  if(document.hidden){
    // Tab hidden — record time, will lock when they come back if idle time exceeded
    lastActiveTime=Date.now()-(settings.pinIdleMinutes||5)*60*1000;
  }
}

// ===== REFILL COUNTDOWN =====
function calcRefillDays(m){
  if(!m.quantity||!m.frequency)return null;
  const qty=Number(m.quantity);if(!qty)return null;
  const dosesPerDay={
    'Once daily':1,'Twice daily':2,'Three times daily':3,
    'Every other day':0.5,'Weekly':1/7,'With meals':3,'As needed':null
  }[m.frequency];
  if(!dosesPerDay)return null;
  return Math.floor(qty/dosesPerDay);
}

// ===== WEEKLY VIEW =====
function rWeekView(){
  const p=ap(),meds=p.meds||[],doses=p.doses||{};
  const days=[];
  for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-d.getDay()+i);days.push(d);}
  let h=`<div class="week-grid">`;
  const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  days.forEach(d=>{
    const isToday=d.toDateString()===new Date().toDateString();
    const dots=meds.map(m=>{
      const slots=m.times||[];
      return slots.map(s=>{
        const k=`${m.id}-${s}`;
        const taken=isToday?(doses[k]&&(doses[k]===true||doses[k].taken)):false;
        return`<div class="week-pill" style="background:${taken?m.color||COLORS[0]:'var(--brd)'}"></div>`;
      }).join('');
    }).join('');
    h+=`<div class="week-day${isToday?' today':''}">
      <div class="week-day-lbl">${DAY_NAMES[d.getDay()]}</div>
      <div class="week-day-date">${d.getDate()}</div>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:2px">${dots}</div>
    </div>`;
  });
  h+=`</div>
  <div style="font-size:12px;color:var(--txt3);margin-bottom:10px">● = taken &nbsp; ○ = scheduled</div>`;
  return h;
}

// ===== AUTO INTERACTION CHECK =====
async function autoInteractionCheck(newMed,others){
  showToast(`⚠️ Checking interactions for ${newMed}…`);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json',...apiHeaders()},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:'You are a medication safety assistant. Be brief and clear. General info only, not medical advice.',messages:[{role:'user',content:`Quick check: are there any notable interactions between ${newMed} and: ${others}? If yes, briefly state what. If none known, say "No known interactions found." Keep under 3 sentences.`}]})});
    const d=await r.json();
    const txt=d.content?.map(b=>b.text||'').join('')||'';
    if(txt.toLowerCase().includes('no known'))showToast(`✅ No known interactions with ${newMed}`);
    else if(txt){

    }
  }catch(e){console.log('Auto-check failed silently');}
}

// ===== STREAKS & BADGES =====
const BADGES=[
  {id:'first',ico:'🌱',lbl:'First dose',desc:'Check off your first dose',check:p=>Object.values(p.history||{}).some(d=>Object.values(d).some(v=>v&&(v===true||v.taken)))},
  {id:'week',ico:'⭐',lbl:'7-day streak',desc:'7 days in a row',check:p=>calcStreak(p)>=7},
  {id:'fortnight',ico:'🌟',lbl:'2-week streak',desc:'14 days in a row',check:p=>calcStreak(p)>=14},
  {id:'month',ico:'🏆',lbl:'30-day streak',desc:'30 days in a row',check:p=>calcStreak(p)>=30},
  {id:'century',ico:'💎',lbl:'100 days',desc:'100-day streak',check:p=>calcStreak(p)>=100},
  {id:'journaler',ico:'📓',lbl:'Journaler',desc:'Write 10 journal entries',check:p=>(p.journal||[]).length>=10},
  {id:'goalset',ico:'🎯',lbl:'Goal setter',desc:'Set a wellness goal',check:p=>(p.goals||[]).length>=1},
  {id:'hydrated',ico:'💧',lbl:'Hydrated',desc:'Hit water goal 3 days',check:p=>checkWaterBadge(p)},
];

function calcStreak(p){
  const hist=p.history||{};
  const total=(p.meds||[]).reduce((a,m)=>a+(m.times?.length||0),0);
  if(!total)return 0;
  let streak=0,d=new Date();d.setDate(d.getDate()-1);
  for(let i=0;i<200;i++){
    const dh=hist[d.toDateString()];
    if(!dh)break;
    if(Object.values(dh).filter(v=>v&&(v===true||v.taken)).length<total)break;
    streak++;d.setDate(d.getDate()-1);
  }
  return streak;
}

function checkWaterBadge(p){
  const wh=p.waterHistory||{};
  const goal=(p.goals||[]).find(g=>g.type==='water');
  const target=goal?goal.target:8;
  return Object.values(wh).filter(v=>v>=target).length>=3;
}

function launchConfetti(){
  const wrap=document.createElement('div');wrap.className='confetti-wrap';

function logWater(add){
  const p=ap(),today=new Date().toDateString();
  const wh={...(p.waterHistory||{})};

  upAP({waterHistory:wh});checkNewBadges();render();
}
function logSleep(val){
  const p=ap(),today=new Date().toDateString();
  const sl={...(p.sleepLog||{})};sl[today]=val;upAP({sleepLog:sl});
}
function logEnergy(val){
  const p=ap(),today=new Date().toDateString();
  const el={...(p.energyLog||{})};el[today]=val;upAP({energyLog:el});render();
}

let suggestOn=false;
async function suggestTiming(){
  const name=(document.getElementById('fn')?.value||'').trim();
  if(!name){alert('Enter a medication or supplement name first.');return;}
  const box=document.getElementById('suggest-box');
  if(!box)return;
  box.innerHTML=`<div style="font-size:13px;color:var(--grn);font-weight:700;padding:8px 0">✨ Analyzing ${name}...</div>`;
  const others=(ap().meds||[]).filter(m=>m.name!==name).map(m=>`${m.name}${m.dosage?' ('+m.dosage+')':''}${m.times?.length?' – '+m.times.join('/'):''}${m.withFood?' – with food':''}`).join(', ');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json',...apiHeaders()},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,
      system:'You are a friendly medication timing expert. Give practical, specific advice. Always note this is general information only, not medical advice. Respond ONLY in this exact JSON format with no other text: {"bestTime":"morning|afternoon|evening|night|as_needed","withFood":true|false,"reasoning":"1-2 sentence explanation why","tips":"1-2 practical tips","conflict":"any timing conflict with other meds, or empty string"}',
      messages:[{role:'user',content:`Best time to take: ${name}. Current medications the person also takes: ${others||'none'}. Provide timing recommendation.`}]})
    });
    const d=await r.json();
    const raw=d.content?.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    const info=JSON.parse(raw);

    // Map bestTime to SLOT id
    const timeMap={'morning':'morning','afternoon':'afternoon','evening':'evening','night':'night','as_needed':'as_needed'};
    const slotId=timeMap[info.bestTime]||'morning';
    const slotLabel={'morning':'🌅 Morning','afternoon':'☀️ Afternoon','evening':'🌆 Evening','night':'🌙 Night','as_needed':'⚡ As needed'}[slotId]||'🌅 Morning';

    box.innerHTML=`<div style="background:var(--grn-l);border:1.5px solid var(--grn-b);border-radius:14px;padding:14px;margin-top:4px">
      <div style="font-size:14px;font-weight:800;color:var(--grn);margin-bottom:8px">✨ Recommendation for ${esc(name)}</div>
      <div style="display:flex;gap:10px;margin-bottom:10px">
        <div style="background:var(--card);border:1.5px solid var(--grn-b);border-radius:10px;padding:8px 14px;font-size:14px;font-weight:700;color:var(--txt)">⏰ ${slotLabel}</div>
        <div style="background:var(--card);border:1.5px solid var(--grn-b);border-radius:10px;padding:8px 14px;font-size:14px;font-weight:700;color:var(--txt)">${info.withFood?'🍽️ With food':'💧 Without food'}</div>
      </div>
      <div style="font-size:14px;color:var(--txt);line-height:1.65;margin-bottom:8px">${esc(info.reasoning)}</div>
      ${info.tips?`<div style="font-size:13px;color:var(--txt2);line-height:1.65;margin-bottom:8px">💡 ${esc(info.tips)}</div>`:''}
      ${info.conflict?`<div style="font-size:13px;color:#C85858;font-weight:700;background:var(--rose-l);border:1px solid var(--rose-b);border-radius:8px;padding:8px 12px;margin-bottom:8px">⚠️ ${esc(info.conflict)}</div>`:''}
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btnp" style="font-size:13px;padding:8px 14px" onclick="applyTimingSuggestion('${slotId}',${info.withFood})">✅ Apply this suggestion</button>
        <div style="font-size:11px;color:var(--txt3);align-self:center;font-style:italic">General info only — not medical advice</div>
      </div>
    </div>`;
  }catch(e){
    box.innerHTML=`<div style="font-size:13px;color:var(--txt3);padding:8px 0">Could not get suggestion. Check your connection and try again.</div>`;
  }
}

function applyTimingSuggestion(slotId, withFood){
  // Set the time slot
  if(!editing.times)editing.times=[];
  if(!editing.times.includes(slotId))editing.times=[slotId];
  editing.withFood=withFood;
  // Update UI checkboxes
  document.querySelectorAll('.tt').forEach(el=>{
    el.classList.toggle('on',el.dataset.s===slotId);
  });
  const ff2=document.getElementById('ff2');
  if(ff2)ff2.checked=withFood;
  // Show confirmation
  const box=document.getElementById('suggest-box');
  if(box){
    const existing=box.querySelector('[style*="grn-l"]');
    if(existing){
      const confirm=document.createElement('div');
      confirm.style.cssText='font-size:13px;font-weight:800;color:var(--grn);margin-top:8px;padding:6px 10px;background:var(--grn-l);border-radius:8px';
      confirm.textContent='✅ Applied! Scroll down to review and save.';
      box.appendChild(confirm);
    }
  }
  showToast('✅ Timing suggestion applied!');
}

// ===== PUSH NOTIFICATIONS (Service Worker) =====
function registerServiceWorker(){
  if(!('serviceWorker' in navigator))return;
  // Inline service worker as blob
  var swCode=[
    'var CACHE="tdd-v1";',
    'self.addEventListener("install",function(e){self.skipWaiting();});',
    'self.addEventListener("activate",function(e){e.waitUntil(self.clients.claim());});',
    'self.addEventListener("push",function(e){',
    '  var data=e.data?e.data.json():{title:"The Daily Dose",body:"Time for your medication!"};',
    '  e.waitUntil(self.registration.showNotification(data.title||"☀️ The Daily Dose",{',
    '    body:data.body||"Time for your medication!",',
    '    icon:data.icon||"",',
    '    badge:data.badge||"",',
    '    tag:data.tag||"tdd",',
    '    requireInteraction:false,',
    '    data:data',
    '  }));',
    '});',
    'self.addEventListener("notificationclick",function(e){',
    '  e.notification.close();',
    '  e.waitUntil(clients.openWindow("/"));',
    '});'
  ].join('\n');
  var blob=new Blob([swCode],{type:'application/javascript'});
  var swURL=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL).then(function(reg){
    console.log('SW registered');
    window._swReg=reg;
    scheduleNotifications(reg);
  }).catch(function(e){
    console.warn('SW registration failed:',e.message);
  });
}

function scheduleNotifications(reg){
  if(!settings.notif||Notification.permission!=='granted')return;
  // Clear existing timers, set new ones based on slot hours
  SLOTS.filter(function(s){return s.id!=='as_needed';}).forEach(function(s){
    if(!settings.notifSlots||!settings.notifSlots.includes(s.id))return;
    var now=new Date();
    var target=new Date();
    target.setHours(SLOT_HRS[s.id]||8,0,0,0);
    if(target<=now)target.setDate(target.getDate()+1);
    var delay=target-now;
    setTimeout(function(){
      var meds=ap().meds||[];
      var doses=ap().doses||{};
      var undone=meds.filter(function(m){
        return m.times&&m.times.includes(s.id)&&!doses[m.id+'-'+s.id];
      });
      if(!undone.length)return;
      var body=undone.map(function(m){return m.name;}).join(', ');
      if(reg&&reg.active){
        reg.active.postMessage({type:'notify',title:'☀️ '+s.l+' meds!',body:body});
      } else {
        new Notification('☀️ '+s.l+' meds!',{body:body});
      }
      // Reschedule for tomorrow
      scheduleNotifications(reg);
    },delay);
  });
}

async function enableNotifications(){
  var perm=await Notification.requestPermission();
  if(perm!=='granted'){
    alert('Please allow notifications in your browser settings to get reminders.');
    return false;
  }
  settings.notif=true;
  saveSet();
  registerServiceWorker();
  showToast('🔔 Notifications enabled!');
  return true;
}

// ===== BIOMETRIC / WEBAUTHN =====
var _bioCredId = null;

async function setupBiometric() {
  if (!window.PublicKeyCredential) return false;
  try {
    var avail = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if (!avail) return false;
    // Register a platform credential (Face ID / Touch ID / Windows Hello)
    var uid = new Uint8Array(16);
    crypto.getRandomValues(uid);
    var reg = await navigator.credentials.create({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        rp: { name: 'The Daily Dose' },
        user: { id: uid, name: 'user', displayName: 'Daily Dose User' },
        pubKeyCredParams: [{ alg: -7, type: 'public-key' }, { alg: -257, type: 'public-key' }],
        authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
        timeout: 60000
      }
    });
    if (reg) {
      // Store credential id in localStorage
      var credId = Array.from(new Uint8Array(reg.rawId)).map(b => b.toString(16).padStart(2,'0')).join('');
      try { localStorage.setItem('dd_bio_cred', credId); } catch(e) {}
      _bioCredId = credId;
      showToast('✅ Biometric set up! You can now use Face ID / Fingerprint.');
      return true;
    }
  } catch(e) {
    console.log('Biometric setup:', e.message);
  }
  return false;
}

async function tryBiometric() {
  if (!window.PublicKeyCredential) { showToast('Biometric not available on this device'); return; }
  try {
    var cred = await navigator.credentials.get({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        timeout: 60000,
        userVerification: 'required',
        rpId: window.location.hostname || 'localhost'
      }
    });
    if (cred) {
      // Biometric verified — unlock app
      document.getElementById('pin-screen').classList.add('hidden');
      showToast('🔑 Unlocked with biometrics!');
    }
  } catch(e) {
    showToast('Biometric failed — please use your PIN');
  }
}

function checkBiometricAvailable() {
  if (!window.PublicKeyCredential) return;
  var credId = null;
  try { credId = localStorage.getItem('dd_bio_cred'); } catch(e) {}
  if (credId) {
    var btn = document.getElementById('bio-btn');
    if (btn) btn.style.display = 'block';
  }
  // Also check if platform authenticator is available for first-time setup hint
  PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(function(avail) {
    if (avail && !credId) {
      var btn = document.getElementById('bio-btn');
      if (btn) {
        btn.style.display = 'block';
        btn.textContent = '🔑 Set up Face ID / Fingerprint';
        btn.onclick = function() { setupBiometric(); };
      }
    }
  }).catch(function() {});
}

// ===== FORGOT PIN =====
async function forgotPIN() {
  if (!currentUser) {
    alert('Please sign in first to reset your PIN.');
    return;
  }
  var confirmed = confirm('Send a PIN reset link to ' + currentUser.email + '?\n\nAfter clicking the link, your PIN will be cleared so you can set a new one.');
  if (!confirmed) return;
  if (!sb) { showToast('No connection — try again online'); return; }
  try {
    var result = await sb.auth.resetPasswordForEmail(currentUser.email, {
      redirectTo: window.location.href
    });
    if (result.error) {
      showToast('Could not send reset email: ' + result.error.message);
    } else {
      showToast('📧 Reset email sent! Check your inbox.');
      // Also offer to clear PIN immediately if they confirm identity
    }
  } catch(e) {
    // Fallback — offer to clear PIN if they can verify via Supabase session
    var bypass = confirm('Could not send email. If you are already logged in on another device, you can clear the PIN now. Clear PIN?');
    if (bypass) {
      settings.pin = null;
      saveSet();
      document.getElementById('pin-screen').classList.add('hidden');
      showToast('PIN cleared — set a new one in Settings');
    }
  }
}

// Hook into Supabase auth to detect password reset and clear PIN
function handleAuthStateForReset(event, session) {
  if (event === 'PASSWORD_RECOVERY') {
    // User clicked reset link — clear their PIN
    settings.pin = null;
    saveSet();
    showToast('PIN cleared — sign in and set a new PIN in Settings');
  }
}

// ===== INIT =====
function init(){
  // Load local settings first — always
  try{const r=localStorage.getItem(SetK);if(r)settings={...settings,...JSON.parse(r)};}catch(e){}
  document.body.classList.toggle('dark',settings.darkMode);
  startNotifCheck();

  // Attach login key listeners
  setTimeout(()=>{
    try{
      document.getElementById('login-pwd')?.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
      document.getElementById('login-email')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-pwd')?.focus();});
    }catch(e){}
  },100);

  // If no Supabase lib, go offline immediately
  if(!sb){goOffline('Supabase library not loaded');return;}

  // Try to restore existing session — wrap everything in try/catch
  // CORS errors from local files (Origin: null) will be caught here
  var sessionPromise;
  try{
    sessionPromise=sb.auth.getSession();
  }catch(e){
    goOffline(e.message);return;
  }

  // Race against a 6s timeout
  Promise.race([
    sessionPromise,
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),6000))
  ]).then(function(result){
    var session=result&&result.data&&result.data.session;
    if(session){
      currentUser=session.user;
      // Set up auth listener after we know Supabase works
      sb.auth.onAuthStateChange(function(event,sess){handleAuthStateForReset(event,sess);
        if(event==='SIGNED_IN'&&sess){currentUser=sess.user;loadCloud().then(function(){showApp();updateProfHdr();render();});}
        else if(event==='SIGNED_OUT'){currentUser=null;profiles=[];showLogin();}
      });
      loadCloud().then(function(){showApp();}).catch(function(){goOffline('Cloud load failed');});
    } else {
      // No session — show login, but Supabase IS reachable
      sb.auth.onAuthStateChange(function(event,sess){
        if(event==='SIGNED_IN'&&sess){currentUser=sess.user;loadCloud().then(function(){showApp();updateProfHdr();render();});}
        else if(event==='SIGNED_OUT'){currentUser=null;profiles=[];showLogin();}
      });
      showLogin();
    }
  }).catch(function(e){
    console.warn('Supabase unreachable:',e.message);
    goOffline(e.message);
  });
}

function goOffline(reason){
  console.warn('Going offline:',reason);
  setSyncStatus('error');
  tryLoadLocal();
  if(profiles.length){
    if(!activeId)activeId=profiles[0]?.id;
    showApp();
    showToast('⚠️ Using local data — open in browser for cloud sync');
  } else {
    showLogin();
    // Add offline button after a tick
    setTimeout(function(){
      var box=document.querySelector('.login-box');
      if(!box||document.getElementById('offline-btn'))return;
      // Show helpful message about CORS
      var msg=document.createElement('div');
      msg.style.cssText='font-size:13px;color:var(--txt3);text-align:center;margin-top:12px;line-height:1.5;padding:0 8px';
      msg.innerHTML='Having trouble connecting?<br>Open the file via a local server or use the button below.';
      box.appendChild(msg);
      var btn=document.createElement('button');
      btn.id='offline-btn';
      btn.textContent='▶ Use without account (local only)';
      btn.style.cssText='width:100%;margin-top:8px;padding:13px;background:var(--sbg);border:2px dashed var(--brd);border-radius:30px;font-size:14px;font-weight:700;color:var(--stxt);cursor:pointer;font-family:Nunito,sans-serif';
      btn.onclick=function(){
        profiles=[mkProf('My Profile')];activeId=profiles[0].id;
        try{localStorage.setItem('dd_profiles_v1',JSON.stringify(profiles));}catch(e){}
        showApp();setSyncStatus('error');
        showToast('Running locally ☀️');
      };
      box.appendChild(btn);
    },300);
  }
}

init();
