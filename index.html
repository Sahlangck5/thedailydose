// ===== NOTIFICATIONS =====
function startNotifCheck(){
  // Pill organizer fill reminder
  setInterval(()=>{
    if(!settings.sorterReminderOn)return;
    const now=new Date(),day=now.getDay(),h=now.getHours(),min=now.getMinutes();
    const [th,tm]=(settings.sorterReminderTime||'18:00').split(':').map(Number);
    const targetDay=settings.sorterReminderDay||0;
    const key='sorter-remind-'+now.toDateString();
    if(day===targetDay&&h===th&&min===tm&&!firedNotifs[key]){
      firedNotifs[key]=true;
      if(Notification.permission==='granted'){
        new Notification('💊 Daily Dose — Fill your pill organizers',{body:'Time to fill your weekly pill organizers!'});
      } else {
        showToast('💊 Time to fill your pill organizers!');
      }
    }
  },60000);

  // Glucose fasting reminder check (runs every minute)
  setInterval(()=>{
    if(!settings.glucoseRemindersOn||!settings.glucoseFastingTime)return;
    if(Notification.permission!=='granted'&&settings.notif===false)return;
    const now=new Date(),h=now.getHours(),min=now.getMinutes();
    const [th,tm]=settings.glucoseFastingTime.split(':').map(Number);
    const key='gluc-fast-'+now.toDateString();
    if(h===th&&min===tm&&!firedNotifs[key]){
      firedNotifs[key]=true;
      if(Notification.permission==='granted'){
        new Notification('🩸 Daily Dose — Fasting Glucose',{body:'Time to log your fasting glucose! Tap to open.'});
      } else {
        showToast('🩸 Time to log your fasting glucose!');
      }
    }
  },60000);
  setInterval(()=>{if(!settings.notif||Notification.permission!=='granted')return;const now=new Date(),today=now.toDateString(),h=now.getHours(),min=now.getMinutes();SLOTS.filter(s=>s.id!=='as_needed').forEach(s=>{if(!settings.notifSlots?.includes(s.id))return;const target=SLOT_HRS[s.id],key=`${today}-${s.id}`;if(h===target&&min<5&&!firedNotifs[key]){const meds=ap().meds||[],doses=ap().doses||{},undone=meds.filter(m=>m.times?.includes(s.id)&&!doses[`${m.id}-${s.id}`]);if(undone.length){firedNotifs[key]=true;new Notification('☀️ The Daily Dose',{body:`${s.icon} ${s.l} time! ${undone.map(m=>m.name).join(', ')}`});}}});},60000);}

// ===== DEVICE ID =====
function getDeviceId(){
  let id;
  try{id=localStorage.getItem('dd_device_id');}catch(e){}
  if(!id){id='dev_'+Math.random().toString(36).slice(2)+Date.now().toString(36);try{localStorage.setItem('dd_device_id',id);}catch(e){}}
  return id;
}
function getDeviceName(){
  const ua=navigator.userAgent;
  if(/iPhone/.test(ua))return'iPhone';
  if(/iPad/.test(ua))return'iPad';
  if(/Android/.test(ua))return'Android device';
  if(/Mac/.test(ua))return'Mac';
  if(/Windows/.test(ua))return'Windows PC';
  return'Browser';
}
function registerTrustedDevice(){
  const lang=(ap().lang)||'en';
  const devId=getDeviceId();
  const existing=(settings.trustedDevices||[]).find(d=>d.id===devId);
  if(!existing){
    const devName=getDeviceName()+' ('+new Date().toLocaleDateString(lang==='ko'?'ko-KR':'en-US',{month:'short',year:'numeric'})+')';
    settings.trustedDevices=[...(settings.trustedDevices||[]),{id:devId,name:devName,addedAt:new Date().toISOString()}];
    saveSet();
  }
}
function isThisDeviceTrusted(){
  return (settings.trustedDevices||[]).some(d=>d.id===getDeviceId());
}
function removeTrustedDevice(id){if(!confirm('Remove this trusted device?'))return;settings.trustedDevices=(settings.trustedDevices||[]).filter(d=>d.id!==id);saveSet();render();showToast('Device removed');}
function removeAllTrustedDevices(){if(!confirm('Sign out all trusted devices? All devices will need email login again.'))return;settings.trustedDevices=[];saveSet();render();showToast('All devices signed out');}

// ===== IDLE LOCK TIMER =====
function startIdleTimer(){
  // Clear any existing timer
  clearIdleTimer();
  if(!settings.pin)return;
  lastActiveTime=Date.now();
  // Check idle every 30 seconds
  idleLockTimer=setInterval(()=>{
    const idleMs=(settings.pinIdleMinutes||5)*60*1000;
    if(Date.now()-lastActiveTime>=idleMs){
      lockApp();
    }
  },30000);
  // Reset timer on user activity
  ['click','keydown','touchstart','scroll','mousemove'].forEach(ev=>{
    document.addEventListener(ev,resetIdleTimer,{passive:true});
  });
  // Lock when tab is hidden / switched away
  document.addEventListener('visibilitychange',handleVisibilityChange);
}
function resetIdleTimer(){lastActiveTime=Date.now();}
function clearIdleTimer(){
  if(idleLockTimer){clearInterval(idleLockTimer);idleLockTimer=null;}
}

// ===== REFILL COUNTDOWN =====
function calcRefillDays(m){
  if(!m.quantity||!m.frequency)return null;
  const qty=Number(m.quantity);if(!qty)return null;
  const dosesPerDay={
    'Once daily':1,'Twice daily':2,'Three times daily':3,
    'Every other day':0.5,'Weekly':1/7,'With meals':3,'As needed':null
  }[m.frequency];
  if(!dosesPerDay)return null;
  return Math.floor(qty/dosesPerDay);
}

function rWeekView(){
  const p=ap(),meds=p.meds||[],doses=p.doses||{};

// ===== AUTO INTERACTION CHECK =====
async function autoInteractionCheck(newMed,others){
  showToast(`⚠️ Checking interactions for ${newMed}…`);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json',...apiHeaders()},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:400,system:'You are a medication safety assistant. Be brief and clear. General info only, not medical advice.',messages:[{role:'user',content:`Quick check: are there any notable interactions between ${newMed} and: ${others}? If yes, briefly state what. If none known, say "No known interactions found." Keep under 3 sentences.`}]})});
    const d=await r.json();
    const txt=d.content?.map(b=>b.text||'').join('')||'';
    if(txt.toLowerCase().includes('no known'))showToast(`✅ No known interactions with ${newMed}`);
    else if(txt){
      if(confirm(`⚠️ Possible interaction found for ${newMed}:\n\n${txt}\n\nOpen the Interactions checker for details?`))
        {toolTab='check';goTo('tools');}
    }
  }catch(e){console.log('Auto-check failed silently');}
}

const BADGES=[
  {id:'first',ico:'🌱',lbl:'First dose',desc:'Check off your first dose',check:p=>Object.values(p.history||{}).some(d=>Object.values(d).some(v=>v&&(v===true||v.taken)))},
  {id:'week',ico:'⭐',lbl:'7-day streak',desc:'7 days in a row',check:p=>calcStreak(p)>=7},
  {id:'fortnight',ico:'🌟',lbl:'2-week streak',desc:'14 days in a row',check:p=>calcStreak(p)>=14},
  {id:'month',ico:'🏆',lbl:'30-day streak',desc:'30 days in a row',check:p=>calcStreak(p)>=30},
  {id:'century',ico:'💎',lbl:'100 days',desc:'100-day streak',check:p=>calcStreak(p)>=100},
  {id:'journaler',ico:'📓',lbl:'Journaler',desc:'Write 10 journal entries',check:p=>(p.journal||[]).length>=10},
  {id:'goalset',ico:'🎯',lbl:'Goal setter',desc:'Set a wellness goal',check:p=>(p.goals||[]).length>=1},
  {id:'hydrated',ico:'💧',lbl:'Hydrated',desc:'Hit water goal 3 days',check:p=>checkWaterBadge(p)},
];

function calcStreak(p){
  const hist=p.history||{};
  const total=(p.meds||[]).reduce((a,m)=>a+(m.times?.length||0),0);
  if(!total)return 0;
  let streak=0,d=new Date();d.setDate(d.getDate()-1);
  for(let i=0;i<200;i++){
    const dh=hist[d.toDateString()];
    if(!dh)break;
    if(Object.values(dh).filter(v=>v&&(v===true||v.taken)).length<total)break;
    streak++;d.setDate(d.getDate()-1);
  }
  return streak;
}

function checkWaterBadge(p){
  const wh=p.waterHistory||{};
  const goal=(p.goals||[]).find(g=>g.type==='water');
  const target=goal?goal.target:8;
  return Object.values(wh).filter(v=>v>=target).length>=3;
}

  </div>`;
  h+=`<div class="badge-grid">`;
  BADGES.forEach(b=>{

}

function checkNewBadges(){
  const p=ap();
  BADGES.forEach(b=>{
    const earned=b.check(p);
    const alreadyCelebrated=(p.celebratedBadges||[]).includes(b.id);
    if(earned&&!alreadyCelebrated){
      upAP({celebratedBadges:[...(p.celebratedBadges||[]),b.id]});
      setTimeout(()=>{
        showToast(`🎉 Badge unlocked: ${b.ico} ${b.lbl}!`);
        launchConfetti();
      },400);
    }
  });
}

function launchConfetti(){
  const wrap=document.createElement('div');wrap.className='confetti-wrap';
  const colors=['#F8D050','#F46070','#7BAB8B','#88B4D8','#A894D4','#E07010','#F498A8'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-delay:${Math.random()*1}s;animation-duration:${2+Math.random()*1.5}s`;

  }
  document.body.appendChild(wrap);
  setTimeout(()=>wrap.remove(),4000);
}

// --- Glucose + Ketones ---
const GLUCOSE_CONTEXTS=[{id:'fasting',lbl:'Fasting (morning)'},{id:'before',lbl:'Before meal'},{id:'after',lbl:'2hr after meal'},{id:'bedtime',lbl:'Bedtime'},{id:'other',lbl:'Other'}];
const KETONE_LEVELS=[{id:'neg',lbl:'Negative'},{id:'trace',lbl:'Trace'},{id:'small',lbl:'Small'},{id:'moderate',lbl:'Moderate'},{id:'large',lbl:'Large'},{id:'xlarge',lbl:'Extra Large'}];
function glucoseColor(val,ctx){
  if(!val)return'var(--txt)';
  const v=parseFloat(val);
  if(ctx==='fasting'){if(v<=130)return'#1b7a4e';if(v<=160)return'#f9a825';return'#c62828';}
  if(ctx==='after'){if(v<=180)return'#1b7a4e';if(v<=220)return'#f9a825';return'#c62828';}
  if(v<=180)return'#1b7a4e';if(v<=220)return'#f9a825';return'#c62828';
}

    </div>`;

          ${r.note?`<div style="font-size:12px;color:var(--txt3)">${esc(r.note)}</div>`:''}
        </div>
        <div style="font-size:11px;color:var(--txt3);text-align:right">${new Date(r.date).toLocaleDateString(lang==='ko'?'ko-KR':'en-US',{month:'short',day:'numeric'})}<br>${new Date(r.date).toLocaleTimeString(lang==='ko'?'ko-KR':'en-US',{hour:'numeric',minute:'2-digit'})}</div>

    });

function logGlucose(){

// --- Period Tracker ---
const FLOW_LEVELS=[{id:'spotting',lbl:'Spotting',ico:'🔸'},{id:'light',lbl:'Light',ico:'🟡'},{id:'medium',lbl:'Medium',ico:'🟠'},{id:'heavy',lbl:'Heavy',ico:'🔴'}];
const PERIOD_SX=['Cramps','Bloating','Headache','Fatigue','Mood changes','Back pain','Breast tenderness','Nausea','Brain fog'];
function rCycle(){
  const periods=ap().periods||[];
  const lang=(ap().lang)||'en';

  // Current period
  if(current){
    const days=Math.floor((Date.now()-new Date(current.startDate))/(1000*60*60*24))+1;
    h+=`<div class="card" style="margin-bottom:14px;border-left:4px solid #e91e63">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

      </div>
      <div class="lbl" style="margin-bottom:8px">Log today</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        ${FLOW_LEVELS.map(f=>`<button class="tt" id="fl-${f.id}" onclick="logPeriodDay('${current.id}','${f.id}')" style="flex:1">${f.ico} ${f.lbl}</button>`).join('')}
      </div>
      <div style="font-size:13px;color:var(--txt3);margin-bottom:6px">Symptoms today:</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        ${PERIOD_SX.map(s=>`<button class="tt" id="psx-${s.replace(/\s/g,'-')}" onclick="togglePeriodSx('${current.id}','${s}')">${s}</button>`).join('')}
      </div>
      <button class="btnp" style="width:100%;padding:10px;font-size:14px" onclick="savePeriodDay('${current.id}')">💾 Save today's log</button>
    </div>`;
    // Daily log history for current
    if(current.days&&current.days.length){
      h+=`<div class="card" style="margin-bottom:14px"><div style="font-size:14px;font-weight:800;color:var(--txt);margin-bottom:10px">This period — daily log</div>`;
      current.days.slice().reverse().forEach(d=>{
        const fl=FLOW_LEVELS.find(f=>f.id===d.flow);
        h+=`<div style="padding:7px 0;border-bottom:1px solid var(--brd)">
          <div style="display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:700;color:var(--txt)">${new Date(d.date).toLocaleDateString(lang==='ko'?'ko-KR':'en-US',{month:'short',day:'numeric'})}</span><span style="font-size:13px">${fl?fl.ico+' '+fl.lbl:''}</span></div>
          ${d.symptoms&&d.symptoms.length?`<div style="font-size:12px;color:var(--txt3);margin-top:2px">${d.symptoms.join(', ')}</div>`:''}
        </div>`;
      });
      h+=`</div>`;
    }
  } else {
    h+=`<div class="card" style="background:var(--sbg);border-style:dashed;margin-bottom:14px;text-align:center;padding:24px">
      <div style="font-size:36px;margin-bottom:8px">🩸</div>
      <div style="font-size:15px;font-weight:800;color:var(--txt);margin-bottom:6px">No active period</div>
      <div style="font-size:13px;color:var(--txt3);margin-bottom:14px">Tap below when your period starts</div>
      <button class="btnp" style="padding:12px 28px;font-size:15px" onclick="startPeriod()">🩸 Period started</button>
    </div>`;
  }

  // Past periods
  if(past.length){
    h+=`<div class="card"><div style="font-size:15px;font-weight:800;color:var(--txt);margin-bottom:12px">Period history</div>`;
    past.forEach(p=>{
      const dur=p.endDate?Math.floor((new Date(p.endDate)-new Date(p.startDate))/(1000*60*60*24))+1:'ongoing';
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--brd)">
        <div><div style="font-size:14px;font-weight:700;color:var(--txt)">${new Date(p.startDate).toLocaleDateString(lang==='ko'?'ko-KR':'en-US',{month:'short',day:'numeric',year:'numeric'})}</div>

      </div>`;
    });
    h+=`</div>`;
  }
  return h;
}
let _periodDayFlow='',_periodDaySx=[];
function startPeriod(){
  const periods=ap().periods||[];
  const np={id:'per'+Date.now(),startDate:new Date().toISOString(),active:true,days:[]};
  upAP({periods:[...periods,np]});render();showToast('🩸 Period started!');
}
function endPeriod(id){
  const periods=(ap().periods||[]).map(p=>p.id===id?{...p,active:false,endDate:new Date().toISOString()}:p);
  upAP({periods});render();showToast('Period ended — logged!');
}
function logPeriodDay(pid,flow){
  _periodDayFlow=flow;
  document.querySelectorAll('[id^="fl-"]').forEach(b=>b.classList.remove('on'));
  const btn=document.getElementById('fl-'+flow);if(btn)btn.classList.add('on');
}
function togglePeriodSx(pid,sx){
  if(_periodDaySx.includes(sx))_periodDaySx=_periodDaySx.filter(s=>s!==sx);
  else _periodDaySx=[..._periodDaySx,sx];
  document.querySelectorAll('[id^="psx-"]').forEach(b=>{const s=b.id.replace('psx-','').replace(/-/g,' ');b.classList.toggle('on',_periodDaySx.includes(s));});
}
function savePeriodDay(pid){
  if(!_periodDayFlow){alert('Select a flow level first.');return;}
  const entry={date:new Date().toISOString().slice(0,10),flow:_periodDayFlow,symptoms:[..._periodDaySx]};
  const periods=(ap().periods||[]).map(p=>{
    if(p.id!==pid)return p;
    const days=(p.days||[]).filter(d=>d.date!==entry.date);
    return{...p,days:[...days,entry]};
  });
  upAP({periods});_periodDayFlow='';_periodDaySx=[];render();showToast('✅ Day logged!');
}
function delPeriod(id){if(confirm('Delete this period record?')){upAP({periods:(ap().periods||[]).filter(p=>p.id!==id)});render();}}

  const ph=(ap().progressPhotos||[]).find(p=>p.id===id);

function applyTimingSuggestion(slotId, withFood){
  // Set the time slot
  if(!editing.times)editing.times=[];
  if(!editing.times.includes(slotId))editing.times=[slotId];
  editing.withFood=withFood;
  // Update UI checkboxes
  document.querySelectorAll('.tt').forEach(el=>{
    el.classList.toggle('on',el.dataset.s===slotId);
  });
  const ff2=document.getElementById('ff2');
  if(ff2)ff2.checked=withFood;
  // Show confirmation
  const box=document.getElementById('suggest-box');
  if(box){
    const existing=box.querySelector('[style*="grn-l"]');
    if(existing){
      const confirm=document.createElement('div');
      confirm.style.cssText='font-size:13px;font-weight:800;color:var(--grn);margin-top:8px;padding:6px 10px;background:var(--grn-l);border-radius:8px';

      box.appendChild(confirm);
    }

}

// ===== PUSH NOTIFICATIONS (Service Worker) =====
function registerServiceWorker(){
  if(!('serviceWorker' in navigator))return;
  // Inline service worker as blob
  var swCode=[
    'var CACHE="tdd-v1";',
    'self.addEventListener("install",function(e){self.skipWaiting();});',
    'self.addEventListener("activate",function(e){e.waitUntil(self.clients.claim());});',
    'self.addEventListener("push",function(e){',
    '  var data=e.data?e.data.json():{title:"The Daily Dose",body:"Time for your medication!"};',
    '  e.waitUntil(self.registration.showNotification(data.title||"☀️ The Daily Dose",{',
    '    body:data.body||"Time for your medication!",',
    '    icon:data.icon||"",',
    '    badge:data.badge||"",',
    '    tag:data.tag||"tdd",',
    '    requireInteraction:false,',
    '    data:data',
    '  }));',
    '});',
    'self.addEventListener("notificationclick",function(e){',
    '  e.notification.close();',
    '  e.waitUntil(clients.openWindow("/"));',
    '});'
  ].join('\n');
  var blob=new Blob([swCode],{type:'application/javascript'});
  var swURL=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL).then(function(reg){
    console.log('SW registered');
    window._swReg=reg;
    scheduleNotifications(reg);
  }).catch(function(e){
    console.warn('SW registration failed:',e.message);
  });
}

function scheduleNotifications(reg){
  if(!settings.notif||Notification.permission!=='granted')return;
  // Clear existing timers, set new ones based on slot hours
  SLOTS.filter(function(s){return s.id!=='as_needed';}).forEach(function(s){
    if(!settings.notifSlots||!settings.notifSlots.includes(s.id))return;
    var now=new Date();
    var target=new Date();
    target.setHours(SLOT_HRS[s.id]||8,0,0,0);
    if(target<=now)target.setDate(target.getDate()+1);
    var delay=target-now;
    setTimeout(function(){
      var meds=ap().meds||[];
      var doses=ap().doses||{};
      var undone=meds.filter(function(m){
        return m.times&&m.times.includes(s.id)&&!doses[m.id+'-'+s.id];
      });
      if(!undone.length)return;
      var body=undone.map(function(m){return m.name;}).join(', ');
      if(reg&&reg.active){
        reg.active.postMessage({type:'notify',title:'☀️ '+s.l+' meds!',body:body});
      } else {
        new Notification('☀️ '+s.l+' meds!',{body:body});
      }
      // Reschedule for tomorrow
      scheduleNotifications(reg);
    },delay);
  });
}

async function enableNotifications(){
  var perm=await Notification.requestPermission();
  if(perm!=='granted'){
    alert('Please allow notifications in your browser settings to get reminders.');
    return false;
  }
  settings.notif=true;
  saveSet();
  registerServiceWorker();
  showToast('🔔 Notifications enabled!');
  return true;
}

var careLoading=false;

function generateCareCode(){
  if(!currentUser)return null;
  // Use first 6 chars of user ID uppercase as care code
  return currentUser.id.replace(/-/g,'').substring(0,8).toUpperCase();
}

async function saveCareSettings(){
  if(!currentUser||!sb)return;
  var p=ap();
  var careEnabled=p.careEnabled||false;
  await sb.from('user_data').upsert({
    id:currentUser.id,
    profiles:profiles,
    settings:{darkMode:settings.darkMode,notifSlots:settings.notifSlots,pin:settings.pin},
    care_enabled:careEnabled,
    care_code:generateCareCode(),
    updated_at:new Date().toISOString()
  },{onConflict:'id'});
}

async function lookupCareCode(code){
  if(!sb||!code||code.length<6)return null;
  careLoading=true;render();
  try{
    // Search for user whose care_code matches
    var{data,error}=await sb.from('user_data')
      .select('profiles,care_enabled,care_code')
      .eq('care_code',code.toUpperCase().trim())
      .eq('care_enabled',true)
      .single();
    if(error||!data){careLoading=false;return null;}
    careLoading=false;
    return data;
  }catch(e){careLoading=false;return null;}
}

async function doLookupCare(){
  var code=(document.getElementById('care-input')?.value||careInput).trim().toUpperCase();
  if(code.length<6){
    var el=document.getElementById('care-err');
    if(el)el.textContent='Please enter a valid 8-character code.';
    return;
  }
  careInput=code;
  var data=await lookupCareCode(code);
  if(!data){
    careData=null;
    var el=document.getElementById('care-err');
    if(el)el.textContent='Code not found or sharing is disabled. Ask them to enable sharing first.';
    render();
    return;
  }
  careData=data;
  render();
  showToast('✅ Connected!');
}

function toggleCareEnabled(){
  var p=ap();
  upAP({careEnabled:!p.careEnabled});
  saveCareSettings();
  render();
  showToast((ap().careEnabled?'✅ Sharing enabled':'🔒 Sharing disabled'));
}

function copyCareCode(code){
  navigator.clipboard.writeText(code).then(function(){
    showToast('📋 Care code copied!');
  }).catch(function(){
    prompt('Your care code:',code);
  });
}

// ===== BIOMETRIC / WEBAUTHN =====
var _bioCredId = null;

async function setupBiometric() {
  if (!window.PublicKeyCredential) return false;
  try {
    var avail = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if (!avail) return false;
    // Register a platform credential (Face ID / Touch ID / Windows Hello)
    var uid = new Uint8Array(16);
    crypto.getRandomValues(uid);
    var reg = await navigator.credentials.create({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        rp: { name: 'The Daily Dose' },
        user: { id: uid, name: 'user', displayName: 'Daily Dose User' },
        pubKeyCredParams: [{ alg: -7, type: 'public-key' }, { alg: -257, type: 'public-key' }],
        authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
        timeout: 60000
      }
    });
    if (reg) {
      // Store credential id in localStorage
      var credId = Array.from(new Uint8Array(reg.rawId)).map(b => b.toString(16).padStart(2,'0')).join('');
      try { localStorage.setItem('dd_bio_cred', credId); } catch(e) {}
      _bioCredId = credId;
      showToast('✅ Biometric set up! You can now use Face ID / Fingerprint.');
      return true;
    }
  } catch(e) {
    console.log('Biometric setup:', e.message);
  }
  return false;
}

async function tryBiometric() {
  if (!window.PublicKeyCredential) { showToast('Biometric not available on this device'); return; }
  try {
    var cred = await navigator.credentials.get({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        timeout: 60000,
        userVerification: 'required',
        rpId: window.location.hostname || 'localhost'
      }
    });
    if (cred) {
      // Biometric verified — unlock app
      document.getElementById('pin-screen').classList.add('hidden');
      showToast('🔑 Unlocked with biometrics!');
    }
  } catch(e) {
    showToast('Biometric failed — please use your PIN');
  }
}

function checkBiometricAvailable() {
  if (!window.PublicKeyCredential) return;
  var credId = null;
  try { credId = localStorage.getItem('dd_bio_cred'); } catch(e) {}
  if (credId) {
    var btn = document.getElementById('bio-btn');
    if (btn) btn.style.display = 'block';
  }
  // Also check if platform authenticator is available for first-time setup hint
  PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(function(avail) {
    if (avail && !credId) {
      var btn = document.getElementById('bio-btn');
      if (btn) {
        btn.style.display = 'block';
        btn.textContent = '🔑 Set up Face ID / Fingerprint';
        btn.onclick = function() { setupBiometric(); };
      }
    }
  }).catch(function() {});
}

// ===== FORGOT PIN =====
async function forgotPIN() {
  if (!currentUser) {
    alert('Please sign in first to reset your PIN.');
    return;
  }
  var confirmed = confirm('Send a PIN reset link to ' + currentUser.email + '?\n\nAfter clicking the link, your PIN will be cleared so you can set a new one.');
  if (!confirmed) return;
  if (!sb) { showToast('No connection — try again online'); return; }
  try {
    var result = await sb.auth.resetPasswordForEmail(currentUser.email, {
      redirectTo: window.location.href
    });
    if (result.error) {
      showToast('Could not send reset email: ' + result.error.message);
    } else {
      showToast('📧 Reset email sent! Check your inbox.');
      // Also offer to clear PIN immediately if they confirm identity
    }
  } catch(e) {
    // Fallback — offer to clear PIN if they can verify via Supabase session
    var bypass = confirm('Could not send email. If you are already logged in on another device, you can clear the PIN now. Clear PIN?');
    if (bypass) {
      settings.pin = null;
      saveSet();
      document.getElementById('pin-screen').classList.add('hidden');
      showToast('PIN cleared — set a new one in Settings');
    }
  }
}

// Hook into Supabase auth to detect password reset and clear PIN
function handleAuthStateForReset(event, session) {
  if (event === 'PASSWORD_RECOVERY') {
    // User clicked reset link — clear their PIN
    settings.pin = null;
    saveSet();
    showToast('PIN cleared — sign in and set a new PIN in Settings');
  }
}

// ===== INIT =====
function init(){
  // Load local settings first — always
  try{const r=localStorage.getItem(SetK);if(r)settings={...settings,...JSON.parse(r)};}catch(e){}
  document.body.classList.toggle('dark',settings.darkMode);
  startNotifCheck();

  // Attach login key listeners
  setTimeout(()=>{
    try{
      document.getElementById('login-pwd')?.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
      document.getElementById('login-email')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-pwd')?.focus();});
    }catch(e){}
  },100);

  // If no Supabase lib, go offline immediately
  if(!sb){goOffline('Supabase library not loaded');return;}

  // Try to restore existing session — wrap everything in try/catch
  // CORS errors from local files (Origin: null) will be caught here
  var sessionPromise;
  try{
    sessionPromise=sb.auth.getSession();
  }catch(e){
    goOffline(e.message);return;
  }

  // Race against a 6s timeout
  Promise.race([
    sessionPromise,
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),6000))
  ]).then(function(result){
    var session=result&&result.data&&result.data.session;
    if(session){
      currentUser=session.user;
      // Set up auth listener after we know Supabase works
      sb.auth.onAuthStateChange(function(event,sess){handleAuthStateForReset(event,sess);
        if(event==='SIGNED_IN'&&sess){currentUser=sess.user;loadCloud().then(function(){showApp();updateProfHdr();render();});}
        else if(event==='SIGNED_OUT'){currentUser=null;profiles=[];showLogin();}
      });
      loadCloud().then(function(){showApp();}).catch(function(){goOffline('Cloud load failed');});
    } else {
      // No session — show login, but Supabase IS reachable
      sb.auth.onAuthStateChange(function(event,sess){
        if(event==='SIGNED_IN'&&sess){currentUser=sess.user;loadCloud().then(function(){showApp();updateProfHdr();render();});}
        else if(event==='SIGNED_OUT'){currentUser=null;profiles=[];showLogin();}
      });
      showLogin();
    }
  }).catch(function(e){
    console.warn('Supabase unreachable:',e.message);
    goOffline(e.message);
  });
}

function goOffline(reason){
  console.warn('Going offline:',reason);
  setSyncStatus('error');
  tryLoadLocal();
  if(profiles.length){
    if(!activeId)activeId=profiles[0]?.id;
    showApp();
    showToast('⚠️ Using local data — open in browser for cloud sync');
  } else {
    showLogin();
    // Add offline button after a tick
    setTimeout(function(){
      var box=document.querySelector('.login-box');
      if(!box||document.getElementById('offline-btn'))return;
      // Show helpful message about CORS
      var msg=document.createElement('div');
      msg.style.cssText='font-size:13px;color:var(--txt3);text-align:center;margin-top:12px;line-height:1.5;padding:0 8px';
      msg.innerHTML='Having trouble connecting?<br>Open the file via a local server or use the button below.';
      box.appendChild(msg);
      var btn=document.createElement('button');
      btn.id='offline-btn';
      btn.textContent='▶ Use without account (local only)';
      btn.style.cssText='width:100%;margin-top:8px;padding:13px;background:var(--sbg);border:2px dashed var(--brd);border-radius:30px;font-size:14px;font-weight:700;color:var(--stxt);cursor:pointer;font-family:Nunito,sans-serif';
      btn.onclick=function(){
        profiles=[mkProf('My Profile')];activeId=profiles[0].id;
        try{localStorage.setItem('dd_profiles_v1',JSON.stringify(profiles));}catch(e){}
        showApp();setSyncStatus('error');
        showToast('Running locally ☀️');
      };
      box.appendChild(btn);
    },300);
  }
}
