<!DOCTYPE html>
<html lang="en">
<head>
  <!-- PWA Icon Setup -->
  <link rel="apple-touch-icon" href="https://drive.google.com/thumbnail?id=1HaI-1_J2JvgLHV1_VkLUno4-rlWEozHv&sz=w1000">

  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Daily Dose">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" id="pwa-manifest">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Dose</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#FDF6EC;--card:#FFFDF8;--brd:#EDE0CC;
  --txt:#3D2B1F;--txt2:#8B7355;--txt3:#C4A882;
  --ibg:#FFF9F2;--ibrd:#DDD0B8;--sbg:#F5EDE0;--stxt:#8B7355;
  --hdr:#FFFDF8;--shad:rgba(139,100,60,.1);
  --grn:#7BAB8B;--grn-l:#EAF4ED;--grn-b:#B8D4BE;
  --rose:#D4A0A0;--rose-l:#FBF0F0;--rose-b:#E8C4C4;
  --blue:#90B8D8;--blue-l:#EBF4FB;
  --peach:#F0B898;--peach-l:#FEF4EC;
  --lav:#B8A4D8;--lav-l:#F5F0FC;
}
body.dark{
  /* Deep Ghibli night sky */
  --bg:#0D0E1F;--card:#161828;--brd:#272A45;
  --txt:#F0EAD6;--txt2:#9B94B8;--txt3:#524E6E;
  --ibg:#1B1D32;--ibrd:#333660;--sbg:#1B1D32;--stxt:#B0AACC;
  --hdr:#101120;--shad:rgba(0,0,0,.55);
  --grn:#8DBFA0;--grn-l:#0E2A1C;--grn-b:#1E5035;
  --rose:#C8909A;--rose-l:#2A1520;--rose-b:#6A2840;
  --blue:#88B4D8;--blue-l:#101E34;
  --peach:#D4906A;--peach-l:#221408;
  --lav:#A894D4;--lav-l:#160E2E;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;color:var(--txt);font-size:16px;transition:background .3s,color .3s}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#login-screen.hidden{display:none}
.login-box{background:var(--card);border:2px solid var(--brd);border-radius:28px;padding:36px 30px;width:100%;max-width:400px;box-shadow:0 16px 60px var(--shad)}
.login-logo{text-align:center;margin-bottom:8px}
.login-title{font-family:'Fredoka One',cursive;font-size:30px;color:var(--grn);text-align:center;letter-spacing:.5px}
.login-sub{font-size:15px;color:var(--txt2);text-align:center;margin-bottom:28px;margin-top:4px;font-weight:600}
.login-err{font-size:14px;color:#C85858;text-align:center;min-height:20px;margin-bottom:8px;line-height:1.4;font-weight:700}
.login-err.ok{color:var(--grn)}
.login-tabs{display:flex;background:var(--sbg);border-radius:16px;padding:4px;margin-bottom:20px}
.login-tab{flex:1;padding:10px;border:none;background:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--stxt);transition:all .2s}
.login-tab.on{background:var(--card);color:var(--grn);box-shadow:0 3px 14px var(--shad);font-weight:800}
.login-inp{width:100%;padding:13px 16px;border:2px solid var(--ibrd);border-radius:16px;font-size:16px;background:var(--ibg);color:var(--txt);font-family:'Nunito',sans-serif;margin-bottom:12px;font-weight:600;transition:border-color .2s}
.login-inp:focus{outline:none;border-color:var(--grn);box-shadow:0 0 0 4px var(--grn-l)}
.login-btn{width:100%;padding:15px;background:var(--grn);color:#fff;border:none;border-radius:30px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:4px;transition:all .2s;box-shadow:0 6px 20px rgba(123,171,139,.35);letter-spacing:.3px}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(123,171,139,.45)}
.login-btn:disabled{opacity:.55;cursor:default;transform:none;box-shadow:none}

/* PIN */
#pin-screen{position:fixed;inset:0;background:var(--hdr);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px}
#pin-screen.hidden{display:none}
.pin-dots{display:flex;gap:16px;margin:4px 0}
.pin-dot{width:20px;height:20px;border-radius:50%;border:2.5px solid var(--grn);background:transparent;transition:background .15s}
.pin-dot.on{background:var(--grn)}
.pin-grid{display:grid;grid-template-columns:repeat(3,80px);gap:12px;width:270px;justify-content:center}
.pin-btn{width:80px;height:80px;border-radius:50%;border:2px solid var(--brd);background:var(--card);font-size:22px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--txt);transition:all .15s;box-shadow:0 4px 14px var(--shad);display:flex;align-items:center;justify-content:center}
.pin-btn:active{transform:scale(.93)}
.pin-emerg{background:var(--rose-l);color:#C85858;border:2px solid var(--rose-b);padding:14px 20px;border-radius:16px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:6px;width:270px;text-align:center}

/* EMERGENCY */
#emerg-overlay{position:fixed;inset:0;background:var(--card);z-index:4000;overflow-y:auto;padding:20px;display:none}
#emerg-overlay.show{display:block}
#archive-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5000;display:flex;align-items:flex-end;justify-content:center}
#archive-modal.hidden{display:none}
.archive-sheet{background:var(--card);border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:480px;box-shadow:0 -8px 32px var(--shad)}
.archive-reason-btn{width:100%;padding:14px 16px;border:2px solid var(--brd);border-radius:14px;background:var(--sbg);color:var(--txt);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;text-align:left;transition:all .2s;display:block}
.archive-reason-btn:hover{border-color:var(--grn);background:var(--grn-l)}
.archived-section-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--sbg);border:1.5px solid var(--brd);border-radius:16px;cursor:pointer;margin:24px 16px 8px;user-select:none}
.archived-card{background:var(--card);border:1.5px dashed var(--brd);border-radius:16px;padding:14px 16px;margin:0 16px 10px;opacity:0.8}
.emerg-close{position:absolute;top:16px;right:16px;font-size:28px;cursor:pointer;background:none;border:none;color:var(--txt)}
.emerg-hdr{background:linear-gradient(135deg,#D06868,#B85050);color:#fff;border-radius:22px;padding:22px;margin-bottom:16px;text-align:center}
.emerg-name{font-family:'Fredoka One',cursive;font-size:32px;letter-spacing:.5px}
.emerg-meta{font-size:15px;opacity:.9;margin-top:6px;font-weight:600}
.esec{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;padding:16px 18px;margin-bottom:12px;box-shadow:0 4px 18px var(--shad)}
.esec-t{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.e-allergy{display:inline-block;background:var(--rose-l);color:#C85858;border:2px solid var(--rose-b);border-radius:20px;padding:5px 14px;font-size:15px;font-weight:800;margin:3px}
.e-cond{display:inline-block;background:var(--blue-l);color:#5888A8;border:2px solid #C0D8EC;border-radius:20px;padding:5px 14px;font-size:15px;margin:3px;font-weight:700}
.e-med{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--brd)}
.e-med:last-child{border-bottom:none}
.e-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* MAIN APP */
#pp{max-width:600px;margin:0 auto;padding-bottom:40px}
.hdr{background:linear-gradient(135deg,var(--hdr) 0%,#F5EDDF 100%);border-bottom:2px solid var(--brd);padding:10px 20px 10px;position:sticky;top:0;z-index:100}
body.dark .hdr{background:linear-gradient(135deg,#101120 0%,#14162C 100%)}
.hdr-row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.logo{font-family:'Fredoka One',cursive;font-size:23px;color:var(--grn);letter-spacing:.5px}
.tagline{font-size:11px;color:var(--txt3);margin-top:2px;font-weight:700;letter-spacing:.3px}
.hdr-right{display:flex;align-items:center;gap:8px}
.sync-chip{font-size:13px;color:var(--txt3);min-width:80px;text-align:right;font-weight:700}
.prof-btn{display:flex;align-items:center;gap:8px;padding:11px 18px;background:var(--sbg);border:2px solid var(--brd);border-radius:30px;cursor:pointer;font-size:16px;font-weight:800;color:var(--txt);position:relative;white-space:nowrap;max-width:200px;transition:all .2s}
.prof-btn:hover{border-color:var(--grn)}
.pdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.pname-t{overflow:hidden;text-overflow:ellipsis;max-width:100px}
.pmenu{position:absolute;top:calc(100% + 8px);right:0;background:var(--card);border:2px solid var(--brd);border-radius:22px;box-shadow:0 10px 40px var(--shad);z-index:200;min-width:190px;overflow:hidden}
.pmenu-item{padding:14px 18px;font-size:15px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--txt);border-bottom:1px solid var(--brd);font-weight:700;transition:background .15s}
.pmenu-item:last-child{border-bottom:none}
.pmenu-item:hover{background:var(--sbg)}
.pmenu-item.cur{font-weight:800;color:var(--grn)}
.nav{background:var(--hdr);border-bottom:2px solid var(--brd);display:flex;position:sticky;top:142px;z-index:99}
body.dark .nav{background:#101120;border-bottom-color:#1E2248}
.tab{flex:1;padding:14px 4px 12px;font-size:14px;color:var(--txt2);text-align:center;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;line-height:1;transition:color .2s;font-weight:700}
.tab.on{color:#e07b00;background:rgba(224,123,0,0.10);border-bottom:3px solid #e07b00;border-radius:8px 8px 0 0;font-weight:800;box-shadow:inset 0 0 0 1px rgba(224,123,0,0.18)}
.tab-ico-wrap{display:block;margin-bottom:3px;height:36px;display:flex;align-items:center;justify-content:center}
.sub-nav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;padding:0 16px}
.sub-tab{padding:9px 18px;border-radius:30px;font-size:14px;border:2px solid var(--brd);background:var(--sbg);color:var(--stxt);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .2s}
.sub-tab:hover{border-color:var(--grn)}
.sub-tab.on{background:var(--grn);color:#fff;border-color:var(--grn);font-weight:800}
.content{padding:16px 0 0}
.card{background:var(--card);border:1.5px solid var(--brd);border-radius:22px;padding:18px 20px;margin:0 16px 14px;box-shadow:0 4px 22px var(--shad)}
.sechdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding:0 16px}
.sectitle{font-family:'Fredoka One',cursive;font-size:22px;color:var(--txt);letter-spacing:.3px;padding:0 16px}
.empty{text-align:center;padding:48px 20px;color:var(--txt2)}
.empty-t{font-family:'Fredoka One',cursive;font-size:20px;color:var(--txt);margin:12px 0 8px}
.dose-card{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;padding:14px 16px;margin:0 16px 10px;display:flex;align-items:center;gap:12px;transition:opacity .2s;box-shadow:0 4px 16px var(--shad)}
.done{opacity:.4}
.chkbtn{width:36px;height:36px;border-radius:50%;border:2.5px solid var(--ibrd);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;color:transparent;font-family:'Nunito',sans-serif;transition:all .2s}
.chkbtn.chk{background:var(--grn);border-color:var(--grn);color:#fff;box-shadow:0 4px 14px rgba(123,171,139,.4)}
.snz{font-size:12px;padding:5px 12px;border-radius:30px;border:2px solid var(--brd);background:var(--sbg);color:var(--stxt);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;transition:all .2s}
.snz:hover{border-color:var(--grn);color:var(--grn)}
.mbar{width:5px;border-radius:10px;align-self:stretch;flex-shrink:0;min-height:22px}
.tshdr{font-size:12px;font-weight:800;color:var(--txt2);margin:18px 16px 10px;display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.9px}
.slot-pick{position:relative;margin:18px 16px 12px}
.slot-bubble{width:100%;display:flex;align-items:center;gap:10px;background:var(--sbg);border:1.5px solid var(--bdr);border-radius:18px;padding:12px 16px;cursor:pointer;font-family:inherit;text-align:left;transition:border-color .15s,background .15s}
.slot-bubble:hover{border-color:var(--txt3)}
.slot-bubble .sb-icon{font-size:22px;line-height:1}
.slot-bubble .sb-main{flex:1;min-width:0}
.slot-bubble .sb-label{font-size:16px;font-weight:800;color:var(--txt);line-height:1.15}
.slot-bubble .sb-time{font-size:12px;color:var(--txt3);margin-top:2px}
.slot-bubble .sb-caret{font-size:14px;color:var(--txt3);transition:transform .2s}
.slot-bubble.open .sb-caret{transform:rotate(180deg)}
.slot-badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:30px;border:1.5px solid transparent;white-space:nowrap}
.slot-badge.now{background:var(--grn-l);color:#5A8A6A;border-color:var(--grn-b)}
.slot-badge.miss{background:var(--rose-l);color:#C85858;border-color:var(--rose-b)}
body.dark .slot-badge.now{color:var(--grn)}
.slot-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg);border:1.5px solid var(--bdr);border-radius:18px;padding:6px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.12);overflow:hidden}
body.dark .slot-menu{box-shadow:0 8px 24px rgba(0,0,0,.5)}
.slot-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;transition:background .12s}
.slot-opt:hover{background:var(--sbg)}
.slot-opt.active{background:var(--sbg)}
.slot-opt.future{opacity:.5}
.slot-opt .so-icon{font-size:18px;line-height:1}
.slot-opt .so-main{flex:1;min-width:0}
.slot-opt .so-label{font-size:15px;font-weight:700;color:var(--txt);line-height:1.15}
.slot-opt .so-time{font-size:11px;color:var(--txt3);margin-top:2px}
.refill-box{background:var(--peach-l);border:1.5px solid #F0C8A0;border-radius:18px;padding:14px 16px;margin:14px 16px 0}
body.dark .refill-box{background:#2A1A10;border-color:#5A3A20}
.prog-chip{font-size:13px;color:#5A8A6A;background:var(--grn-l);padding:7px 16px;border-radius:30px;font-weight:800;border:1.5px solid var(--grn-b)}
body.dark .prog-chip{color:var(--grn)}
.badge{font-size:12px;padding:4px 11px;border-radius:30px;display:inline-block;font-weight:800;border:1.5px solid transparent}
.bi{background:var(--blue-l);color:#5888A8;border-color:#C0D8EC}
.bg{background:var(--grn-l);color:#5A8A6A;border-color:var(--grn-b)}
.bs{background:var(--sbg);color:var(--stxt);border-color:var(--brd)}
body.dark .bi{background:var(--blue-l);color:var(--blue);border-color:#2A4060}
.fld{margin-bottom:16px}
.lbl{display:block;font-size:12px;font-weight:800;color:var(--txt2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;padding:12px 14px;border:2px solid var(--ibrd);border-radius:16px;font-size:15px;background:var(--ibg);color:var(--txt);font-family:'Nunito',sans-serif;font-weight:600;transition:border-color .2s}
.inp:focus{outline:none;border-color:var(--grn);box-shadow:0 0 0 4px var(--grn-l)}
select.inp{cursor:pointer}
textarea.inp{min-height:80px;resize:vertical}
.btnp{background:var(--grn);color:#fff;border:none;padding:12px 22px;border-radius:30px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;box-shadow:0 4px 16px rgba(123,171,139,.32);letter-spacing:.2px}
.btnp:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(123,171,139,.45)}
.btnp:active{transform:translateY(0)}
.btnp:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}
.btns{background:var(--sbg);color:var(--stxt);border:2px solid var(--brd);padding:12px 20px;border-radius:30px;font-size:15px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .2s}
.btns:hover{border-color:var(--grn);color:var(--grn)}
.btnd{background:var(--rose-l);color:#C85858;border:1.5px solid var(--rose-b);padding:8px 12px;border-radius:14px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
body.dark .btnd{background:#3a0e0e;color:#f48fb1;border-color:#804040}
.btng{background:var(--grn-l);color:#5A8A6A;border:2px solid var(--grn-b);padding:12px 20px;border-radius:30px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
.btng:hover{background:var(--grn);color:#fff}
body.dark .btng{color:var(--grn)}
.tt{padding:8px 14px;border-radius:30px;font-size:14px;border:2px solid var(--brd);background:var(--sbg);color:var(--stxt);cursor:pointer;font-family:'Nunito',sans-serif;margin:0 6px 7px 0;font-weight:700;transition:all .2s}
.tt:hover{border-color:var(--grn)}
.tt.on{background:var(--grn-l);color:#5A8A6A;border-color:var(--grn-b);font-weight:800}
body.dark .tt.on{color:var(--grn)}
.cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;display:inline-block;transition:all .2s;box-shadow:0 2px 8px var(--shad)}
.cdot.on{border-color:var(--txt)}
.selcard{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:2px solid var(--ibrd);border-radius:18px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:15px;text-align:left;margin-bottom:10px;width:100%;color:var(--txt);font-weight:700;transition:all .2s}
.selcard:hover{border-color:var(--grn)}
.selcard.on{border-color:var(--grn);background:var(--grn-l);color:#5A8A6A}
body.dark .selcard.on{background:var(--grn-l)}
.ai-box{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;padding:18px;margin:14px 16px 0;font-size:15px;line-height:1.8;color:var(--txt);white-space:pre-wrap;box-shadow:0 4px 18px var(--shad)}
.disc{background:var(--peach-l);border:1.5px solid #F0D0B0;border-radius:16px;padding:12px 16px;font-size:13px;color:#8B5E3C;margin:0 16px 16px;line-height:1.5;font-weight:700}
body.dark .disc{background:#2A1E10;border-color:#5A4020;color:#D4A060}
.chklbl{display:flex;align-items:center;gap:12px;font-size:15px;color:var(--txt);cursor:pointer;font-weight:700}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.sbox{border:2px solid var(--brd);border-radius:22px;padding:16px;min-height:110px}
.slbl{font-size:12px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;margin-bottom:2px}
.stime{font-size:12px;margin-bottom:12px;opacity:.75;font-weight:600}
.pitem{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.pdotm{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:3px}
.pname{font-size:14px;font-weight:800;color:var(--txt);line-height:1.3}
.psub{font-size:12px;color:var(--txt3);margin-top:1px;font-weight:600}
.tips{background:var(--lav-l);border:1.5px solid #D8CCF0;border-radius:20px;padding:16px;margin:0 16px}
body.dark .tips{background:var(--lav-l);border-color:#3A3060}
.tip{font-size:14px;color:#6A5A8A;line-height:1.75;padding:8px 0;border-bottom:1px solid #E0D4F8;font-weight:600}
body.dark .tip{color:#A090C0;border-color:#3A3060}
.tip:last-child{border-bottom:none}

// ===== PROFILE HELPERS =====
function ap(){return profiles.find(p=>p.id===activeId)||profiles[0]||{};}
function upAP(changes){profiles=profiles.map(p=>p.id===activeId?{...p,...changes}:p);scheduleSave();}
function mkProf(name){return{id:'p'+Date.now(),name,color:COLORS[profiles.length%COLORS.length],dob:'',bloodType:'',allergies:[],conditions:[],meds:[],archivedMeds:[],doses:{},history:{},journal:[],contacts:[]};}

// ===== CLOUD SYNC =====
function setSyncStatus(s){const el=document.getElementById('sync-chip');if(!el)return;const k={loading:'set.syncLoading',saving:'set.syncSaving',synced:'set.syncOk',error:'set.syncError'}[s];el.textContent=k?t(k):'';}

async function loadCloud(){
  if(!currentUser)return;
  setSyncStatus('loading');
  try{
    const{data,error}=await sb.from('user_data').select('profiles,settings').eq('id',currentUser.id).single();
    if(error&&error.code!=='PGRST116')throw error;
    if(data&&data.profiles&&data.profiles.length){
      profiles=data.profiles;
      if(data.settings)settings={...settings,...data.settings};
    } else {
      // New user — migrate local data if any
      try{const r=localStorage.getItem('dd_profiles_v1');if(r)profiles=JSON.parse(r);}catch(e){}
      if(!profiles.length)profiles=[mkProf('My Profile')];
      await saveCloud();
    }
    if(!activeId||!profiles.find(p=>p.id===activeId))activeId=profiles[0]?.id;
    setSyncStatus('synced');
  }catch(e){setSyncStatus('error');tryLoadLocal();}
}

async function saveCloud(){
  if(!currentUser)return;
  try{
    await sb.from('user_data').upsert({id:currentUser.id,profiles,settings:{darkMode:settings.darkMode,notifSlots:settings.notifSlots,pin:settings.pin,pinIdleMinutes:settings.pinIdleMinutes,trustedDevices:settings.trustedDevices||[]},care_enabled:ap().careEnabled||false,care_code:currentUser?currentUser.id.replace(/-/g,'').substring(0,8).toUpperCase():null,updated_at:new Date().toISOString()},{onConflict:'id'});
    setSyncStatus('synced');
    // also cache locally
    try{localStorage.setItem('dd_profiles_v1',JSON.stringify(profiles));}catch(e){}
  }catch(e){setSyncStatus('error');}
}

function scheduleSave(){setSyncStatus('saving');clearTimeout(saveTimer);saveTimer=setTimeout(saveCloud,1500);}
function saveSet(){try{localStorage.setItem(SetK,JSON.stringify(settings));}catch(e){}scheduleSave();}

function tryLoadLocal(){
  try{const r=localStorage.getItem('dd_profiles_v1');if(r)profiles=JSON.parse(r);}catch(e){}
  try{const r=localStorage.getItem(SetK);if(r)settings={...settings,...JSON.parse(r)};}catch(e){}
  if(!profiles.length)profiles=[mkProf('My Profile')];
  if(!activeId||!profiles.find(p=>p.id===activeId))activeId=profiles[0]?.id;
}

let loginTab='in';
function setLoginTab(t){
  loginTab=t;
  document.getElementById('lt-in').classList.toggle('on',t==='in');
  document.getElementById('lt-up').classList.toggle('on',t==='up');
  document.getElementById('login-btn').textContent=t==='in'?'Sign in':'Create account';
  document.getElementById('login-pwd2-wrap').style.display=t==='up'?'block':'none';
  document.getElementById('forgot-wrap').style.display=t==='in'?'block':'none';
  document.getElementById('login-err').textContent='';
}
function setLoginErr(msg,ok=false){const el=document.getElementById('login-err');el.textContent=msg;el.className='login-err'+(ok?' ok':'');}
function setLoginLoading(on){document.getElementById('login-btn').disabled=on;document.getElementById('login-btn').textContent=on?'Please wait…':(loginTab==='in'?'Sign in':'Create account');}

async function doAuth(){
  const email=(document.getElementById('login-email').value||'').trim();
  const pwd=document.getElementById('login-pwd').value||'';
  if(!email||!pwd){setLoginErr('Please enter your email and password.');return;}
  setLoginLoading(true);setLoginErr('');
  if(loginTab==='in'){
    var signInResult;
    try{signInResult=await sb.auth.signInWithPassword({email,password:pwd});}
    catch(e){setLoginErr('Connection failed — check your internet and try again.');setLoginLoading(false);return;}
    const{error}=signInResult;
    if(error){setLoginErr(error.message==='Failed to fetch'?'Connection failed — check your internet connection.':error.message);setLoginLoading(false);}
  } else {
    const pwd2=document.getElementById('login-pwd2').value||'';
    if(pwd.length<6){setLoginErr('Password must be at least 6 characters.');setLoginLoading(false);return;}
    if(pwd!==pwd2){setLoginErr('Passwords do not match.');setLoginLoading(false);return;}
    const{error}=await sb.auth.signUp({email,password:pwd});
    setLoginLoading(false);
    if(error)setLoginErr(error.message);
    else setLoginErr('✅ Account created! Check your email to confirm, then sign in.',true);
  }
}
async function resetPwd(){
  const email=(document.getElementById('login-email').value||'').trim();
  if(!email){setLoginErr('Enter your email above first.');return;}
  const{error}=await sb.auth.resetPasswordForEmail(email);
  setLoginErr(error?error.message:'📧 Reset link sent! Check your email.',!error);
}
async function logout(){if(!confirm('Sign out?'))return;await sb.auth.signOut();}

let _appShown=false;
function showApp(){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('pp').style.display='block';
  // Register this device as trusted after successful email login
  if(settings.pin && currentUser && !_appShown){
    registerTrustedDevice();
  }
  // PIN: only show if app was locked (idle), not on fresh login or camera return
  if(settings.pin && appLocked){
    document.getElementById('pin-screen').classList.remove('hidden');
    setTimeout(checkBiometricAvailable,300);
  } else {
    appLocked=false;
    // Hide PIN screen if shown spuriously (e.g. camera return)
    document.getElementById('pin-screen').classList.add('hidden');
  }
  if(!_appShown){
    startIdleTimer();
    _appShown=true;
  }
  updateProfHdr();render();startNotifCheck();
  registerServiceWorker();
  var onboarded=false;
  try{onboarded=!!localStorage.getItem('dd_onboarded');}catch(e){}
  var isNewUser=!onboarded&&(!profiles[0]||!(profiles[0].meds&&profiles[0].meds.length));
  if(isNewUser)setTimeout(showOnboarding,800);
}
function showLogin(){
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('pp').style.display='none';
  document.getElementById('pin-screen').classList.add('hidden');
}

function togglePMenu(e){
  e.stopPropagation();

  const btn=document.getElementById('prof-btn');
  const menu=document.createElement('div');menu.id='pmenu';menu.className='pmenu';

    const item=document.createElement('div');item.className='pmenu-item'+(p.id===activeId?' cur':'');
    item.innerHTML=`<div style="width:11px;height:11px;border-radius:50%;background:${p.color};flex-shrink:0"></div><span style="flex:1">${esc(p.name)}</span>${p.id===activeId?'<span style="color:#1976d2">✓</span>':''}`;
    item.onclick=ev=>{ev.stopPropagation();switchProf(p.id);};
    menu.appendChild(item);
  });

  add.innerHTML='<span style="color:#1976d2;font-size:20px">+</span><span style="color:#1976d2;font-weight:700">Add profile</span>';

function switchProf(id){activeId=id;aiRes='';selIds='';medSearch='';document.getElementById('pmenu')?.remove();updateProfHdr();render();showToast(`Switched to ${ap().name}`);}
function addProf(){const name=prompt('Name for this profile (e.g. "Dad\'s Meds"):');if(!name?.trim())return;const np=mkProf(name.trim());profiles.push(np);activeId=np.id;scheduleSave();updateProfHdr();render();showToast(`Profile "${np.name}" created!`);}

function rDash(){
  const p=ap(),meds=p.meds||[],doses=p.doses||{};
  const lang=p.lang||'en';
  const today=new Date().toLocaleDateString(lang==='ko'?'ko-KR':'en-US',{weekday:'long',month:'long',day:'numeric'});
  const total=meds.reduce((a,m)=>a+(m.times?.length||0),0),done=Object.values(doses).filter(Boolean).length;
  let h=`<button class="emerg-btn" onclick="showEmergency('${p.id}')">${t('dash.emergency')}</button>`;
  if(!meds.length)return h+`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:17px;font-weight:700;color:var(--txt)">${today}</span></div><div class="empty" style="padding:32px 20px"><div style="font-size:56px;margin-bottom:4px">🌸</div><div class="empty-t">${t('dash.welcomeName').replace('{name}',esc(p.name))}</div><div style="font-size:15px;color:var(--txt2);margin-bottom:18px">${t('dash.welcomeNoMeds')}<br>${t('dash.welcomeSetup')}</div><button class="btnp" onclick="goTo('meds')" style="font-size:16px;padding:14px 28px">${t('dash.welcomeAddFirst')}</button><div style="margin-top:14px;font-size:13px;color:var(--txt3)">${t('dash.welcomeQuick')}</div></div>`;
  const rxCnt=meds.filter(m=>m.type==='prescription').length;
  const suppCnt=meds.filter(m=>m.type==='supplement').length;
  const otcCnt=meds.filter(m=>m.type==='otc').length;
  const cntParts=[];if(rxCnt)cntParts.push(rxCnt+' '+t('med.rxCount'));if(suppCnt)cntParts.push(suppCnt+' '+t('med.suppCount'));if(otcCnt)cntParts.push(otcCnt+' '+t('med.otcCount'));
  const medCountStr=cntParts.join(' · ');
  h+=`<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:17px;font-weight:700;color:var(--txt)">${today}</span>${total?`<span class="prog-chip">${done}/${total} done</span>`:''}</div>${medCountStr?`<div style="font-size:13px;color:var(--txt3);margin-top:3px">${medCountStr}</div>`:''}</div>`;
  // ── Time-slot dropdown bubble ──
  // Determine current time slot from hour. Order matters: morning < afternoon < evening < night.
  const _hr=new Date().getHours();
  const _curSlotId=_hr<SLOT_HRS.afternoon?'morning':_hr<SLOT_HRS.evening?'afternoon':_hr<SLOT_HRS.night?'evening':'night';
  // Build per-slot info: which slots have meds, missed counts for past slots
  const _timeOrder=['morning','afternoon','evening','night'];
  const _curIdx=_timeOrder.indexOf(_curSlotId);
  const _slotInfo={};
  SLOTS.forEach(s=>{
    const sm=meds.filter(m=>m.times?.includes(s.id));
    const idx=_timeOrder.indexOf(s.id); // -1 for as_needed
    let state='available';
    if(s.id==='as_needed')state='asneeded';
    else if(idx<_curIdx)state='past';
    else if(idx===_curIdx)state='now';
    else state='future';
    let missed=0;
    if(state==='past')missed=sm.filter(m=>{const dv=doses[`${m.id}-${s.id}`];return !(dv&&(dv===true||dv.taken));}).length;
    _slotInfo[s.id]={slot:s,meds:sm,state,missed};
  });
  // Resolve which slot to show: user pick OR current OR first slot with meds OR morning
  let _activeId=selectedSlot;
  if(!_activeId||!_slotInfo[_activeId])_activeId=_curSlotId;
  if(!_slotInfo[_activeId].meds.length){
    // Prefer the current slot even if empty; but if user explicitly picked one, honor it
    // (selectedSlot is null here since we fell through), so try to find any slot with meds
    const withMeds=SLOTS.find(s=>_slotInfo[s.id].meds.length);
    if(withMeds)_activeId=withMeds.id;
  }
  const _active=_slotInfo[_activeId];
  // Build the bubble + (optional) menu
  let _bubble=`<div class="slot-pick">`;
  _bubble+=`<button type="button" class="slot-bubble${slotMenuOpen?' open':''}" onclick="toggleSlotMenu(event)">
    <span class="sb-icon">${_active.slot.icon}</span>
    <span class="sb-main">
      <div class="sb-label">${slotLabel(_active.slot)}</div>
      <div class="sb-time">${slotTime(_active.slot)}</div>
    </span>
    ${_active.state==='now'?`<span class="slot-badge now">${t('dash.nowBadge')}</span>`:''}
    ${_active.state==='past'&&_active.missed>0?`<span class="slot-badge miss">⚠️ ${_active.missed} ${t('dash.missedFull')}</span>`:''}
    <span class="sb-caret">▾</span>
  </button>`;
  if(slotMenuOpen){
    _bubble+=`<div class="slot-menu" onclick="event.stopPropagation()">`;
    SLOTS.forEach(s=>{
      const inf=_slotInfo[s.id];
      const cls=`slot-opt${s.id===_activeId?' active':''}${inf.state==='future'?' future':''}`;
      _bubble+=`<div class="${cls}" onclick="pickSlot('${s.id}')">
        <span class="so-icon">${s.icon}</span>
        <span class="so-main">
          <div class="so-label">${slotLabel(s)}</div>
          <div class="so-time">${slotTime(s)}</div>
        </span>
        ${inf.state==='now'?`<span class="slot-badge now">${t('dash.nowBadge')}</span>`:''}
        ${inf.state==='past'&&inf.missed>0?`<span class="slot-badge miss">⚠️ ${inf.missed}</span>`:''}
      </div>`;
    });
    _bubble+=`</div>`;
  }
  _bubble+=`</div>`;
  h+=_bubble;
  // Render meds for the active slot only
  if(!_active.meds.length){
    h+=`<div class="empty" style="padding:24px 20px;margin:0 16px"><div style="font-size:32px;margin-bottom:6px">✨</div><div style="font-size:15px;color:var(--txt2)">${lang==='ko'?`${slotLabel(_active.slot)}에 ${t('dash.nothingScheduled')}`:`${t('dash.nothingScheduled')} ${slotLabel(_active.slot).toLowerCase()}.`}</div></div>`;

        <div style="font-size:14px;color:var(--txt2);margin-top:3px">${esc(m.dosage||'')}${m.dosage&&m.frequency?' · ':''}${esc(m.frequency||'')}</div>
        ${m.withFood?`<div style="font-size:13px;color:var(--txt3);margin-top:3px">${t('dash.withFood')}</div>`:''}${m.customReminder&&!chk?`<div style="font-size:12px;color:var(--grn);margin-top:2px">💬 ${esc(m.customReminder)}</div>`:''}</div>
        ${!chk?`<button class="snz" onclick="snooze('${esc(m.name)}','${s.id}')">${t('dash.snooze')}</button>`:''}${isLate?`<span class="late-chip">${t('dash.late')}</span>`:''}
        <button class="chkbtn${chk?' chk':''}" onclick="toggleDose('${k}')">${chk?'✓':''}</button>
      </div>`;
    });
  }
  const refill=meds.filter(m=>m.quantity!==''&&m.quantity!==undefined&&m.refillAt!==''&&m.refillAt!==undefined&&Number(m.quantity)<=Number(m.refillAt));
  if(refill.length)h+=`<div class="refill-box" style="margin-top:14px"><div style="font-size:14px;font-weight:700;color:#795548;margin-bottom:7px">${t('dash.refillReminder')}</div>${refill.map(m=>`<div style="font-size:14px;color:#795548;margin-bottom:3px">💊 ${esc(m.name)} — ${lang==='ko'?esc(m.quantity)+'개 남음':esc(m.quantity)+' remaining'}</div>`).join('')}</div>`;
  // Interaction warnings banner
  const warnKeys=Object.keys(_interactionWarnings);
  if(warnKeys.length){
    h+=`<div style="margin-top:14px;background:var(--rose-l);border:1.5px solid var(--rose-b);border-radius:14px;padding:14px">
      <div style="font-size:14px;font-weight:800;color:#C85858;margin-bottom:8px">${t('dash.interactions')}</div>`;
    warnKeys.forEach(k=>{h+=`<div style="font-size:13px;color:var(--txt);line-height:1.6;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--rose-b)">${esc(_interactionWarnings[k])}</div>`;});
    h+=`<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      <button class="btns" style="font-size:13px;padding:7px 12px;color:#C85858;border-color:var(--rose-b)" onclick="toolTab='check';goTo('tools')">${t('dash.fullCheck')}</button>
      <button class="btns" style="font-size:13px;padding:7px 12px" onclick="_interactionWarnings={};render()">${t('common.dismiss')}</button>
    </div></div>`;
  }
  h+=`<div style="margin-top:12px;text-align:center"><button class="btng" style="font-size:13px;padding:8px 16px" onclick="runDashInteractionCheck()">${t('dash.checkInteractions')}</button></div>`;

  // ── Weight trend widget ──
  const inbody=getInBody();
  if(inbody.length){
    const latest=inbody[inbody.length-1];
    const prev=inbody.length>1?inbody[inbody.length-2]:null;
    const diff=prev?+(latest.weight-prev.weight).toFixed(1):null;
    const diffColor=diff===null?'var(--txt3)':diff<0?'#1b7a4e':diff>0?'#c62828':'var(--txt3)';
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;background:var(--sbg);border-radius:14px;padding:12px 16px;margin-top:12px;cursor:pointer" onclick="wellTab='health';healthTab='body';goTo('wellness')">

          <span style="font-size:12px;color:var(--txt3)">${lang==='ko'?esc(m.quantity)+'개 남음':esc(m.quantity)+' left'}</span>

      </div>`;
    });
    h+=`</div>`;

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json',...apiHeaders()},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,
        system:'You are a medication safety assistant. Be brief, clear, and practical. General info only, not medical advice. If no interactions found, say so clearly.',
        messages:[{role:'user',content:`Check for any notable interactions between these medications: ${names.join(', ')}. List any interactions found, one per line, as "MedA + MedB: brief description". If none, respond with exactly "No known interactions found."`}]})});
    const d=await r.json();
    const txt=(d.content?.map(b=>b.text||'').join('')||'').trim();
    if(txt.toLowerCase().includes('no known')){
      showToast(t('dash.checkNoneFound'));
    } else {
      // Parse interactions into cache
      txt.split('\n').filter(l=>l.trim()&&l.includes(':')).forEach((l,i)=>{_interactionWarnings['w'+i]=l.trim();});
      if(!Object.keys(_interactionWarnings).length)_interactionWarnings['w0']=txt;
      render();showToast(t('dash.checkFoundSome'));
    }
  }catch(e){showToast(t('dash.checkError'));}
}
function toggleDose(k){
  const d={...(ap().doses||{})};
  const slot=k.split('-').slice(1).join('-');
  const slotHour=SLOT_HRS[slot]||12;
  const nowHour=new Date().getHours();
  const isLate=!d[k]&&Math.abs(nowHour-slotHour)>=2;
  d[k]=!d[k]?{taken:true,time:new Date().toISOString(),late:isLate}:null;
  upAP({doses:d});saveD();checkNewBadges();render();
}
function saveD(){const p=ap(),today=new Date().toDateString(),h={...(p.history||{})};h[today]={...(p.doses||{})};const keys=Object.keys(h).sort((a,b)=>new Date(b)-new Date(a));if(keys.length>90)keys.slice(90).forEach(k=>delete h[k]);upAP({history:h});}
function snooze(name,slotId){
  const slotObj=SLOTS.find(x=>x.id===slotId);

function startAdd(){editing={id:null,name:'',type:'prescription',brand:'',servingSize:'',activeIngredients:[],isCombo:false,components:[],dosage:'',frequency:'Once daily',times:['morning'],withFood:false,quantity:'',refillAt:'',notes:'',color:COLORS[0]};view='add';document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v==='meds'));render();}
function startEdit(id){editing={...(ap().meds||[]).find(m=>m.id===id)};view='add';document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v==='meds'));render();}
function dupMed(id){const m={...(ap().meds||[]).find(x=>x.id===id),id:'m'+Date.now(),name:(ap().meds||[]).find(x=>x.id===id).name+' (copy)'};upAP({meds:[...(ap().meds||[]),m]});showToast(t('meds.toastDuplicated'));}
function moveMed(id,dir){const ms=[...(ap().meds||[])],i=ms.findIndex(m=>m.id===id);if(i+dir<0||i+dir>=ms.length)return;[ms[i],ms[i+dir]]=[ms[i+dir],ms[i]];upAP({meds:ms});}
function delMed(id){const m=(ap().meds||[]).find(x=>x.id===id);if(confirm(t('meds.delConfirm').replace('{name}',m?.name||''))){upAP({meds:(ap().meds||[]).filter(x=>x.id!==id)});render();}}
function toggleComboExpand(id){expandedCombos[id]=!expandedCombos[id];render();}
function archiveMed(id){pendingArchiveId=id;refreshArchiveModal();document.getElementById('archive-modal').classList.remove('hidden');}
function confirmArchive(reason){
  if(!pendingArchiveId)return;
  document.getElementById('archive-modal').classList.add('hidden');
  const meds=ap().meds||[],archived=ap().archivedMeds||[];
  const med=meds.find(m=>m.id===pendingArchiveId);
  if(!med){pendingArchiveId=null;return;}
  const archivedMed={...med,archivedDate:new Date().toISOString(),archiveReason:reason};
  upAP({meds:meds.filter(m=>m.id!==pendingArchiveId),archivedMeds:[...archived,archivedMed]});
  const name=med.name;pendingArchiveId=null;
  showArchived=true;render();showToast(t('meds.toastArchived').replace('{name}',name));
}
function cancelArchive(){pendingArchiveId=null;document.getElementById('archive-modal').classList.add('hidden');}
function restoreMed(id){
  const archived=ap().archivedMeds||[];
  const med=archived.find(m=>m.id===id);
  if(!med)return;
  const {archivedDate,archiveReason,...restoredMed}=med;
  const medHistory=[...(restoredMed.medHistory||[]),{action:'Restored from archive',date:new Date().toISOString()}];
  upAP({meds:[...(ap().meds||[]),{...restoredMed,medHistory}],archivedMeds:archived.filter(m=>m.id!==id)});
  render();showToast(t('meds.toastRestored').replace('{name}',med.name));
}
function deleteArchived(id){const med=(ap().archivedMeds||[]).find(m=>m.id===id);if(confirm(t('meds.deleteArchivedConfirm').replace('{name}',med?.name||''))){upAP({archivedMeds:(ap().archivedMeds||[]).filter(m=>m.id!==id)});render();}}

function saveFrm(){
  const name=(document.getElementById('fn')?.value||'').trim();if(!name){alert('Please enter a name.');return;}
  const wasNew=!editing.id;
  editing.name=name;editing.type=document.getElementById('ft')?.value||'prescription';
  editing.medForm=document.getElementById('fform')?.value||'Tablet';
  editing.dosageAmount=(document.getElementById('fdamt')?.value||'').trim();
  editing.dosageUnit=document.getElementById('fdunit')?.value||'mg';
  const amt=editing.dosageAmount,unt=editing.dosageUnit;
  editing.dosage=amt?(amt+' '+unt):((document.getElementById('fd')?.value||'').trim());
  editing.frequency=document.getElementById('ff')?.value;
  editing.quantity=document.getElementById('fq')?.value||'';editing.refillAt=document.getElementById('fr')?.value||'';
  editing.withFood=document.getElementById('ff2')?.checked||false;editing.notes=(document.getElementById('fno')?.value||'').trim();
  editing.rxNumber=(document.getElementById('frx')?.value||'').trim();
  editing.startDate=document.getElementById('fstart')?.value||'';
  editing.expiryDate=document.getElementById('fexp')?.value||'';
  editing.customReminder=(document.getElementById('fremind')?.value||'').trim();
  // Supplement/OTC-specific fields
  if(editing.type==='supplement'||editing.type==='otc'){
    editing.brand=(document.getElementById('fbrand')?.value||'').trim();
    editing.servingSize=(document.getElementById('fserving')?.value||'').trim();
    editing.isCombo=document.getElementById('fiscombo')?.checked||false;
    if(editing.isCombo){
      syncComponentsFromDOM();
      delete editing.activeIngredients;
    } else {
      syncActiveIngredientsFromDOM();
      delete editing.components;
    }
  } else {
    // clear supplement-only fields on prescription to avoid stale data
    delete editing.brand;
    delete editing.servingSize;
    delete editing.activeIngredients;
    delete editing.isCombo;
    delete editing.components;
  }
  // track history
  if(!editing.medHistory)editing.medHistory=[];
  if(wasNew)editing.medHistory=[{date:new Date().toISOString(),action:'Started'}];
  else editing.medHistory=[...editing.medHistory,{date:new Date().toISOString(),action:'Updated'}];
  const ms=[...(ap().meds||[])];
  if(editing.id){const i=ms.findIndex(m=>m.id===editing.id);if(i>=0)ms[i]={...editing};else ms.push({...editing,id:'m'+Date.now()});}
  else{ms.push({...editing,id:'m'+Date.now()});}
  // auto interaction check
  if(wasNew&&ms.length>1){
    const newMed=editing.name;
    const others=ms.filter(m=>m.id!==editing.id).map(m=>m.name).join(', ');
    setTimeout(()=>autoInteractionCheck(newMed,others),500);
  }
  upAP({meds:ms});goTo('meds');
}

function onComboToggle(){
  const cb=document.getElementById('fiscombo');if(!cb)return;
  const turningOn=cb.checked;
  if(turningOn){
    // Migration: if user has single-supp ingredients, offer to wrap them in a new component
    syncActiveIngredientsFromDOM();
    const existing=editing.activeIngredients||[];
    if(existing.length){
      const ko=(ap().lang||'en')==='ko';
      const msg=ko
        ? `${existing.length}${t('form.wrapPromptB')}\n\n${t('form.wrapPromptOk')}\n${t('form.wrapPromptCancel')}`
        : `You have ${existing.length} ingredient${existing.length!==1?'s':''} entered as a single product. Move them into a new component?\n\nOK = Wrap into one component\nCancel = Start fresh (your current ingredients will be removed)`;
      const move=confirm(msg);
      if(move){
        editing.components=[{
          name:editing.name||'Component 1',
          servingSize:editing.servingSize||'',
          activeIngredients:existing.slice(),
          _collapsed:false
        }];
      } else {
        editing.components=[];
      }
      editing.activeIngredients=[];
    } else if(!editing.components||!editing.components.length){
      editing.components=[];
    }
    editing.isCombo=true;
  } else {
    // Switching off combo mode — offer to flatten components into single ingredient list
    syncComponentsFromDOM();
    const comps=editing.components||[];
    const totalIngr=comps.reduce((a,c)=>a+(c.activeIngredients?c.activeIngredients.length:0),0);
    if(totalIngr){
      const ko=(ap().lang||'en')==='ko';
      const msg=ko
        ? `${totalIngr}${t('form.flattenPromptB')} ${comps.length}${t('form.flattenPromptC')}\n\n${t('form.flattenPromptOk')}\n${t('form.flattenPromptCancel')}`
        : `This will flatten ${totalIngr} ingredient${totalIngr!==1?'s':''} from ${comps.length} component${comps.length!==1?'s':''} into a single ingredient list. Component names will be lost. Continue?\n\nOK = Flatten into single list\nCancel = Keep as combo pack`;
      const flatten=confirm(msg);
      if(!flatten){
        cb.checked=true; // revert
        return;
      }
      const flat=[];
      comps.forEach(c=>(c.activeIngredients||[]).forEach(ing=>flat.push({...ing})));
      editing.activeIngredients=flat;
    } else {
      editing.activeIngredients=editing.activeIngredients||[];
    }
    editing.components=[];
    editing.isCombo=false;
  }
  // Toggle UI sections
  const single=document.getElementById('single-ai-wrap');
  const compsWrap=document.getElementById('components-wrap');
  if(single)single.style.display=editing.isCombo?'none':'block';
  if(compsWrap)compsWrap.style.display=editing.isCombo?'block':'none';
  // Re-render the appropriate editor
  if(editing.isCombo){renderComponents();} else {renderActiveIngredients();}
}

Rules:

  * If you see ONE panel: use the single-product shape above (top-level activeIngredients).

      console.error('Scan JSON parse failed. Raw response:',txt);
      if(st){
        st.style.color='#c62828';
        const preview=txt.length>80?txt.substring(0,80)+'…':txt;
        st.textContent=`${t('scan.parseError')} (${parseErr.message}). ${t('scan.parseErrorHelp')} "${preview}"`;
      }
      return;
    }
    if(!info.isLabel){
      if(st){st.style.color='#c62828';st.textContent='⚠️ Couldn\'t detect a medication label — please fill in manually.';}
      return;
    }
    // Declare field-tracking state + applyField helper BEFORE combo handler uses them
    let filled=0,review=0;
    function applyField(elId,fieldData,isCheckbox=false){
      if(!fieldData||fieldData.value===undefined||fieldData.value===null)return;
      const el=document.getElementById(elId);
      if(!el)return;
      const cls=fieldData.confidence==='high'?'scan-field-green':'scan-field-yellow';
      if(fieldData.confidence==='high')filled++;else review++;
      if(isCheckbox){el.checked=!!fieldData.value;}
      else{el.value=fieldData.value;}
      el.classList.add(cls);
      // add confidence badge to label
      const lbl=el.closest('.fld')?.querySelector('.lbl');
      if(lbl&&!lbl.querySelector('.scan-conf-green,.scan-conf-yellow')){
        const badge=document.createElement('span');
        badge.className=fieldData.confidence==='high'?'scan-conf-green':'scan-conf-yellow';
        badge.textContent=fieldData.confidence==='high'?t('scan.confidenceHigh'):t('scan.confidenceLow');
        lbl.appendChild(badge);
      }
    }
    // Combo/multi-panel pack: full extraction
    if(info.isCombo){
      // Apply category first so the supp-fields-wrap is visible
      if(info.category&&info.category.value&&['otc','supplement'].includes(info.category.value)){
        editing.type=info.category.value;
        const ftEl=document.getElementById('ft');
        if(ftEl){ftEl.value=info.category.value;onCategoryChange();}
        if(info.category.confidence==='high')filled++;else review++;
      }
      // Set combo mode in state + UI
      editing.isCombo=true;
      const cb=document.getElementById('fiscombo');if(cb)cb.checked=true;
      const single=document.getElementById('single-ai-wrap');
      const compsWrap=document.getElementById('components-wrap');
      if(single)single.style.display='none';
      if(compsWrap)compsWrap.style.display='block';
      // Standard top-level fields
      if(info.name){applyField('fn',info.name);if(info.name.value)editing.name=info.name.value;}
      if(info.brand)applyField('fbrand',info.brand);
      if(info.servingSize)applyField('fserving',info.servingSize);
      if(info.expiryDate)applyField('fexp',info.expiryDate);
      if(info.quantity)applyField('fq',info.quantity);
      if(info.notes)applyField('fno',info.notes);
      if(info.frequency)applyField('ff',info.frequency);
      if(info.withFood)applyField('ff2',info.withFood,true);
      // Components
      const compsRaw=Array.isArray(info.components?.value)?info.components.value:[];
      editing.components=compsRaw.map(c=>({
        name:String(c.name||'').trim(),
        servingSize:String(c.servingSize||'').trim(),
        activeIngredients:Array.isArray(c.activeIngredients)?c.activeIngredients.map(ing=>{
          const item={
            name:String(ing.name||'').trim(),
            amount:ing.amount!==undefined&&ing.amount!==null?String(ing.amount):'',
            unit:String(ing.unit||'mg').trim()
          };
          if(ing.dailyValue)item.dailyValue=String(ing.dailyValue).trim();
          return item;
        }).filter(ing=>ing.name):[],
        _collapsed:false
      })).filter(c=>c.name||c.activeIngredients.length);
      // Make sure no stale single ingredients hang around
      editing.activeIngredients=[];
      renderComponents();
      if(editing.components.length){
        if(info.components?.confidence==='high')filled++;else review++;
      }
      const total=filled+review;
      if(st){
        const ingrTotal=editing.components.reduce((a,c)=>a+(c.activeIngredients?.length||0),0);
        st.style.color='#1b7a4e';
        st.textContent=`${t('scan.comboSuccess')} ${lang==='ko'?`${editing.components.length}${t('meds.comboComponents')} · ${ingrTotal}${t('meds.comboIngredients')}`:`${editing.components.length} component${editing.components.length!==1?'s':''} · ${ingrTotal} ingredient${ingrTotal!==1?'s':''}`}${review>0?` · ⚠️ ${review}${lang==='ko'?'':' '}${t('scan.fieldsNeedReview')}`:''}`;
      }
      // Auto-prompt for med form if not detected
      const formEl=document.getElementById('fform');
      if(formEl&&(!info.medForm||!info.medForm.value)){
        showMedTypePrompt();
      }
      return;
    }
    // Non-combo path: ensure combo state is off
    editing.isCombo=false;
    editing.components=[];
    const cbOff=document.getElementById('fiscombo');if(cbOff)cbOff.checked=false;
    const singleOn=document.getElementById('single-ai-wrap');
    const compsOff=document.getElementById('components-wrap');
    if(singleOn)singleOn.style.display='block';
    if(compsOff)compsOff.style.display='none';
    // Apply category first so conditional fields render before we populate them
    if(info.category&&info.category.value){
      const catVal=info.category.value;
      if(['prescription','otc','supplement'].includes(catVal)){
        editing.type=catVal;
        const ftEl=document.getElementById('ft');
        if(ftEl){
          ftEl.value=catVal;
          // trigger conditional field render for supplement/otc
          onCategoryChange();
        }
        // count category as a filled field
        if(info.category.confidence==='high')filled++;else review++;
      }
    }
    if(info.name){applyField('fn',info.name);if(info.name.value)editing.name=info.name.value;}
    if(info.brand)applyField('fbrand',info.brand);
    if(info.dosageAmount)applyField('fdamt',info.dosageAmount);
    if(info.dosageUnit)applyField('fdunit',info.dosageUnit);
    if(info.frequency)applyField('ff',info.frequency);
    if(info.rxNumber)applyField('frx',info.rxNumber);
    if(info.expiryDate)applyField('fexp',info.expiryDate);
    if(info.quantity)applyField('fq',info.quantity);
    if(info.withFood)applyField('ff2',info.withFood,true);
    if(info.notes)applyField('fno',info.notes);
    if(info.servingSize)applyField('fserving',info.servingSize);
    // Active ingredients: render into the #factive-wrap container (not a single input)
    if(info.activeIngredients&&Array.isArray(info.activeIngredients.value)&&info.activeIngredients.value.length){
      editing.activeIngredients=info.activeIngredients.value.map(ing=>{
        const item={
          name:String(ing.name||'').trim(),
          amount:ing.amount!==undefined&&ing.amount!==null?String(ing.amount):'',
          unit:String(ing.unit||'mg').trim()
        };
        if(ing.dailyValue)item.dailyValue=String(ing.dailyValue).trim();
        return item;
      }).filter(ing=>ing.name);
      renderActiveIngredients();
      if(info.activeIngredients.confidence==='high')filled++;else review++;
    }
    const total=filled+review;
    if(total===0){
      if(st){st.style.color='#c62828';st.textContent=t('scan.labelFoundNoDetails');}
    } else {
      if(st){st.style.color='#1b7a4e';st.textContent=`✅ ${filled}${lang==='ko'?'':' '}${t('scan.fieldsFilled')}${review>0?` · ⚠️ ${review}${lang==='ko'?'':' '}${t('scan.fieldsNeedReview')}`:''}`;}
    }
    // Auto-prompt for med type if not detected
    const formEl=document.getElementById('fform');
    if(formEl&&(!info.medForm||!info.medForm.value)){
      showMedTypePrompt();
    }
  }catch(e){
    console.error('Scan error full:',e,'\nStack:',e.stack);
    if(st){
      st.style.color='#c62828';
      st.textContent='⚠️ Scan error: '+(e.message||'unknown error')+' — please fill in manually.';
    }else{
      alert('Scan failed: '+(e.message||'unknown error'));
    }
  }
}

function compressImg(file){return new Promise(res=>{const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{const cv=document.createElement('canvas'),r=Math.min(1024/img.width,1024/img.height,1);cv.width=img.width*r;cv.height=img.height*r;cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);res(cv.toDataURL('image/jpeg',.75).split(',')[1]);};img.src=e.target.result;};rd.readAsDataURL(file);});}

// ===== INSIGHTS =====
function rInsights(){
  const p=ap(),meds=p.meds||[],doses=p.doses||{},history=p.history||{};
  const lang=p.lang||'en';
  if(!meds.length)return`<div class="sectitle" style="margin-bottom:16px">${t('ins.title')} — ${esc(p.name)}</div><div class="empty"><div style="font-size:52px">📊</div><div class="empty-t">${t('common.noData')}</div><div style="font-size:15px">${t('ins.emptyPrompt')}</div></div>`;
  const total=meds.reduce((a,m)=>a+(m.times?.length||0),0);
  let streak=0;if(total>0){let d=new Date();d.setDate(d.getDate()-1);for(let i=0;i<90;i++){const ds=d.toDateString(),dh=history[ds];if(!dh)break;if(Object.values(dh).filter(Boolean).length<total)break;streak++;d.setDate(d.getDate()-1);}}
  const days28=[];for(let i=27;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days28.push(d);}
  const hm=days28.map(d=>{const ds=d.toDateString();if(ds===new Date().toDateString())return total?Math.round(Object.values(doses).filter(v=>v&&(v===true||v.taken)).length/total*100):null;const dh=history[ds];if(!dh||!total)return null;return Math.round(Object.values(dh).filter(Boolean).length/total*100);});
  function hmc(v){if(v===null)return'var(--sbg)';if(v>=80)return'#1b7a4e';if(v>=50)return'#f9a825';if(v>0)return'#e57373';return'#ddd';}
  const valid=hm.filter(v=>v!==null),avg=valid.length?Math.round(valid.reduce((a,b)=>a+b,0)/valid.length):0;
  const recentMoods=(p.journal||[]).slice(0,14).reverse();
  return`<div class="sectitle" style="margin-bottom:16px">${t('ins.title')} — ${esc(p.name)}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
    <div class="ins-card" style="text-align:center"><div class="ins-title">${t('ins.streak')}</div><div class="streak-num">${streak}</div><div style="font-size:14px;color:var(--txt2);margin-top:5px">${lang==='ko'?'일 연속':`day${streak!==1?'s':''} in a row`}</div></div>
    <div class="ins-card" style="text-align:center"><div class="ins-title">${t('ins.avg')}</div><div class="streak-num" style="color:${avg>=80?'#1b7a4e':avg>=50?'#f9a825':'#e57373'}">${avg}%</div><div style="font-size:14px;color:var(--txt2);margin-top:5px">${t('ins.last28')}</div></div>
  </div>
  <div class="ins-card"><div class="ins-title">${t('ins.adherence')}</div><div class="heatmap">${buildHeatmap(hm,days28)}</div><div style="display:flex;gap:14px;margin-top:12px;font-size:12px;color:var(--txt3)"><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#1b7a4e;margin-right:5px"></span>80%+</span><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#f9a825;margin-right:5px"></span>50–79%</span><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#e57373;margin-right:5px"></span>&lt;50%</span><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:var(--sbg);margin-right:5px"></span>${t('common.noData')}</span></div></div>
  ${recentMoods.length?`<div class="ins-card"><div class="ins-title">${t('ins.moodTrend')}</div><div class="mood-trend">${buildMoodTrend(recentMoods)}</div></div>`:''}
  <div class="ins-card"><div class="ins-title">${t('ins.sideEffects')}</div>${rSideEffectChart()}</div>
  <div class="ins-card"><div class="ins-title">${t('ins.todayProgress')}</div>${SLOTS.filter(s=>s.id!=='as_needed').map(s=>{const sm=meds.filter(m=>m.times?.includes(s.id));if(!sm.length)return'';const dn=sm.filter(m=>doses[`${m.id}-${s.id}`]).length,pct=Math.round(dn/sm.length*100);return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:15px;margin-bottom:5px"><span>${s.icon} ${slotLabel(s)}</span><span style="color:var(--txt2)">${dn}/${sm.length}</span></div><div style="height:8px;background:var(--sbg);border-radius:4px"><div style="height:8px;background:${pct===100?'#1b7a4e':'#1976d2'};border-radius:4px;width:${pct}%"></div></div></div>`;}).join('')}</div>
  ${rGlucoseInsights(p)}
  ${rCycleInsights(p)}`;
}

function rGlucoseInsights(p){
  const readings=(p.glucose||[]);
  if(!readings.length)return'';
  const last30=readings.filter(r=>new Date(r.date)>new Date(Date.now()-30*24*60*60*1000));
  if(!last30.length)return'';
  const lang=p.lang||'en';

  // Averages by context
  const byCtx={};
  last30.forEach(r=>{
    if(!r.glucose)return;
    if(!byCtx[r.context])byCtx[r.context]=[];
    byCtx[r.context].push(parseFloat(r.glucose));
  });
  const ctxLabels={fasting:t('glu.ctxFasting'),before:t('glu.ctxBefore'),after:t('glu.ctxAfter'),bedtime:t('glu.ctxBedtime'),other:t('glu.ctxOther')};
  const ctxStats=Object.entries(byCtx).map(([ctx,vals])=>{
    const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
    const inRange=ctx==='fasting'?(avg<=130):(ctx==='after'?(avg<=180):(avg<=180));
    return{ctx,avg,inRange,count:vals.length};
  });

  // Spark line data — last 14 readings
  const spark=readings.slice(-14);
  const sparkMax=Math.max(...spark.map(r=>parseFloat(r.glucose)||0),200);
  const sparkMin=Math.min(...spark.map(r=>parseFloat(r.glucose)||70),70);
  const sparkH=48,sparkW=200;
  const pts=spark.map((r,i)=>{
    const x=Math.round((i/(spark.length-1||1))*sparkW);
    const y=Math.round(sparkH-((parseFloat(r.glucose)-sparkMin)/(sparkMax-sparkMin||1))*sparkH);
    return`${x},${y}`;
  }).join(' ');

  // Ketone distribution
  const ketones=last30.filter(r=>r.ketones);
  const ketCounts={};
  ketones.forEach(r=>{ketCounts[r.ketones]=(ketCounts[r.ketones]||0)+1;});
  const ketOrder=['neg','trace','small','moderate','large','xlarge'];
  const ketLabels={neg:t('glu.ketNeg'),trace:t('glu.ketTrace'),small:t('glu.ketSmall'),moderate:t('glu.ketModerate'),large:t('glu.ketLarge'),xlarge:t('glu.ketXLarge')};

  // Overall avg
  const allVals=last30.map(r=>parseFloat(r.glucose)).filter(v=>!isNaN(v));
  const overallAvg=allVals.length?Math.round(allVals.reduce((a,b)=>a+b,0)/allVals.length):0;
  const avgColor=overallAvg<=130?'#1b7a4e':overallAvg<=180?'#f9a825':'#c62828';

  let h=`<div class="ins-card"><div class="ins-title">${t('glu.title')}</div>`;

  // Overall avg + spark
  h+=`<div style="display:flex;align-items:center;gap:16px;margin-bottom:14px">
    <div style="text-align:center">
      <div style="font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px">${t('glu.avgLabel')}</div>
      <div style="font-size:28px;font-weight:800;color:${avgColor}">${overallAvg}</div>
      <div style="font-size:11px;color:var(--txt3)">mg/dL</div>
    </div>
    <div style="flex:1">
      <svg viewBox="0 0 ${sparkW} ${sparkH}" style="width:100%;height:48px">
        <line x1="0" y1="${Math.round(sparkH-((130-sparkMin)/(sparkMax-sparkMin||1))*sparkH)}" x2="${sparkW}" y2="${Math.round(sparkH-((130-sparkMin)/(sparkMax-sparkMin||1))*sparkH)}" stroke="#1b7a4e" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
        ${spark.length>1?`<polyline points="${pts}" fill="none" stroke="${avgColor}" stroke-width="2" stroke-linejoin="round"/>`:''}
        ${spark.map((r,i)=>{const x=Math.round((i/(spark.length-1||1))*sparkW);const y=Math.round(sparkH-((parseFloat(r.glucose)-sparkMin)/(sparkMax-sparkMin||1))*sparkH);const col=parseFloat(r.glucose)<=180?'#1b7a4e':'#c62828';return`<circle cx="${x}" cy="${y}" r="2.5" fill="${col}"/>`;}).join('')}
      </svg>
      <div style="font-size:10px;color:var(--txt3);text-align:right">${t('glu.lastNReadings').replace('{n}',spark.length)}</div>
    </div>
  </div>`;

  // By context
  if(ctxStats.length){
    h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;margin-bottom:14px">`;
    ctxStats.forEach(({ctx,avg,inRange,count})=>{
      h+=`<div style="background:var(--sbg);border-radius:10px;padding:8px;text-align:center">
        <div style="font-size:10px;color:var(--txt3);margin-bottom:2px">${ctxLabels[ctx]||ctx}</div>
        <div style="font-size:18px;font-weight:800;color:${inRange?'#1b7a4e':'#c62828'}">${avg}</div>
        <div style="font-size:10px;color:var(--txt3)">${lang==='ko'?count+'회':count+' reading'+(count!==1?'s':'')}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Ketone distribution
  if(ketones.length){
    h+=`<div style="font-size:13px;font-weight:800;color:var(--txt);margin-bottom:8px">${t('glu.ketoneHeader').replace('{n}',ketones.length)}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">`;
    ketOrder.filter(k=>ketCounts[k]).forEach(k=>{
      const pct=Math.round(ketCounts[k]/ketones.length*100);
      h+=`<div style="background:var(--sbg);border-radius:8px;padding:6px 10px;text-align:center">
        <div style="font-size:11px;color:var(--grn);font-weight:700">${ketLabels[k]}</div>
        <div style="font-size:13px;font-weight:800;color:var(--txt)">${pct}%</div>
      </div>`;
    });
    h+=`</div>`;
  }

  h+=`<div style="font-size:11px;color:var(--txt3);font-style:italic">${t('glu.targetNote')} ${t('common.general')}</div></div>`;
  return h;
}

function rCycleInsights(p){
  const periods=p.periods||[];
  if(!periods.length)return'';
  const completed=periods.filter(per=>per.endDate);
  if(!completed.length&&!periods.find(per=>per.active))return'';
  const lang=p.lang||'en';

  // Cycle lengths between periods
  const sorted=periods.slice().sort((a,b)=>new Date(a.startDate)-new Date(b.startDate));
  const gaps=[];
  for(let i=1;i<sorted.length;i++){
    const gap=Math.floor((new Date(sorted[i].startDate)-new Date(sorted[i-1].startDate))/(1000*60*60*24));
    if(gap>0&&gap<365)gaps.push(gap);
  }

  // Duration of each period
  const durations=completed.map(per=>Math.floor((new Date(per.endDate)-new Date(per.startDate))/(1000*60*60*24))+1);

  // Symptom frequency across all periods
  const sxCounts={};
  periods.forEach(per=>(per.days||[]).forEach(d=>(d.symptoms||[]).forEach(s=>{sxCounts[s]=(sxCounts[s]||0)+1;})));
  const topSx=Object.entries(sxCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Flow frequency
  const flowCounts={};
  periods.forEach(per=>(per.days||[]).forEach(d=>{if(d.flow)flowCounts[d.flow]=(flowCounts[d.flow]||0)+1;}));
  const flowLabels={spotting:t('cyc.flowSpotting'),light:t('cyc.flowLight'),medium:t('cyc.flowMedium'),heavy:t('cyc.flowHeavy')};
  const flowColors={spotting:'#f48fb1',light:'#f06292',medium:'#e91e63',heavy:'#880e4f'};

  let h=`<div class="ins-card"><div class="ins-title">${t('cyc.title')}</div>`;

  // Summary stats
  h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">`;
  h+=`<div style="background:var(--sbg);border-radius:10px;padding:10px;text-align:center">
    <div style="font-size:11px;color:var(--txt3)">${t('cyc.periodsLogged')}</div>
    <div style="font-size:22px;font-weight:800;color:var(--txt)">${periods.length}</div>
  </div>`;
  if(durations.length){
    const avgDur=Math.round(durations.reduce((a,b)=>a+b,0)/durations.length);
    h+=`<div style="background:var(--sbg);border-radius:10px;padding:10px;text-align:center">
      <div style="font-size:11px;color:var(--txt3)">${t('cyc.avgDuration')}</div>
      <div style="font-size:22px;font-weight:800;color:var(--txt)">${avgDur}</div>
      <div style="font-size:11px;color:var(--txt3)">${t('cyc.days')}</div>
    </div>`;
  }
  if(gaps.length){
    const avgGap=Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length);
    h+=`<div style="background:var(--sbg);border-radius:10px;padding:10px;text-align:center">
      <div style="font-size:11px;color:var(--txt3)">${t('cyc.avgGap')}</div>
      <div style="font-size:22px;font-weight:800;color:var(--txt)">${avgGap}</div>
      <div style="font-size:11px;color:var(--txt3)">${t('cyc.days')}</div>
    </div>`;
  }
  h+=`</div>`;

  // Flow breakdown
  if(Object.keys(flowCounts).length){
    const totalFlow=Object.values(flowCounts).reduce((a,b)=>a+b,0);
    h+=`<div style="font-size:13px;font-weight:800;color:var(--txt);margin-bottom:8px">${t('cyc.flowBreakdown')}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">`;
    ['spotting','light','medium','heavy'].filter(f=>flowCounts[f]).forEach(f=>{
      const pct=Math.round(flowCounts[f]/totalFlow*100);
      h+=`<div style="background:var(--sbg);border-radius:8px;padding:6px 10px;text-align:center;border-left:3px solid ${flowColors[f]}">
        <div style="font-size:11px;color:var(--txt3)">${flowLabels[f]}</div>
        <div style="font-size:14px;font-weight:800;color:var(--txt)">${pct}%</div>
        <div style="font-size:10px;color:var(--txt3)">${lang==='ko'?flowCounts[f]+'일':flowCounts[f]+' day'+(flowCounts[f]!==1?'s':'')}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Top symptoms
  if(topSx.length){
    h+=`<div style="font-size:13px;font-weight:800;color:var(--txt);margin-bottom:8px">${t('cyc.topSymptoms')}</div>
    <div style="display:flex;flex-direction:column;gap:6px">`;
    const maxCount=topSx[0][1];
    topSx.forEach(([sx,count])=>{
      const pct=Math.round(count/maxCount*100);
      h+=`<div><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span style="color:var(--txt)">${sx}</span><span style="color:var(--txt3)">${count}x</span></div>
        <div style="height:6px;background:var(--sbg);border-radius:3px"><div style="height:6px;background:#e91e63;border-radius:3px;width:${pct}%"></div></div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Note about irregular cycles
  h+=`<div style="font-size:11px;color:var(--txt3);margin-top:12px;font-style:italic">${t('cyc.irregular')}</div>`;
  h+=`</div>`;
  return h;
}

function rTools(){const sub=`<div class="sub-nav"><button class="sub-tab${toolTab==='sorter'?' on':''}" onclick="toolTab='sorter';render()">${t('tools.sorter')}</button><button class="sub-tab${toolTab==='check'?' on':''}" onclick="toolTab='check';render()">${t('tools.check')}</button><button class="sub-tab${toolTab==='info'?' on':''}" onclick="toolTab='info';render()">${t('tools.info')}</button><button class="sub-tab${toolTab==='appts'?' on':''}" onclick="toolTab='appts';render()">${t('tools.appts')}</button></div>`;return sub+(toolTab==='sorter'?rSorter():toolTab==='check'?rInter():toolTab==='info'?rInfo():rAppointments());}
function rSorter(){
  const p=ap(),meds=p.meds||[];
  const lang=p.lang||'en';
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const ORGANIZERS=[
    {id:'org1',lbl:'💊 Organizer 1',slots:[
      {id:'morning',icon:'🌅',lbl:'Morning'},
      {id:'noon',icon:'☀️',lbl:'Noon'}
    ]},
    {id:'org2',lbl:'💊 Organizer 2',slots:[
      {id:'evening',icon:'🌆',lbl:'Evening'},
      {id:'night',icon:'🌙',lbl:'Bedtime'}
    ]}
  ];

  // Load/save fill state from profile
  const fillKey='sorterFill';
  const weekStart=getWeekStart();
  const savedFill=p[fillKey]||{};
  // If saved fill is from a different week, reset
  const fill=(savedFill.weekStart===weekStart)?{...savedFill}:{weekStart,checks:{}};

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
    <span class="sectitle">💊 Pill Organizer</span>

  if(!meds.length)return h+`<div class="empty"><div style="font-size:40px">🗂️</div><div class="empty-t">No medications yet</div><button class="btnp" style="margin-top:16px" onclick="goTo('meds')">Add medications</button></div>`;

  // Render each organizer
  ORGANIZERS.forEach(org=>{
    h+=`<div class="card" style="margin-bottom:16px">
      <div style="font-size:15px;font-weight:800;color:var(--txt);margin-bottom:12px">${org.lbl}</div>`;

    org.slots.forEach(slot=>{
      const slotMeds=meds.filter(m=>m.times?.includes(slot.id));
      if(!slotMeds.length)return;

      h+=`<div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:800;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${slot.icon} ${slot.lbl}</div>`;

      // Med list for this slot
      h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">`;
      slotMeds.forEach(m=>{
        h+=`<div style="display:flex;align-items:center;gap:6px;background:var(--sbg);border-radius:8px;padding:5px 10px">
          <div style="width:10px;height:10px;border-radius:50%;background:${m.color||'#999'};flex-shrink:0"></div>
          <span style="font-size:13px;font-weight:700;color:var(--txt)">${esc(m.name)}</span>
          ${m.dosage?`<span style="font-size:12px;color:var(--txt3)">${esc(m.dosage)}</span>`:''}
          ${m.withFood?`<span style="font-size:11px;color:var(--grn)">🍽️</span>`:''}
        </div>`;
      });
      h+=`</div>`;

      // Day checkboxes
      h+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">`;
      DAYS.forEach((day,i)=>{
        const key=`${slot.id}-${i}`;
        const checked=fill.checks&&fill.checks[key];
        h+=`<div style="text-align:center">
          <div style="font-size:11px;color:var(--txt3);margin-bottom:4px">${day}</div>
          <button onclick="toggleSorterCheck('${slot.id}',${i})" style="width:36px;height:36px;border-radius:8px;border:2px solid ${checked?'var(--grn)':'var(--brd)'};background:${checked?'var(--grn)':'var(--card)'};cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;margin:0 auto">
            ${checked?'<span style="color:#fff">✓</span>':''}
          </button>
        </div>`;
      });
      h+=`</div></div>`;
    });

    h+=`</div>`;
  });

  // As needed meds
  const asN=meds.filter(m=>m.times?.includes('as_needed'));
  if(asN.length){
    h+=`<div style="background:var(--sbg);border:1px dashed var(--brd);border-radius:14px;padding:14px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">⚡ As Needed — Keep Separate</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">`;
    asN.forEach(m=>{
      h+=`<div style="display:flex;align-items:center;gap:6px;background:var(--card);border-radius:8px;padding:6px 12px">
        <div style="width:10px;height:10px;border-radius:50%;background:${m.color||'#999'}"></div>
        <span style="font-size:13px;font-weight:700">${esc(m.name)}</span>
        ${m.dosage?`<span style="font-size:12px;color:var(--txt3)">${esc(m.dosage)}</span>`:''}
      </div>`;

    h+=`</div></div>`;
  }

  // Reset week button
  h+=`<button class="btnd" style="width:100%;padding:10px;font-size:14px;margin-bottom:14px" onclick="resetSorterWeek()">🔄 Reset this week's checklist</button>`;

  // Color legend
  h+=`<div class="card" style="margin-bottom:14px"><div style="font-size:14px;font-weight:700;color:var(--txt2);margin-bottom:10px">🎨 Color Legend</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px">

    </div>
  </div>`;

  return h;
}

function getWeekStart(){
  const d=new Date();d.setHours(0,0,0,0);
  d.setDate(d.getDate()-d.getDay()); // Sunday
  return d.toISOString().slice(0,10);
}
function toggleSorterCheck(slotId,dayIdx){
  const p=ap(),fillKey='sorterFill',weekStart=getWeekStart();
  const saved=p[fillKey]||{};
  const fill=(saved.weekStart===weekStart)?{...saved,checks:{...saved.checks}}:{weekStart,checks:{}};
  const key=`${slotId}-${dayIdx}`;
  fill.checks[key]=!fill.checks[key];
  upAP({[fillKey]:fill});render();
}
function resetSorterWeek(){
  if(!confirm('Reset this week\'s checklist?'))return;
  upAP({sorterFill:{weekStart:getWeekStart(),checks:{}}});render();showToast('✅ Checklist reset!');
}

function printSorter(){const p=ap(),meds=p.meds||[],lang=p.lang||'en',ms=SLOTS.filter(s=>s.id!=='as_needed'),asN=meds.filter(m=>m.times?.includes('as_needed'));const cols=ms.map(s=>{const sm=meds.filter(m=>m.times?.includes(s.id));return`<td style="vertical-align:top;padding:12px;border:2px solid #e8e4df;min-width:90px;background:${s.bg}"><div style="font-weight:700;font-size:12px;color:${s.lc};margin-bottom:4px">${s.icon} ${s.l.toUpperCase()}</div><div style="font-size:11px;color:#aaa;margin-bottom:10px">${s.d}</div>${sm.map(function(m){var dd=m.dosage?('<div style="font-size:11px;color:#888;margin-left:16px">'+m.dosage+(m.withFood?' · with food':'')+'</div>'):'';return '<div style="margin-bottom:8px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+(m.color||'#999')+';margin-right:6px;vertical-align:middle"></span><strong style="font-size:13px">'+m.name+'</strong>'+dd+'</div>';}).join('')||'<div style="color:#ccc;font-style:italic;font-size:12px">Empty</div>'}</td>`;}).join('');const pw=window.open('','_blank');pw.document.write(`<!DOCTYPE html><html><head><title>Pill Sorter — ${p.name}</title><style>body{font-family:'Nunito',sans-serif;padding:24px;max-width:720px;font-size:14px}table{border-collapse:collapse;width:100%}.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}@media print{button{display:none}}</style></head><body><h1 style="font-size:20px;margin-bottom:4px">☀️ Pill Sorter: ${p.name}</h1><p style="color:#888;font-size:13px;margin-bottom:20px">Generated ${new Date().toLocaleDateString(lang==='ko'?'ko-KR':'en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</p><table><tr>${cols}</tr></table>${asN.length?`<div style="margin-top:14px;padding:10px;border:1px dashed #ccc;border-radius:8px"><strong>⚡ As Needed:</strong> ${asN.map(m=>m.name+(m.dosage?' – '+m.dosage:'')).join(' | ')}</div>`:''}<div class="legend"><strong style="width:100%;font-size:12px;color:#555">COLOR LEGEND:</strong>${meds.map(function(m){return '<div style="display:flex;align-items:center;gap:6px;font-size:13px"><div style="width:12px;height:12px;border-radius:50%;background:'+(m.color||'#999')+'"></div>'+m.name+'</div>';}).join('')}</div><p style="margin-top:16px;font-size:11px;color:#aaa">The Daily Dose — General use only.</p><script>window.print();<\/script></body></html>`);pw.document.close();}

function expCSV(){const p=ap(),meds=p.meds||[];const hdr=['Name','Type','Dosage','Frequency','Times','With Food','Qty','Refill At','Notes'];const rows=meds.map(m=>[m.name,m.type,m.dosage||'',m.frequency||'',(m.times||[]).join('; '),m.withFood?'Yes':'No',m.quantity||'',m.refillAt||'',m.notes||'']);const csv=[hdr,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');dl(new Blob([csv],{type:'text/csv'}),`TheDailyDose_${p.name}_${new Date().toISOString().slice(0,10)}.csv`);}
function copyText(){const p=ap(),meds=p.meds||[];let txt=`THE DAILY DOSE — ${p.name.toUpperCase()}\nGenerated: ${new Date().toLocaleDateString()}\n${'='.repeat(40)}\n\n`;SLOTS.forEach(s=>{const sm=meds.filter(m=>m.times?.includes(s.id));if(!sm.length)return;txt+=`${s.icon} ${s.l.toUpperCase()}\n${'-'.repeat(26)}\n`;sm.forEach(m=>{txt+=`• ${m.name}`;if(m.dosage)txt+=` — ${m.dosage}`;if(m.frequency)txt+=` (${m.frequency})`;if(m.withFood)txt+=' [with food]';if(m.notes)txt+=`\n  Note: ${m.notes}`;txt+='\n';});txt+='\n';});navigator.clipboard.writeText(txt).then(()=>showToast('📋 Copied!')).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('📋 Copied!');});}
function printList(){const p=ap(),meds=p.meds||[],lang=p.lang||'en';let rows='';SLOTS.forEach(s=>{const sm=meds.filter(m=>m.times?.includes(s.id));if(!sm.length)return;rows+=`<tr style="background:#f9f7f4"><td colspan="5" style="padding:8px 12px;font-weight:700">${s.icon} ${s.l}</td></tr>`;sm.forEach(m=>{rows+=`<tr><td style="padding:7px 12px">● ${m.name}</td><td>${{prescription:'Rx',supplement:'Supplement',otc:'OTC'}[m.type]||m.type}</td><td>${m.dosage||'—'}</td><td>${m.frequency||'—'}</td><td>${m.withFood?'Yes':'—'}</td></tr>`;});});const pw=window.open('','_blank');pw.document.write(`<!DOCTYPE html><html><head><title>${p.name} — Medication List</title><style>body{font-family:'Nunito',sans-serif;padding:24px;max-width:700px;font-size:14px}table{width:100%;border-collapse:collapse}td,th{border:1px solid #ddd;padding:7px 12px;text-align:left}th{background:#f5ede0;font-weight:700}@media print{button{display:none}}</style></head><body><h1 style="font-size:22px;margin-bottom:4px">☀️ The Daily Dose — ${p.name}</h1><p style="color:#888;font-size:13px;margin-bottom:20px">Generated ${new Date().toLocaleDateString(lang==='ko'?'ko-KR':'en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</p><table><thead><tr><th>Name</th><th>Type</th><th>Dosage</th><th>Frequency</th><th>With Food</th></tr></thead><tbody>${rows}</tbody></table><p style="margin-top:20px;font-size:11px;color:#aaa">General use only, not medical advice.</p><script>window.print();<\/script></body></html>`);pw.document.close();}
