function buildMoodBtns(jMood){
  return MOODS.map(m=>'<button class="mbtn'+(jMood===m.e?' on':'')+'" data-m="'+m.e+'" onclick="setMood(this)" title="'+m.l+'">'+m.e+'</button>').join('');
}
function buildSxBtns(jSx){
  return SX_TAGS.map(t=>'<button class="sx'+(jSx.includes(t)?' on':'')+'" data-t="'+t+'" onclick="togSx(this)">'+t+'</button>').join('');
}
function buildVitalOpts(){
  return VITAL_TYPES.map(vt=>'<option value="'+vt.id+'">'+vt.icon+' '+vt.lbl+' ('+vt.unit+')</option>').join('');
}
function buildBloodOpts(sel){
  return BLOOD.map(b=>'<option'+(sel===b?' selected':'')+'>'+(b||'Select...')+'</option>').join('');
}
function buildEnergyBtns(energy){
  const lbl=['','😴','😔','😐','😊','💪'];
  return [1,2,3,4,5].map(e=>'<button style="flex:1;padding:10px 4px;border-radius:12px;border:2px solid '+(energy===e?'var(--grn)':'var(--brd)')+';background:'+(energy===e?'var(--grn-l)':'var(--card)')+';font-size:20px;cursor:pointer;font-family:inherit" onclick="logEnergy('+e+')">'+lbl[e]+'</button>').join('');
}
function buildNotifSlots(notifSlots){
  return SLOTS.filter(s=>s.id!=='as_needed').map(function(s){
    return '<label class="chklbl" style="margin-bottom:10px"><input type="checkbox" '+(notifSlots&&notifSlots.includes(s.id)?'checked':'')+' onchange="togNotifSlot(\''+s.id+'\',this.checked)"> '+s.icon+' '+s.l+' ('+s.d+')</label>';
  }).join('');
}
function buildProfColorDots(selectedColor){
  return COLORS.map(function(c){
    return '<div class="cdot'+(selectedColor===c?' on':'')+'" style="background:'+c+';cursor:pointer;border:3px solid '+(selectedColor===c?'var(--txt)':'transparent')+'" onclick="upAP({color:\''+c+'\' });updateProfHdr();render()"></div>';
  }).join('');
}


function buildHeatmap(hm,days28){
  return hm.map(function(v,i){
    var bg=v===null?'var(--sbg)':v>=80?'#1b7a4e':v>=50?'#f9a825':v>0?'#e57373':'#ddd';
    var title=days28[i].toLocaleDateString('en-US',{month:'short',day:'numeric'})+': '+(v===null?'no data':v+'%');
    return '<div class="hm-day" style="background:'+bg+'" title="'+title+'"></div>';
  }).join('');
}


function buildMoodTrend(moods){
  return moods.map(function(e){
    var dt=new Date(e.date).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return '<div class="mood-col"><span style="font-size:24px">'+(e.mood||'😊')+'</span><span style="font-size:11px;color:var(--txt3)">'+dt+'</span></div>';
  }).join('');
}
function buildChips(items, removeFn){
  return items.map(function(v){
    var escaped=esc(v);
    return '<div class="chip">'+escaped+'<button class="chip-del" onclick="'+removeFn+'(&quot;'+escaped+'&quot;)">×</button></div>';
  }).join('');
}


function buildLegend(meds){
  return meds.map(function(m){
    return '<div style="display:flex;align-items:center;gap:6px;font-size:13px"><div style="width:12px;height:12px;border-radius:50%;background:'+(m.color||'#999')+'"></div>'+m.name+'</div>';
  }).join('');
}

// ===== INIT =====
function init(){
  // Load local settings first — always
  try{const r=localStorage.getItem(SetK);if(r)settings={...settings,...JSON.parse(r)};}catch(e){}
  document.body.classList.toggle('dark',settings.darkMode);
  startNotifCheck();

  // Attach login key listeners
  setTimeout(()=>{
    try{
      document.getElementById('login-pwd')?.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
      document.getElementById('login-email')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-pwd')?.focus();});
    }catch(e){}
  },100);

  // If no Supabase lib, go offline immediately
  if(!sb){goOffline('Supabase library not loaded');return;}

  // Try to restore existing session — wrap everything in try/catch
  // CORS errors from local files (Origin: null) will be caught here
  var sessionPromise;
  try{
    sessionPromise=sb.auth.getSession();
  }catch(e){
    goOffline(e.message);return;
  }

  // Race against a 6s timeout
  Promise.race([
    sessionPromise,
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),6000))
  ]).then(function(result){
    var session=result&&result.data&&result.data.session;
    if(session){
      currentUser=session.user;
      // Set up auth listener after we know Supabase works
      sb.auth.onAuthStateChange(function(event,sess){
        if(event==='SIGNED_IN'&&sess){currentUser=sess.user;loadCloud().then(function(){showApp();updateProfHdr();render();});}
        else if(event==='SIGNED_OUT'){currentUser=null;profiles=[];showLogin();}
      });
      loadCloud().then(function(){showApp();}).catch(function(){goOffline('Cloud load failed');});
    } else {
      // No session — show login, but Supabase IS reachable
      sb.auth.onAuthStateChange(function(event,sess){
        if(event==='SIGNED_IN'&&sess){currentUser=sess.user;loadCloud().then(function(){showApp();updateProfHdr();render();});}
        else if(event==='SIGNED_OUT'){currentUser=null;profiles=[];showLogin();}
      });
      showLogin();
    }
  }).catch(function(e){
    console.warn('Supabase unreachable:',e.message);
    goOffline(e.message);
  });
}

function goOffline(reason){
  console.warn('Going offline:',reason);
  setSyncStatus('error');
  tryLoadLocal();
  if(profiles.length){
    if(!activeId)activeId=profiles[0]?.id;
    showApp();
    showToast('⚠️ Using local data — open in browser for cloud sync');
  } else {
    showLogin();
    // Add offline button after a tick
    setTimeout(function(){
      var box=document.querySelector('.login-box');
      if(!box||document.getElementById('offline-btn'))return;
      // Show helpful message about CORS
      var msg=document.createElement('div');
      msg.style.cssText='font-size:13px;color:var(--txt3);text-align:center;margin-top:12px;line-height:1.5;padding:0 8px';
      msg.innerHTML='Having trouble connecting?<br>Open the file via a local server or use the button below.';
      box.appendChild(msg);
      var btn=document.createElement('button');
      btn.id='offline-btn';
      btn.textContent='▶ Use without account (local only)';
      btn.style.cssText='width:100%;margin-top:8px;padding:13px;background:var(--sbg);border:2px dashed var(--brd);border-radius:30px;font-size:14px;font-weight:700;color:var(--stxt);cursor:pointer;font-family:Nunito,sans-serif';
      btn.onclick=function(){
        profiles=[mkProf('My Profile')];activeId=profiles[0].id;
        try{localStorage.setItem('dd_profiles_v1',JSON.stringify(profiles));}catch(e){}
        showApp();setSyncStatus('error');
        showToast('Running locally ☀️');
      };
      box.appendChild(btn);
    },300);
  }
}

init();
</script>
