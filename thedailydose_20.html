<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Dose</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#FDF6EC;--card:#FFFDF8;--brd:#EDE0CC;
  --txt:#3D2B1F;--txt2:#8B7355;--txt3:#C4A882;
  --ibg:#FFF9F2;--ibrd:#DDD0B8;--sbg:#F5EDE0;--stxt:#8B7355;
  --hdr:#FFFDF8;--shad:rgba(139,100,60,.1);
  --grn:#7BAB8B;--grn-l:#EAF4ED;--grn-b:#B8D4BE;
  --rose:#D4A0A0;--rose-l:#FBF0F0;--rose-b:#E8C4C4;
  --blue:#90B8D8;--blue-l:#EBF4FB;
  --peach:#F0B898;--peach-l:#FEF4EC;
  --lav:#B8A4D8;--lav-l:#F5F0FC;
}
body.dark{
  /* Deep Ghibli night sky */
  --bg:#0D0E1F;--card:#161828;--brd:#272A45;
  --txt:#F0EAD6;--txt2:#9B94B8;--txt3:#524E6E;
  --ibg:#1B1D32;--ibrd:#333660;--sbg:#1B1D32;--stxt:#B0AACC;
  --hdr:#101120;--shad:rgba(0,0,0,.55);
  --grn:#8DBFA0;--grn-l:#0E2A1C;--grn-b:#1E5035;
  --rose:#C8909A;--rose-l:#2A1520;--rose-b:#6A2840;
  --blue:#88B4D8;--blue-l:#101E34;
  --peach:#D4906A;--peach-l:#221408;
  --lav:#A894D4;--lav-l:#160E2E;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;color:var(--txt);font-size:16px;transition:background .3s,color .3s}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#login-screen.hidden{display:none}
.login-box{background:var(--card);border:2px solid var(--brd);border-radius:28px;padding:36px 30px;width:100%;max-width:400px;box-shadow:0 16px 60px var(--shad)}
.login-logo{text-align:center;margin-bottom:8px}
.login-title{font-family:'Fredoka One',cursive;font-size:30px;color:var(--grn);text-align:center;letter-spacing:.5px}
.login-sub{font-size:15px;color:var(--txt2);text-align:center;margin-bottom:28px;margin-top:4px;font-weight:600}
.login-err{font-size:14px;color:#C85858;text-align:center;min-height:20px;margin-bottom:8px;line-height:1.4;font-weight:700}
.login-err.ok{color:var(--grn)}
.login-tabs{display:flex;background:var(--sbg);border-radius:16px;padding:4px;margin-bottom:20px}
.login-tab{flex:1;padding:10px;border:none;background:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--stxt);transition:all .2s}
.login-tab.on{background:var(--card);color:var(--grn);box-shadow:0 3px 14px var(--shad);font-weight:800}
.login-inp{width:100%;padding:13px 16px;border:2px solid var(--ibrd);border-radius:16px;font-size:16px;background:var(--ibg);color:var(--txt);font-family:'Nunito',sans-serif;margin-bottom:12px;font-weight:600;transition:border-color .2s}
.login-inp:focus{outline:none;border-color:var(--grn);box-shadow:0 0 0 4px var(--grn-l)}
.login-btn{width:100%;padding:15px;background:var(--grn);color:#fff;border:none;border-radius:30px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:4px;transition:all .2s;box-shadow:0 6px 20px rgba(123,171,139,.35);letter-spacing:.3px}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(123,171,139,.45)}
.login-btn:disabled{opacity:.55;cursor:default;transform:none;box-shadow:none}

/* PIN */
#pin-screen{position:fixed;inset:0;background:var(--hdr);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px}
#pin-screen.hidden{display:none}
.pin-dots{display:flex;gap:16px;margin:4px 0}
.pin-dot{width:20px;height:20px;border-radius:50%;border:2.5px solid var(--grn);background:transparent;transition:background .15s}
.pin-dot.on{background:var(--grn)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:270px}
.pin-btn{padding:20px;border-radius:50%;border:2px solid var(--brd);background:var(--card);font-size:22px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--txt);transition:all .15s;box-shadow:0 4px 14px var(--shad)}
.pin-btn:active{transform:scale(.93)}
.pin-emerg{background:var(--rose-l);color:#C85858;border:2px solid var(--rose-b);padding:14px 20px;border-radius:16px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:6px;width:270px;text-align:center}

/* EMERGENCY */
#emerg-overlay{position:fixed;inset:0;background:var(--card);z-index:4000;overflow-y:auto;padding:20px;display:none}
#emerg-overlay.show{display:block}
.emerg-close{position:absolute;top:16px;right:16px;font-size:28px;cursor:pointer;background:none;border:none;color:var(--txt)}
.emerg-hdr{background:linear-gradient(135deg,#D06868,#B85050);color:#fff;border-radius:22px;padding:22px;margin-bottom:16px;text-align:center}
.emerg-name{font-family:'Fredoka One',cursive;font-size:32px;letter-spacing:.5px}
.emerg-meta{font-size:15px;opacity:.9;margin-top:6px;font-weight:600}
.esec{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;padding:16px 18px;margin-bottom:12px;box-shadow:0 4px 18px var(--shad)}
.esec-t{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.e-allergy{display:inline-block;background:var(--rose-l);color:#C85858;border:2px solid var(--rose-b);border-radius:20px;padding:5px 14px;font-size:15px;font-weight:800;margin:3px}
.e-cond{display:inline-block;background:var(--blue-l);color:#5888A8;border:2px solid #C0D8EC;border-radius:20px;padding:5px 14px;font-size:15px;margin:3px;font-weight:700}
.e-med{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--brd)}
.e-med:last-child{border-bottom:none}
.e-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* MAIN APP */
#pp{max-width:600px;margin:0 auto;padding-bottom:40px}
.hdr{background:linear-gradient(135deg,var(--hdr) 0%,#F5EDDF 100%);border-bottom:2px solid var(--brd);padding:14px 20px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 24px var(--shad)}
body.dark .hdr{background:linear-gradient(135deg,#101120 0%,#14162C 100%)}
.hdr-row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.logo{font-family:'Fredoka One',cursive;font-size:23px;color:var(--grn);letter-spacing:.5px}
.tagline{font-size:11px;color:var(--txt3);margin-top:2px;font-weight:700;letter-spacing:.3px}
.hdr-right{display:flex;align-items:center;gap:8px}
.sync-chip{font-size:11px;color:var(--txt3);min-width:70px;text-align:right;font-weight:700}
.prof-btn{display:flex;align-items:center;gap:7px;padding:8px 14px;background:var(--sbg);border:2px solid var(--brd);border-radius:30px;cursor:pointer;font-size:14px;font-weight:800;color:var(--txt);position:relative;white-space:nowrap;max-width:170px;transition:all .2s}
.prof-btn:hover{border-color:var(--grn)}
.pdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.pname-t{overflow:hidden;text-overflow:ellipsis;max-width:100px}
.pmenu{position:absolute;top:calc(100% + 8px);right:0;background:var(--card);border:2px solid var(--brd);border-radius:22px;box-shadow:0 10px 40px var(--shad);z-index:200;min-width:190px;overflow:hidden}
.pmenu-item{padding:14px 18px;font-size:15px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--txt);border-bottom:1px solid var(--brd);font-weight:700;transition:background .15s}
.pmenu-item:last-child{border-bottom:none}
.pmenu-item:hover{background:var(--sbg)}
.pmenu-item.cur{font-weight:800;color:var(--grn)}
.nav{background:var(--hdr);border-bottom:2px solid var(--brd);display:flex;position:sticky;top:68px;z-index:99}
body.dark .nav{background:#101120}
.tab{flex:1;padding:10px 2px 9px;font-size:11px;color:var(--txt2);text-align:center;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1;transition:color .2s;font-weight:700}
.tab.on{color:var(--grn);border-bottom-color:var(--grn);font-weight:800}
.tab-ico{font-size:18px}
.sub-nav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.sub-tab{padding:9px 18px;border-radius:30px;font-size:14px;border:2px solid var(--brd);background:var(--sbg);color:var(--stxt);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .2s}
.sub-tab:hover{border-color:var(--grn)}
.sub-tab.on{background:var(--grn);color:#fff;border-color:var(--grn);font-weight:800}
.content{padding:18px}
.card{background:var(--card);border:1.5px solid var(--brd);border-radius:22px;padding:18px 20px;margin-bottom:14px;box-shadow:0 4px 22px var(--shad)}
.sechdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.sectitle{font-family:'Fredoka One',cursive;font-size:22px;color:var(--txt);letter-spacing:.3px}
.empty{text-align:center;padding:48px 20px;color:var(--txt2)}
.empty-t{font-family:'Fredoka One',cursive;font-size:20px;color:var(--txt);margin:12px 0 8px}
.dose-card{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:opacity .2s;box-shadow:0 4px 16px var(--shad)}
.done{opacity:.4}
.chkbtn{width:36px;height:36px;border-radius:50%;border:2.5px solid var(--ibrd);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;color:transparent;font-family:'Nunito',sans-serif;transition:all .2s}
.chkbtn.chk{background:var(--grn);border-color:var(--grn);color:#fff;box-shadow:0 4px 14px rgba(123,171,139,.4)}
.snz{font-size:12px;padding:5px 12px;border-radius:30px;border:2px solid var(--brd);background:var(--sbg);color:var(--stxt);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;transition:all .2s}
.snz:hover{border-color:var(--grn);color:var(--grn)}
.mbar{width:5px;border-radius:10px;align-self:stretch;flex-shrink:0;min-height:22px}
.tshdr{font-size:12px;font-weight:800;color:var(--txt2);margin:18px 0 10px;display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.9px}
.refill-box{background:var(--peach-l);border:1.5px solid #F0C8A0;border-radius:18px;padding:14px 16px;margin-top:14px}
body.dark .refill-box{background:#2A1A10;border-color:#5A3A20}
.prog-chip{font-size:13px;color:#5A8A6A;background:var(--grn-l);padding:7px 16px;border-radius:30px;font-weight:800;border:1.5px solid var(--grn-b)}
body.dark .prog-chip{color:var(--grn)}
.badge{font-size:12px;padding:4px 11px;border-radius:30px;display:inline-block;font-weight:800;border:1.5px solid transparent}
.bi{background:var(--blue-l);color:#5888A8;border-color:#C0D8EC}
.bg{background:var(--grn-l);color:#5A8A6A;border-color:var(--grn-b)}
.bs{background:var(--sbg);color:var(--stxt);border-color:var(--brd)}
body.dark .bi{background:var(--blue-l);color:var(--blue);border-color:#2A4060}
.fld{margin-bottom:16px}
.lbl{display:block;font-size:12px;font-weight:800;color:var(--txt2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;padding:12px 14px;border:2px solid var(--ibrd);border-radius:16px;font-size:15px;background:var(--ibg);color:var(--txt);font-family:'Nunito',sans-serif;font-weight:600;transition:border-color .2s}
.inp:focus{outline:none;border-color:var(--grn);box-shadow:0 0 0 4px var(--grn-l)}
select.inp{cursor:pointer}
textarea.inp{min-height:80px;resize:vertical}
.btnp{background:var(--grn);color:#fff;border:none;padding:12px 22px;border-radius:30px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;box-shadow:0 4px 16px rgba(123,171,139,.32);letter-spacing:.2px}
.btnp:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(123,171,139,.45)}
.btnp:active{transform:translateY(0)}
.btnp:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}
.btns{background:var(--sbg);color:var(--stxt);border:2px solid var(--brd);padding:12px 20px;border-radius:30px;font-size:15px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .2s}
.btns:hover{border-color:var(--grn);color:var(--grn)}
.btnd{background:var(--rose-l);color:#C85858;border:1.5px solid var(--rose-b);padding:8px 12px;border-radius:14px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
body.dark .btnd{background:#3a0e0e;color:#f48fb1;border-color:#804040}
.btng{background:var(--grn-l);color:#5A8A6A;border:2px solid var(--grn-b);padding:12px 20px;border-radius:30px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
.btng:hover{background:var(--grn);color:#fff}
body.dark .btng{color:var(--grn)}
.tt{padding:8px 14px;border-radius:30px;font-size:14px;border:2px solid var(--brd);background:var(--sbg);color:var(--stxt);cursor:pointer;font-family:'Nunito',sans-serif;margin:0 6px 7px 0;font-weight:700;transition:all .2s}
.tt:hover{border-color:var(--grn)}
.tt.on{background:var(--grn-l);color:#5A8A6A;border-color:var(--grn-b);font-weight:800}
body.dark .tt.on{color:var(--grn)}
.cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;display:inline-block;transition:all .2s;box-shadow:0 2px 8px var(--shad)}
.cdot.on{border-color:var(--txt)}
.selcard{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:2px solid var(--ibrd);border-radius:18px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:15px;text-align:left;margin-bottom:10px;width:100%;color:var(--txt);font-weight:700;transition:all .2s}
.selcard:hover{border-color:var(--grn)}
.selcard.on{border-color:var(--grn);background:var(--grn-l);color:#5A8A6A}
body.dark .selcard.on{background:var(--grn-l)}
.ai-box{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;padding:18px;margin-top:14px;font-size:15px;line-height:1.8;color:var(--txt);white-space:pre-wrap;box-shadow:0 4px 18px var(--shad)}
.disc{background:var(--peach-l);border:1.5px solid #F0D0B0;border-radius:16px;padding:12px 16px;font-size:13px;color:#8B5E3C;margin-bottom:16px;line-height:1.5;font-weight:700}
body.dark .disc{background:#2A1E10;border-color:#5A4020;color:#D4A060}
.chklbl{display:flex;align-items:center;gap:12px;font-size:15px;color:var(--txt);cursor:pointer;font-weight:700}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.sbox{border:2px solid var(--brd);border-radius:22px;padding:16px;min-height:110px}
.slbl{font-size:12px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;margin-bottom:2px}
.stime{font-size:12px;margin-bottom:12px;opacity:.75;font-weight:600}
.pitem{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.pdotm{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:3px}
.pname{font-size:14px;font-weight:800;color:var(--txt);line-height:1.3}
.psub{font-size:12px;color:var(--txt3);margin-top:1px;font-weight:600}
.tips{background:var(--lav-l);border:1.5px solid #D8CCF0;border-radius:20px;padding:16px}
body.dark .tips{background:var(--lav-l);border-color:#3A3060}
.tip{font-size:14px;color:#6A5A8A;line-height:1.75;padding:8px 0;border-bottom:1px solid #E0D4F8;font-weight:600}
body.dark .tip{color:#A090C0;border-color:#3A3060}
.tip:last-child{border-bottom:none}
.mood-row{display:flex;gap:8px;flex-wrap:wrap}
.mbtn{font-size:26px;padding:6px 9px;border:2.5px solid transparent;border-radius:14px;cursor:pointer;background:none;line-height:1;transition:all .2s}
.mbtn:hover{transform:scale(1.12)}
.mbtn.on{border-color:var(--grn);background:var(--grn-l);transform:scale(1.12)}
body.dark .mbtn.on{background:var(--grn-l)}
.sx-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.sx{padding:7px 14px;border-radius:30px;font-size:13px;border:2px solid var(--brd);background:var(--sbg);color:var(--stxt);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .2s}
.sx:hover{border-color:var(--rose)}
.sx.on{background:var(--rose-l);color:#C85858;border-color:var(--rose-b);font-weight:800}
body.dark .sx.on{background:#3a0e0e;color:#f48fb1}
.jcard{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;padding:16px 18px;margin-bottom:12px;box-shadow:0 4px 16px var(--shad)}
.jhdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.jdate{font-size:13px;color:var(--txt3);font-weight:800}
.jtext{font-size:15px;color:var(--txt);line-height:1.75;white-space:pre-wrap;font-weight:500}
.j-sx-badge{font-size:12px;padding:3px 10px;border-radius:30px;background:var(--rose-l);color:#C85858;border:1.5px solid var(--rose-b);display:inline-block;margin:2px;font-weight:800}
body.dark .j-sx-badge{background:#3a0e0e;color:#f48fb1}
.ins-card{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 4px 18px var(--shad)}
.ins-title{font-size:13px;font-weight:800;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px}
.heatmap{display:grid;grid-template-columns:repeat(14,1fr);gap:4px;margin-top:10px}
.hm-day{aspect-ratio:1;border-radius:5px}
.streak-num{font-family:'Fredoka One',cursive;font-size:48px;color:var(--grn);line-height:1}
.mood-trend{display:flex;gap:10px;align-items:flex-end;overflow-x:auto;padding-bottom:4px;margin-top:10px}
.mood-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.set-t{font-size:13px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.set-row{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1.5px solid var(--brd)}
.set-row:last-child{border-bottom:none}
.set-label{font-size:16px;font-weight:700;color:var(--txt)}
.set-desc{font-size:13px;color:var(--txt3);margin-top:3px;font-weight:600}
.toggle{width:50px;height:28px;border-radius:14px;background:var(--brd);cursor:pointer;position:relative;transition:background .25s;border:none;flex-shrink:0}
.toggle.on{background:var(--grn)}
.toggle::after{content:'';position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .25s;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.toggle.on::after{transform:translateX(22px)}
.srch-wrap{position:relative;margin-bottom:16px}
.srch-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:16px;pointer-events:none}
.srch{width:100%;padding:12px 16px 12px 42px;border:2px solid var(--ibrd);border-radius:30px;font-size:15px;background:var(--ibg);color:var(--txt);font-family:'Nunito',sans-serif;font-weight:600;transition:border-color .2s}
.srch:focus{outline:none;border-color:var(--grn)}
.exp-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.ct-card{background:var(--card);border:1.5px solid var(--brd);border-radius:18px;padding:15px 18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;box-shadow:0 3px 14px var(--shad)}
.scan-st{font-size:13px;color:var(--grn);margin-top:7px;min-height:20px;font-weight:800}
.chip-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.chip{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:30px;font-size:14px;border:2px solid var(--brd);background:var(--sbg);color:var(--stxt);font-weight:700}
.chip-del{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:17px;padding:0;line-height:1;transition:color .2s}
.chip-del:hover{color:#C85858}
.emerg-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#D06868,#B85050);color:#fff;border:none;border-radius:20px;padding:16px 20px;width:100%;font-size:16px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-bottom:16px;letter-spacing:.3px;box-shadow:0 6px 22px rgba(208,104,104,.3);transition:all .2s}
.emerg-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(208,104,104,.4)}

/* Night sky stars */
body.dark #pp::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(1.5px 1.5px at 12% 18%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 28% 8%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(2px 2px at 42% 22%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 58% 6%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 70% 15%,rgba(255,255,255,.65) 0%,transparent 100%),radial-gradient(1px 1px at 82% 9%,rgba(255,255,255,.45) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 91% 20%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 6% 35%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 95% 42%,rgba(255,255,255,.5) 0%,transparent 100%);}
/* Moonlit cards */
body.dark .card{box-shadow:0 4px 28px rgba(80,70,160,.20),0 1px 0 rgba(255,255,255,.04) inset;}
body.dark .dose-card{box-shadow:0 3px 18px rgba(60,50,130,.22),0 1px 0 rgba(255,255,255,.04) inset;}
body.dark .hdr{border-bottom-color:#1E2248;}
body.dark .nav{border-bottom-color:#1E2248;}
body.dark .btnp{box-shadow:0 4px 20px rgba(141,191,160,.22);}
body.dark .prog-chip{background:#0E2A1C;color:#8DBFA0;border-color:#1E5035;}
body.dark .refill-box{background:#1C1208;border-color:#5A3810;}
body.dark .tips{background:#100C20;border-color:#2A2450;}
body.dark .tip{color:#9890C0;border-color:#22204A;}
body.dark .disc{background:#1C1408;border-color:#5A4020;color:#C4A060;}
body.dark .ins-card{box-shadow:0 4px 22px rgba(60,50,130,.20);}
body.dark .jcard{box-shadow:0 3px 16px rgba(60,50,130,.18);}

/* ── New feature styles ── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px}
.week-day{background:var(--card);border:1.5px solid var(--brd);border-radius:14px;padding:8px 4px;text-align:center;min-height:80px}
.week-day.today{border-color:var(--grn);background:var(--grn-l)}
.week-day-lbl{font-size:11px;font-weight:800;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.week-day-date{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:6px}
.week-pill{width:10px;height:10px;border-radius:50%;display:inline-block;margin:1px}
.refill-days{font-size:12px;font-weight:800;padding:3px 10px;border-radius:20px;margin-left:6px}
.refill-ok{background:#e8f5ee;color:#1b7a4e}
.refill-warn{background:#fff8e1;color:#f57c00}
.refill-danger{background:#fde8e8;color:#c62828}
body.dark .refill-ok{background:#0e2a1c;color:#8dbfa0}
body.dark .refill-warn{background:#2a1c08;color:#d4a060}
body.dark .refill-danger{background:#2a0e0e;color:#f48fb1}
.appt-card{background:var(--card);border:1.5px solid var(--brd);border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 3px 14px var(--shad)}
.appt-date-box{background:var(--grn-l);border:1.5px solid var(--grn-b);border-radius:12px;padding:8px 12px;text-align:center;flex-shrink:0;min-width:52px}
.appt-month{font-size:11px;font-weight:800;color:var(--grn);text-transform:uppercase;letter-spacing:.5px}
.appt-day{font-size:22px;font-weight:800;color:var(--grn);line-height:1}
.sx-chart{margin-top:10px}
.sx-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sx-bar-lbl{font-size:13px;color:var(--txt);min-width:110px;font-weight:600}
.sx-bar-bg{flex:1;height:16px;background:var(--sbg);border-radius:8px;overflow:hidden}
.sx-bar-fill{height:100%;background:var(--rose);border-radius:8px;transition:width .4s}
.sx-bar-cnt{font-size:12px;font-weight:800;color:var(--txt2);min-width:24px;text-align:right}
.pill-photo{width:56px;height:56px;border-radius:12px;object-fit:cover;border:2px solid var(--brd);flex-shrink:0}
.late-chip{font-size:11px;padding:2px 8px;border-radius:20px;background:#fff8e1;color:#f57c00;border:1px solid #ffe082;font-weight:700;margin-left:6px}
body.dark .late-chip{background:#2a1c08;color:#d4a060;border-color:#5a4020}
.history-row{font-size:12px;color:var(--txt3);padding:4px 0;border-bottom:1px solid var(--brd);display:flex;gap:8px}
.history-row:last-child{border-bottom:none}
.expiry-warn{font-size:12px;color:#f57c00;font-weight:700}
.expiry-danger{font-size:12px;color:#c62828;font-weight:700}
#qr-box{display:flex;justify-content:center;margin:14px 0}
#qr-box canvas,#qr-box img{border-radius:10px;border:3px solid var(--brd)}

/* ── Wellness / Streaks / Goals ── */
.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.badge-item{background:var(--card);border:1.5px solid var(--brd);border-radius:16px;padding:12px 8px;text-align:center;box-shadow:0 3px 12px var(--shad)}
.badge-item.earned{border-color:#E8B818;background:linear-gradient(135deg,#FFF8E0,#FFF0A0)}
body.dark .badge-item.earned{background:linear-gradient(135deg,#2A2000,#1A1800);border-color:#8B7000}
.badge-ico{font-size:28px;margin-bottom:4px}
.badge-lbl{font-size:11px;font-weight:800;color:var(--txt2)}
.badge-item.earned .badge-lbl{color:#8B6000}
body.dark .badge-item.earned .badge-lbl{color:#D4A000}
.badge-item.locked{opacity:.45}
.water-track{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.water-drop{font-size:26px;cursor:pointer;transition:transform .15s;line-height:1}
.water-drop:active{transform:scale(.88)}
.water-drop.filled{filter:hue-rotate(0deg)}
.water-drop.empty{filter:grayscale(1);opacity:.35}
.goal-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1.5px solid var(--brd)}
.goal-row:last-child{border-bottom:none}
.goal-prog{flex:1;height:10px;background:var(--sbg);border-radius:5px;overflow:hidden}
.goal-prog-fill{height:100%;border-radius:5px;transition:width .4s}
.vitals-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.vital-card{background:var(--card);border:1.5px solid var(--brd);border-radius:16px;padding:14px;box-shadow:0 3px 12px var(--shad)}
.vital-val{font-size:28px;font-weight:800;color:var(--txt);line-height:1;margin:4px 0}
.vital-unit{font-size:12px;color:var(--txt3);font-weight:600}
.vital-trend{font-size:12px;margin-top:4px;font-weight:700}
.vital-trend.up{color:#e57373}
.vital-trend.down{color:#7BAB8B}
.vital-trend.same{color:var(--txt3)}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.photo-thumb{aspect-ratio:1;border-radius:12px;object-fit:cover;border:1.5px solid var(--brd);width:100%}
.photo-date{font-size:11px;color:var(--txt3);text-align:center;margin-top:3px;font-weight:600}
.miss-box{background:var(--sbg);border:1.5px solid var(--brd);border-radius:14px;padding:14px;margin-top:10px;font-size:14px;line-height:1.75;color:var(--txt);white-space:pre-wrap}
.quick-call-btn{display:flex;align-items:center;gap:12px;background:var(--grn-l);border:2px solid var(--grn-b);border-radius:16px;padding:14px 16px;cursor:pointer;font-family:'Nunito',sans-serif;width:100%;margin-bottom:10px;transition:all .2s;text-decoration:none}
.quick-call-btn:hover{background:var(--grn);border-color:var(--grn)}
.quick-call-btn:hover .qc-name,.quick-call-btn:hover .qc-role,.quick-call-btn:hover .qc-num{color:#fff}
.qc-name{font-size:15px;font-weight:800;color:var(--txt)}
.qc-role{font-size:12px;color:var(--txt2)}
.qc-num{font-size:16px;font-weight:800;color:var(--grn);margin-left:auto}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:2px;animation:confetti-fall 2.5s ease-in forwards}
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>

function ap(){return profiles.find(p=>p.id===activeId)||profiles[0]||{};}

// ===== CLOUD SYNC =====
function setSyncStatus(s){const el=document.getElementById('sync-chip');if(!el)return;const m={loading:'⏳ Loading…',saving:'🔄 Saving…',synced:'✓ Synced',error:'⚠️ Offline'};el.textContent=m[s]||'';}

async function loadCloud(){
  if(!currentUser)return;
  setSyncStatus('loading');
  try{
    const{data,error}=await sb.from('user_data').select('profiles,settings').eq('id',currentUser.id).single();
    if(error&&error.code!=='PGRST116')throw error;
    if(data&&data.profiles&&data.profiles.length){
      profiles=data.profiles;
      if(data.settings)settings={...settings,...data.settings};
    } else {
      // New user — migrate local data if any
      try{const r=localStorage.getItem('dd_profiles_v1');if(r)profiles=JSON.parse(r);}catch(e){}
      if(!profiles.length)profiles=[mkProf('My Profile')];
      await saveCloud();
    }
    if(!activeId||!profiles.find(p=>p.id===activeId))activeId=profiles[0]?.id;
    setSyncStatus('synced');
  }catch(e){setSyncStatus('error');tryLoadLocal();}
}

async function saveCloud(){
  if(!currentUser)return;
  try{
    await sb.from('user_data').upsert({id:currentUser.id,profiles,settings:{darkMode:settings.darkMode,notifSlots:settings.notifSlots,pin:settings.pin},updated_at:new Date().toISOString()},{onConflict:'id'});
    setSyncStatus('synced');
    // also cache locally
    try{localStorage.setItem('dd_profiles_v1',JSON.stringify(profiles));}catch(e){}
  }catch(e){setSyncStatus('error');}
}

function scheduleSave(){setSyncStatus('saving');clearTimeout(saveTimer);saveTimer=setTimeout(saveCloud,1500);}
function saveSet(){try{localStorage.setItem(SetK,JSON.stringify(settings));}catch(e){}scheduleSave();}

function tryLoadLocal(){
  try{const r=localStorage.getItem('dd_profiles_v1');if(r)profiles=JSON.parse(r);}catch(e){}
  try{const r=localStorage.getItem(SetK);if(r)settings={...settings,...JSON.parse(r)};}catch(e){}
  if(!profiles.length)profiles=[mkProf('My Profile')];
  if(!activeId||!profiles.find(p=>p.id===activeId))activeId=profiles[0]?.id;
}

let loginTab='in';
function setLoginTab(t){
  loginTab=t;
  document.getElementById('lt-in').classList.toggle('on',t==='in');
  document.getElementById('lt-up').classList.toggle('on',t==='up');
  document.getElementById('login-btn').textContent=t==='in'?'Sign in':'Create account';
  document.getElementById('login-pwd2-wrap').style.display=t==='up'?'block':'none';
  document.getElementById('forgot-wrap').style.display=t==='in'?'block':'none';
  document.getElementById('login-err').textContent='';
}
function setLoginErr(msg,ok=false){const el=document.getElementById('login-err');el.textContent=msg;el.className='login-err'+(ok?' ok':'');}
function setLoginLoading(on){document.getElementById('login-btn').disabled=on;document.getElementById('login-btn').textContent=on?'Please wait…':(loginTab==='in'?'Sign in':'Create account');}

async function doAuth(){
  const email=(document.getElementById('login-email').value||'').trim();
  const pwd=document.getElementById('login-pwd').value||'';
  if(!email||!pwd){setLoginErr('Please enter your email and password.');return;}
  setLoginLoading(true);setLoginErr('');
  if(loginTab==='in'){
    var signInResult;
    try{signInResult=await sb.auth.signInWithPassword({email,password:pwd});}
    catch(e){setLoginErr('Connection failed — check your internet and try again.');setLoginLoading(false);return;}
    const{error}=signInResult;
    if(error){setLoginErr(error.message==='Failed to fetch'?'Connection failed — check your internet connection.':error.message);setLoginLoading(false);}
  } else {
    const pwd2=document.getElementById('login-pwd2').value||'';
    if(pwd.length<6){setLoginErr('Password must be at least 6 characters.');setLoginLoading(false);return;}
    if(pwd!==pwd2){setLoginErr('Passwords do not match.');setLoginLoading(false);return;}
    const{error}=await sb.auth.signUp({email,password:pwd});
    setLoginLoading(false);
    if(error)setLoginErr(error.message);
    else setLoginErr('✅ Account created! Check your email to confirm, then sign in.',true);
  }
}
async function resetPwd(){
  const email=(document.getElementById('login-email').value||'').trim();
  if(!email){setLoginErr('Enter your email above first.');return;}
  const{error}=await sb.auth.resetPasswordForEmail(email);
  setLoginErr(error?error.message:'📧 Reset link sent! Check your email.',!error);
}
async function logout(){if(!confirm('Sign out?'))return;await sb.auth.signOut();}

function updateProfHdr(){const p=ap();const d=document.getElementById('prof-dot');const n=document.getElementById('prof-name');if(d)d.style.background=p.color||COLORS[0];if(n)n.textContent=p.name||'Profile';}
function togglePMenu(e){
  e.stopPropagation();
  const ex=document.getElementById('pmenu');if(ex){ex.remove();return;}
  const btn=document.getElementById('prof-btn');
  const menu=document.createElement('div');menu.id='pmenu';menu.className='pmenu';
  profiles.forEach(p=>{
    const item=document.createElement('div');item.className='pmenu-item'+(p.id===activeId?' cur':'');
    item.innerHTML=`<div style="width:11px;height:11px;border-radius:50%;background:${p.color};flex-shrink:0"></div><span style="flex:1">${esc(p.name)}</span>${p.id===activeId?'<span style="color:#1976d2">✓</span>':''}`;
    item.onclick=ev=>{ev.stopPropagation();switchProf(p.id);};
    menu.appendChild(item);
  });
  const add=document.createElement('div');add.className='pmenu-item';
  add.innerHTML='<span style="color:#1976d2;font-size:20px">+</span><span style="color:#1976d2;font-weight:700">Add profile</span>';
  add.onclick=ev=>{ev.stopPropagation();addProf();menu.remove();};
  menu.appendChild(add);
  btn.appendChild(menu);
  document.addEventListener('click',()=>menu.remove(),{once:true});
}
function switchProf(id){activeId=id;aiRes='';selIds='';medSearch='';document.getElementById('pmenu')?.remove();updateProfHdr();render();showToast(`Switched to ${ap().name}`);}
function addProf(){const name=prompt('Name for this profile (e.g. "Dad\'s Meds"):');if(!name?.trim())return;const np=mkProf(name.trim());profiles.push(np);activeId=np.id;scheduleSave();updateProfHdr();render();showToast(`Profile "${np.name}" created!`);}
function deleteProf(id){if(profiles.length<=1){alert("Can't delete the only profile.");return;}const p=profiles.find(x=>x.id===id);if(!confirm(`Delete "${p?.name}" and ALL their data?`))return;profiles=profiles.filter(x=>x.id!==id);if(activeId===id)activeId=profiles[0].id;scheduleSave();updateProfHdr();render();}

function goTo(v){view=v;if(v!=='add')editing=null;aiRes='';selIds=[];medSearch='';document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v===v||(v==='add'&&t.dataset.v==='meds')));render();window.scrollTo(0,0);}
function render(){document.getElementById('mc').innerHTML=view==='dashboard'?rDash():view==='meds'?rMeds():view==='add'?rForm():view==='insights'?rInsights():view==='journal'?rJournal():view==='tools'?rTools():view==='wellness'?rWellnessHub():rSettings();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){return new Date(iso).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function fmtTime(iso){return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}

// ===== EMERGENCY =====

    ${profiles.filter(x=>x.id!==p.id).map(x=>`<button onclick="showEmergency('${x.id}')" style="background:${x.color};color:#fff;border:none;padding:12px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">Switch: ${esc(x.name)}</button>`).join('')}

  </div>
  <div class="esec"><div class="esec-t" style="color:#c62828">⚠️ ALLERGIES</div>${p.allergies?.length?p.allergies.map(a=>`<span class="e-allergy">${esc(a)}</span>`).join(''):'<span style="color:var(--txt3);font-size:15px">No known allergies recorded</span>'}</div>
  <div class="esec"><div class="esec-t" style="color:#1565c0">🏥 MEDICAL CONDITIONS</div>${p.conditions?.length?p.conditions.map(c=>`<span class="e-cond">${esc(c)}</span>`).join(''):'<span style="color:var(--txt3);font-size:15px">None recorded</span>'}</div>

  h+=`</div><div class="esec"><div class="esec-t" style="color:#5e35b1">📞 CONTACTS</div>${(p.contacts||[]).length?(p.contacts||[]).map(c=>`<div style="margin-bottom:12px"><div style="font-size:17px;font-weight:700;color:var(--txt)">${esc(c.name)}</div>${c.role?`<div style="font-size:13px;color:var(--txt2)">${esc(c.role)}</div>`:''  }${c.phone?`<div style="font-size:17px;color:#1976d2;font-weight:700;margin-top:4px">📞 ${esc(c.phone)}</div>`:''}${c.address?`<div style="font-size:13px;color:var(--txt3)">${esc(c.address)}</div>`:''}</div>`).join(''):'<span style="color:var(--txt3);font-size:15px">No contacts recorded</span>'}
  </div><div style="text-align:center;font-size:13px;color:var(--txt3);margin-top:16px">The Daily Dose — General use only, not medical advice.</div></div>`;
  h+=`<div class="esec"><div class="esec-t" style="color:#7B5EA7">📱 QR CODE — Scan for emergency info</div>

function closeEmergency(){document.getElementById('emerg-overlay').classList.remove('show');}
function printEmergency(pid){

  <div class="top"><div style="font-size:12px;font-weight:700;letter-spacing:1px;opacity:.85;margin-bottom:6px">🆘 EMERGENCY MEDICAL INFORMATION</div><div style="font-size:26px;font-weight:700">${p.name}</div><div style="font-size:14px;opacity:.9;margin-top:4px">${p.dob?'DOB: '+p.dob+' | ':''}Blood type: ${p.bloodType||'Unknown'}</div><div style="font-size:11px;opacity:.7;margin-top:6px">Printed: ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div></div>
  <div class="sec"><div class="st" style="color:#c62828">⚠️ ALLERGIES</div>${p.allergies?.length?p.allergies.map(function(a){return '<span class="allergy">'+a+'</span>';}).join(''):'<em style="color:#aaa">No known allergies recorded</em>'}</div>
  <div class="sec"><div class="st" style="color:#1565c0">🏥 MEDICAL CONDITIONS</div>${p.conditions?.length?p.conditions.map(function(c){return '<span class="cond">'+c+'</span>';}).join(''):'<em style="color:#aaa">None recorded</em>'}</div>
  <div class="sec"><div class="st" style="color:#1b7a4e">💊 CURRENT MEDICATIONS</div><table>${rows||'<tr><td style="padding:8px;color:#aaa">No medications recorded</td></tr>'}</table></div>
  ${p.contacts?.length?`<div class="sec"><div class="st" style="color:#5e35b1">📞 CONTACTS</div>${p.contacts.map(c=>`<div style="margin-bottom:12px"><strong style="font-size:15px">${c.name}</strong>${c.role?' — '+c.role:''}${c.phone?`<div style="color:#1976d2;font-size:16px;font-weight:700">${c.phone}</div>`:''}${c.address?`<div style="font-size:13px;color:#666">${c.address}</div>`:''}</div>`).join('')}</div>`:''}
  <p style="text-align:center;font-size:11px;color:#aaa;margin-top:16px">The Daily Dose — General use only. Present to treating physicians.</p>
  <script>window.print();<\/script></body></html>`);pw.document.close();
}

// ===== DASHBOARD =====
function rDash(){
  const p=ap(),meds=p.meds||[],doses=p.doses||{};
  const today=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const total=meds.reduce((a,m)=>a+(m.times?.length||0),0),done=Object.values(doses).filter(Boolean).length;
  let h=`<button class="emerg-btn" onclick="showEmergency('${p.id}')">🆘 Emergency Medical Card</button>`;
  if(!meds.length)return h+`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:17px;font-weight:700;color:var(--txt)">${today}</span></div><div class="empty"><div style="font-size:52px">☀️</div><div class="empty-t">No medications yet</div><div style="font-size:15px">Head to "Meds" to add ${esc(p.name)}'s first medication.</div><button class="btnp" style="margin-top:18px" onclick="goTo('meds')">Get started</button></div>`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:17px;font-weight:700;color:var(--txt)">${today}</span>${total?`<span class="prog-chip">${done}/${total} done</span>`:''}</div>`;
  SLOTS.forEach(s=>{
    const sm=meds.filter(m=>m.times?.includes(s.id));if(!sm.length)return;
    h+=`<div class="tshdr">${s.icon} ${s.l} <span style="font-weight:400;color:var(--txt3);font-size:11px;text-transform:none;letter-spacing:0">${s.d}</span></div>`;
    sm.forEach(m=>{
      const k=`${m.id}-${s.id}`,dv=doses[k],chk=dv&&(dv===true||dv.taken),isLate=dv&&dv.late;
      h+=`<div class="dose-card${chk?' done':''}"><div class="mbar" style="background:${m.color||COLORS[0]}"></div>
        <div style="flex:1;min-width:0"><div style="font-size:17px;font-weight:700;color:var(--txt)">${esc(m.name)}</div>
        <div style="font-size:14px;color:var(--txt2);margin-top:3px">${esc(m.dosage||'')}${m.dosage&&m.frequency?' · ':''}${esc(m.frequency||'')}</div>
        ${m.withFood?'<div style="font-size:13px;color:var(--txt3);margin-top:3px">🍽️ Take with food</div>':''}${m.customReminder&&!chk?`<div style="font-size:12px;color:var(--grn);margin-top:2px">💬 ${esc(m.customReminder)}</div>`:''}</div>
        ${!chk?`<button class="snz" onclick="snooze('${esc(m.name)}','${s.l}')">💤 30m</button>`:''}${isLate?'<span class="late-chip">⏰ Late</span>':''}
        <button class="chkbtn${chk?' chk':''}" onclick="toggleDose('${k}')">${chk?'✓':''}</button>
      </div>`;
    });
  });
  const refill=meds.filter(m=>m.quantity!==''&&m.quantity!==undefined&&m.refillAt!==''&&m.refillAt!==undefined&&Number(m.quantity)<=Number(m.refillAt));
  if(refill.length)h+=`<div class="refill-box" style="margin-top:14px"><div style="font-size:14px;font-weight:700;color:#795548;margin-bottom:7px">🔔 Refill reminder</div>${refill.map(m=>`<div style="font-size:14px;color:#795548;margin-bottom:3px">💊 ${esc(m.name)} — ${esc(m.quantity)} remaining</div>`).join('')}</div>`;
  return h;
}
function toggleDose(k){
  const d={...(ap().doses||{})};
  const slot=k.split('-').slice(1).join('-');
  const slotHour=SLOT_HRS[slot]||12;
  const nowHour=new Date().getHours();
  const isLate=!d[k]&&Math.abs(nowHour-slotHour)>=2;
  d[k]=!d[k]?{taken:true,time:new Date().toISOString(),late:isLate}:null;
  upAP({doses:d});saveD();checkNewBadges();render();
}
function saveD(){const p=ap(),today=new Date().toDateString(),h={...(p.history||{})};h[today]={...(p.doses||{})};const keys=Object.keys(h).sort((a,b)=>new Date(b)-new Date(a));if(keys.length>90)keys.slice(90).forEach(k=>delete h[k]);upAP({history:h});}
function snooze(name,slot){setTimeout(()=>{if(settings.notif&&Notification.permission==='granted')new Notification('☀️ The Daily Dose',{body:`Snooze over! ${name} (${slot})`});else alert(`⏰ Snooze reminder: ${name} (${slot})!`);},30*60*1000);showToast(`💤 Reminder set for ${name} in 30 min`);}

// ===== MEDS =====
function rMeds(){
  const p=ap(),allMeds=p.meds||[],meds=allMeds.filter(m=>m.name.toLowerCase().includes(medSearch.toLowerCase()));
  let h=`<div class="sechdr"><span class="sectitle">Meds — ${esc(p.name)}</span><button class="btnp" onclick="startAdd()">+ Add new</button></div>
  <div class="srch-wrap"><span class="srch-ico">🔍</span><input class="srch" placeholder="Search medications..." value="${esc(medSearch)}" oninput="medSearch=this.value;render()"></div>`;
  if(allMeds.length)h+=`<div class="exp-row"><button class="btng" style="font-size:13px;padding:8px 14px" onclick="expCSV()">⬇️ CSV</button><button class="btns" style="font-size:13px;padding:8px 14px" onclick="copyText()">📋 Copy</button><button class="btns" style="font-size:13px;padding:8px 14px" onclick="printList()">🖨️ Print</button><button class="btns" style="font-size:13px;padding:8px 14px" onclick="expBackup()">💾 Backup</button></div>
  <button class="btnp" style="width:100%;padding:13px;font-size:15px;margin-bottom:14px" onclick="analyzeFullSchedule()">🧠 Analyze my full schedule</button>
  <div id="schedule-analysis-box"></div>`;
  if(!allMeds.length)return h+`<div class="empty"><div style="font-size:52px">🌿</div><div class="empty-t">Empty med cabinet</div><div style="font-size:15px">Tap "+ Add new" to get started!</div></div>`;
  if(!meds.length)return h+`<div class="empty"><div style="font-size:36px">🔍</div><div class="empty-t">No results for "${esc(medSearch)}"</div></div>`;
  meds.forEach(m=>{
    const ri=allMeds.indexOf(m),tl=m.times?.map(t=>SLOTS.find(s=>s.id===t)?.l).filter(Boolean)||[];
    const tc={prescription:'bi',supplement:'bg',otc:'bs'}[m.type]||'bs',tl2={prescription:'Rx',supplement:'Supplement',otc:'OTC'}[m.type]||m.type;
    // expiry check
    let expiryHtml='';
    if(m.expiryDate){
      const daysToExp=Math.ceil((new Date(m.expiryDate)-new Date())/(1000*60*60*24));
      if(daysToExp<=0)expiryHtml=`<span class="expiry-danger">⚠️ EXPIRED</span>`;
      else if(daysToExp<=30)expiryHtml=`<span class="expiry-warn">⏰ Expires in ${daysToExp}d</span>`;
    }
    // refill days
    const rd=calcRefillDays(m);
    const rdHtml=rd!==null?`<span class="refill-days ${rd<=0?'refill-danger':rd<=7?'refill-warn':'refill-ok'}">${rd<=0?'Out!':rd+'d left'}</span>`:'';
    // history toggle
    const histHtml=m.medHistory?.length?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--brd)"><div style="font-size:12px;font-weight:700;color:var(--txt3);margin-bottom:4px">📖 History</div>${m.medHistory.slice(-3).map(h=>`<div class="history-row"><span style="color:var(--grn)">${h.action}</span><span>${new Date(h.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span></div>`).join('')}</div>`:'';
    h+=`<div class="card" style="display:flex;gap:12px;align-items:flex-start">
      ${m.photo?`<img src="${m.photo}" class="pill-photo" alt="pill photo"/>`:`<div class="mbar" style="background:${m.color||COLORS[0]}"></div>`}
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div><div style="font-size:17px;font-weight:700;color:var(--txt)">${esc(m.name)}</div><div style="font-size:14px;color:var(--txt2);margin-top:3px">${m.medForm&&m.medForm!=='Tablet'?esc(m.medForm)+' · ':''}${esc(m.dosage||'')}${m.dosage&&m.frequency?' · ':''}${esc(m.frequency||'')}${rdHtml}</div>${expiryHtml}</div>
          <div style="display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
            <button class="btns" style="padding:5px 9px;font-size:13px" onclick="startEdit('${m.id}')">✏️</button>
            <button class="btns" style="padding:5px 9px;font-size:13px" onclick="dupMed('${m.id}')">📄</button>
            ${ri>0?`<button class="btns" style="padding:5px 9px;font-size:13px" onclick="moveMed('${m.id}',-1)">↑</button>`:''}
            ${ri<allMeds.length-1?`<button class="btns" style="padding:5px 9px;font-size:13px" onclick="moveMed('${m.id}',1)">↓</button>`:''}
            <button class="btnd" onclick="delMed('${m.id}')">🗑️</button>
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px"><span class="badge ${tc}">${tl2}</span>${m.withFood?'<span class="badge bs">🍽️ With food</span>':''}${m.quantity!==undefined&&m.quantity!==''?`<span class="badge bs">📦 ${esc(m.quantity)} left</span>`:''}${m.medForm&&m.medForm!=='Tablet'?`<span class="badge bs">${esc(m.medForm)}</span>`:''}${m.rxNumber?`<span class="badge bs">Rx# ${esc(m.rxNumber)}</span>`:''}${m.startDate?`<span class="badge bs">📅 Since ${new Date(m.startDate).toLocaleDateString('en-US',{month:'short',year:'numeric'})}</span>`:''}${tl.map(l=>`<span class="badge bg">🕐 ${l}</span>`).join('')}</div>
        ${m.notes?`<div style="font-size:14px;color:var(--txt3);margin-top:10px;padding-top:10px;border-top:1px solid var(--brd)">📝 ${esc(m.notes)}</div>`:''}
        ${histHtml}
      </div></div>`;
  });
  return h;
}
function startAdd(){editing={id:null,name:'',type:'prescription',dosage:'',frequency:'Once daily',times:['morning'],withFood:false,quantity:'',refillAt:'',notes:'',color:COLORS[0]};view='add';document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v==='meds'));render();}
function startEdit(id){editing={...(ap().meds||[]).find(m=>m.id===id)};view='add';document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v==='meds'));render();}
function dupMed(id){const m={...(ap().meds||[]).find(x=>x.id===id),id:'m'+Date.now(),name:(ap().meds||[]).find(x=>x.id===id).name+' (copy)'};upAP({meds:[...(ap().meds||[]),m]});showToast('📄 Duplicated!');}
function moveMed(id,dir){const ms=[...(ap().meds||[])],i=ms.findIndex(m=>m.id===id);if(i+dir<0||i+dir>=ms.length)return;[ms[i],ms[i+dir]]=[ms[i+dir],ms[i]];upAP({meds:ms});}
function delMed(id){const m=(ap().meds||[]).find(x=>x.id===id);if(confirm(`Remove "${m?.name}"?`)){upAP({meds:(ap().meds||[]).filter(x=>x.id!==id)});render();}}

      <div style="display:flex;gap:8px">
        <input class="inp" id="fn" placeholder="e.g. Vitamin D3, Metformin, Fish Oil..." value="${esc(m.name)}" style="flex:1">

function saveFrm(){

  editing.dosageAmount=(document.getElementById('fdamt')?.value||'').trim();
  editing.dosageUnit=document.getElementById('fdunit')?.value||'mg';
  const amt=editing.dosageAmount,unt=editing.dosageUnit;

  editing.frequency=document.getElementById('ff')?.value;

  else editing.medHistory=[...editing.medHistory,{date:new Date().toISOString(),action:'Updated'}];
  const ms=[...(ap().meds||[])];

    const others=ms.filter(m=>m.id!==editing.id).map(m=>m.name).join(', ');

async function handleMedPhoto(input){

function compressImg(file){return new Promise(res=>{const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{const cv=document.createElement('canvas'),r=Math.min(1024/img.width,1024/img.height,1);cv.width=img.width*r;cv.height=img.height*r;cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);res(cv.toDataURL('image/jpeg',.75).split(',')[1]);};img.src=e.target.result;};rd.readAsDataURL(file);});}

function rInsights(){
  const p=ap(),meds=p.meds||[],doses=p.doses||{},history=p.history||{};
  if(!meds.length)return`<div class="sectitle" style="margin-bottom:16px">📊 Insights — ${esc(p.name)}</div><div class="empty"><div style="font-size:52px">📊</div><div class="empty-t">No data yet</div><div style="font-size:15px">Add medications and check off doses to see insights here.</div></div>`;
  const total=meds.reduce((a,m)=>a+(m.times?.length||0),0);
  let streak=0;if(total>0){let d=new Date();d.setDate(d.getDate()-1);for(let i=0;i<90;i++){const ds=d.toDateString(),dh=history[ds];if(!dh)break;if(Object.values(dh).filter(Boolean).length<total)break;streak++;d.setDate(d.getDate()-1);}}
  const days28=[];for(let i=27;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days28.push(d);}
  const hm=days28.map(d=>{const ds=d.toDateString();if(ds===new Date().toDateString())return total?Math.round(Object.values(doses).filter(v=>v&&(v===true||v.taken)).length/total*100):null;const dh=history[ds];if(!dh||!total)return null;return Math.round(Object.values(dh).filter(Boolean).length/total*100);});

  const valid=hm.filter(v=>v!==null),avg=valid.length?Math.round(valid.reduce((a,b)=>a+b,0)/valid.length):0;

  </div>
  <div class="ins-card"><div class="ins-title">📅 28-Day Adherence</div><div class="heatmap">${buildHeatmap(hm,days28)}</div><div style="display:flex;gap:14px;margin-top:12px;font-size:12px;color:var(--txt3)"><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#1b7a4e;margin-right:5px"></span>80%+</span><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#f9a825;margin-right:5px"></span>50–79%</span><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:#e57373;margin-right:5px"></span>&lt;50%</span><span><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:var(--sbg);margin-right:5px"></span>No data</span></div></div>
  ${recentMoods.length?`<div class="ins-card"><div class="ins-title">😊 Mood Trend</div><div class="mood-trend">${buildMoodTrend(recentMoods)}</div></div>`:''}

function rInter(){

  let h=`<div class="sectitle" style="margin-bottom:12px">Interaction Checker</div><div class="disc">⚠️ General info only — not medical advice. Always consult your doctor or pharmacist.</div>`;
  if(!meds.length)return h+`<div class="empty">Add medications first.<br><br><button class="btnp" style="margin-top:12px" onclick="goTo('meds')">Add medications</button></div>`;
  h+=`<div style="font-size:15px;color:var(--txt2);margin-bottom:12px">Select 2 or more to check:</div>`;
  meds.forEach(m=>{const on=selIds.includes(m.id);h+=`<button class="selcard${on?' on':''}" onclick="togSel('${m.id}')"><div class="mbar" style="background:${m.color||COLORS[0]};border-radius:2px;align-self:stretch;width:5px;min-height:16px"></div><span style="font-weight:${on?700:400};font-size:15px">${esc(m.name)}</span><span style="color:var(--txt3);font-size:14px;margin-left:5px">${esc(m.dosage||'')}</span><span style="margin-left:auto;font-size:17px">${on?'✓':'○'}</span></button>`;});
  const ok=selIds.length>=2&&!aiOn;
  h+=`<button class="btnp" style="width:100%;margin-top:10px;padding:14px;font-size:16px" ${ok?'onclick="checkInter()"':'disabled'}>${aiOn?'⏳ Checking...':'🔍 Check '+selIds.length+' selected'}</button>`;
  if(selIds.length<2&&!aiOn)h+=`<div style="font-size:13px;color:var(--txt3);text-align:center;margin-top:8px">Select at least 2</div>`;
  if(aiRes)h+=`<div class="ai-box"><div style="font-size:14px;font-weight:700;color:var(--txt2);margin-bottom:10px">Results:</div>${esc(aiRes)}</div>`;
  return h;
}
function togSel(id){selIds=selIds.includes(id)?selIds.filter(x=>x!==id):[...selIds,id];render();}
async function checkInter(){const names=selIds.map(id=>{const m=(ap().meds||[]).find(x=>x.id===id);return m?`${m.name}${m.dosage?' ('+m.dosage+')':''}`:''}).filter(Boolean).join(', ');await callAI(`Check interactions between: ${names}\nExplain clearly in simple language. If none, say so. General info only, not medical advice.`);}
function rInfo(){return`<div class="sectitle" style="margin-bottom:12px">Drug & Supplement Info</div><div class="disc">ℹ️ General information only — not medical advice.</div><div class="fld"><label class="lbl" for="iq">Search medication or supplement</label><input class="inp" id="iq" placeholder="e.g. Vitamin D3, Metformin, Omega-3..." value="${esc(infoQ)}" oninput="infoQ=this.value" onkeydown="if(event.key==='Enter'&&infoQ.trim()&&!aiOn)lookupInfo()"></div><button class="btnp" style="width:100%;padding:14px;font-size:16px" ${infoQ.trim()&&!aiOn?'onclick="lookupInfo()"':'disabled'}>${aiOn?'⏳ Looking up...':'🔍 Look up info'}</button>${aiRes?`<div class="ai-box"><div style="font-size:14px;font-weight:700;color:var(--txt2);margin-bottom:10px">General information:</div>${esc(aiRes)}</div>`:''}`;}
async function lookupInfo(){const q=(document.getElementById('iq')?.value||infoQ).trim();if(!q||aiOn)return;infoQ=q;await callAI(`General info about: ${q}\nCover: what it's used for, dosage forms, timing/food, things to know, interactions to ask a doctor about. Warm tone. General info only.`);}

function addCond(){const v=(document.getElementById('new-cond')?.value||'').trim();if(!v)return;const c=[...(ap().conditions||[])];if(!c.includes(v)){c.push(v);upAP({conditions:c});}document.getElementById('new-cond').value='';render();}
function removeCond(c){upAP({conditions:(ap().conditions||[]).filter(x=>x!==c)});render();}
function toggleDark(){settings.darkMode=!settings.darkMode;document.body.classList.toggle('dark',settings.darkMode);saveSet();render();}

function expCSV(){const p=ap(),meds=p.meds||[];const hdr=['Name','Type','Dosage','Frequency','Times','With Food','Qty','Refill At','Notes'];const rows=meds.map(m=>[m.name,m.type,m.dosage||'',m.frequency||'',(m.times||[]).join('; '),m.withFood?'Yes':'No',m.quantity||'',m.refillAt||'',m.notes||'']);const csv=[hdr,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');dl(new Blob([csv],{type:'text/csv'}),`TheDailyDose_${p.name}_${new Date().toISOString().slice(0,10)}.csv`);}
function copyText(){const p=ap(),meds=p.meds||[];let txt=`THE DAILY DOSE — ${p.name.toUpperCase()}\nGenerated: ${new Date().toLocaleDateString()}\n${'='.repeat(40)}\n\n`;SLOTS.forEach(s=>{const sm=meds.filter(m=>m.times?.includes(s.id));if(!sm.length)return;txt+=`${s.icon} ${s.l.toUpperCase()}\n${'-'.repeat(26)}\n`;sm.forEach(m=>{txt+=`• ${m.name}`;if(m.dosage)txt+=` — ${m.dosage}`;if(m.frequency)txt+=` (${m.frequency})`;if(m.withFood)txt+=' [with food]';if(m.notes)txt+=`\n  Note: ${m.notes}`;txt+='\n';});txt+='\n';});navigator.clipboard.writeText(txt).then(()=>showToast('📋 Copied!')).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('📋 Copied!');});}
function printList(){const p=ap(),meds=p.meds||[];let rows='';SLOTS.forEach(s=>{const sm=meds.filter(m=>m.times?.includes(s.id));if(!sm.length)return;rows+=`<tr style="background:#f9f7f4"><td colspan="5" style="padding:8px 12px;font-weight:700">${s.icon} ${s.l}</td></tr>`;sm.forEach(m=>{rows+=`<tr><td style="padding:7px 12px">● ${m.name}</td><td>${{prescription:'Rx',supplement:'Supplement',otc:'OTC'}[m.type]||m.type}</td><td>${m.dosage||'—'}</td><td>${m.frequency||'—'}</td><td>${m.withFood?'Yes':'—'}</td></tr>`;});});const pw=window.open('','_blank');pw.document.write(`<!DOCTYPE html><html><head><title>${p.name} — Medication List</title><style>body{font-family:'Nunito',sans-serif;padding:24px;max-width:700px;font-size:14px}table{width:100%;border-collapse:collapse}td,th{border:1px solid #ddd;padding:7px 12px;text-align:left}th{background:#f5ede0;font-weight:700}@media print{button{display:none}}</style></head><body><h1 style="font-size:22px;margin-bottom:4px">☀️ The Daily Dose — ${p.name}</h1><p style="color:#888;font-size:13px;margin-bottom:20px">Generated ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</p><table><thead><tr><th>Name</th><th>Type</th><th>Dosage</th><th>Frequency</th><th>With Food</th></tr></thead><tbody>${rows}</tbody></table><p style="margin-top:20px;font-size:11px;color:#aaa">General use only, not medical advice.</p><script>window.print();<\/script></body></html>`);pw.document.close();}
function expBackup(){const data={version:4,exported:new Date().toISOString(),profiles,settings:{darkMode:settings.darkMode,notifSlots:settings.notifSlots,pin:settings.pin}};dl(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),`TheDailyDose_Backup_${new Date().toISOString().slice(0,10)}.json`);showToast('💾 Backup downloaded!');}
function impBackup(input){const file=input.files[0];if(!file)return;const rd=new FileReader();rd.onload=e=>{try{const data=JSON.parse(e.target.result);if(!data.profiles)throw new Error();if(!confirm(`Restore backup from ${new Date(data.exported||Date.now()).toLocaleDateString()}?\n\nThis will replace ALL current data.`))return;profiles=data.profiles;activeId=profiles[0]?.id;if(data.settings)settings={...settings,...data.settings};document.body.classList.toggle('dark',settings.darkMode);scheduleSave();updateProfHdr();render();showToast('✅ Backup restored!');}catch(e){alert('Could not restore — invalid backup file.');}};rd.readAsText(file);}
function expJournal(){const p=ap();let txt=`THE DAILY DOSE — ${p.name.toUpperCase()} JOURNAL\n${'='.repeat(44)}\n\n`;(p.journal||[]).forEach(e=>{txt+=`${fmtDate(e.date)} · ${fmtTime(e.date)}\nMood: ${e.mood||'😊'}`;if(e.sx&&e.sx.length)txt+=`\nSymptoms: ${e.sx.join(', ')}`;txt+=`\n\n${e.text}\n\n${'-'.repeat(32)}\n\n`;});dl(new Blob([txt],{type:'text/plain'}),`TheDailyDose_${p.name}_Journal_${new Date().toISOString().slice(0,10)}.txt`);}

function startNotifCheck(){setInterval(()=>{if(!settings.notif||Notification.permission!=='granted')return;const now=new Date(),today=now.toDateString(),h=now.getHours(),min=now.getMinutes();SLOTS.filter(s=>s.id!=='as_needed').forEach(s=>{if(!settings.notifSlots?.includes(s.id))return;const target=SLOT_HRS[s.id],key=`${today}-${s.id}`;if(h===target&&min<5&&!firedNotifs[key]){const meds=ap().meds||[],doses=ap().doses||{},undone=meds.filter(m=>m.times?.includes(s.id)&&!doses[`${m.id}-${s.id}`]);if(undone.length){firedNotifs[key]=true;new Notification('☀️ The Daily Dose',{body:`${s.icon} ${s.l} time! ${undone.map(m=>m.name).join(', ')}`});}}});},60000);}

// ===== REFILL COUNTDOWN =====
function calcRefillDays(m){
  if(!m.quantity||!m.frequency)return null;
  const qty=Number(m.quantity);if(!qty)return null;
  const dosesPerDay={
    'Once daily':1,'Twice daily':2,'Three times daily':3,
    'Every other day':0.5,'Weekly':1/7,'With meals':3,'As needed':null
  }[m.frequency];
  if(!dosesPerDay)return null;
  return Math.floor(qty/dosesPerDay);
}

// ===== WEEKLY VIEW =====
function rWeekView(){
  const p=ap(),meds=p.meds||[],doses=p.doses||{};
  const days=[];
  for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-d.getDay()+i);days.push(d);}
  let h=`<div class="week-grid">`;
  const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  days.forEach(d=>{
    const isToday=d.toDateString()===new Date().toDateString();
    const dots=meds.map(m=>{
      const slots=m.times||[];
      return slots.map(s=>{
        const k=`${m.id}-${s}`;
        const taken=isToday?(doses[k]&&(doses[k]===true||doses[k].taken)):false;
        return`<div class="week-pill" style="background:${taken?m.color||COLORS[0]:'var(--brd)'}"></div>`;
      }).join('');
    }).join('');
    h+=`<div class="week-day${isToday?' today':''}">
      <div class="week-day-lbl">${DAY_NAMES[d.getDay()]}</div>
      <div class="week-day-date">${d.getDate()}</div>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:2px">${dots}</div>
    </div>`;
  });
  h+=`</div>
  <div style="font-size:12px;color:var(--txt3);margin-bottom:10px">● = taken &nbsp; ○ = scheduled</div>`;
  return h;
}

function rAppointments(){
  const p=ap(),appts=(p.appointments||[]).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const upcoming=appts.filter(a=>!a.done&&new Date(a.date+'T'+a.time)>=new Date());
  const past=appts.filter(a=>a.done||new Date(a.date+'T'+a.time)<new Date());
  let h=`<div class="sectitle" style="margin-bottom:4px">📅 Appointments</div>
  <div style="font-size:15px;color:var(--txt2);margin-bottom:16px">Doctor visits and upcoming appointments</div>`;
  if(upcoming.length){
    h+=`<div style="font-size:12px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">Upcoming</div>`;
    upcoming.forEach(a=>{
      const d=new Date(a.date);
      h+=`<div class="appt-card">
        <div class="appt-date-box">
          <div class="appt-month">${d.toLocaleDateString('en-US',{month:'short'})}</div>
          <div class="appt-day">${d.getDate()}</div>
        </div>
        <div style="flex:1">
          <div style="font-size:16px;font-weight:700;color:var(--txt)">${esc(a.title)}</div>
          ${a.doctor?`<div style="font-size:14px;color:var(--txt2)">👨‍⚕️ ${esc(a.doctor)}</div>`:''}
          <div style="font-size:13px;color:var(--txt3)">🕐 ${a.time||'TBD'}</div>
          ${a.notes?`<div style="font-size:13px;color:var(--txt3);margin-top:4px">📝 ${esc(a.notes)}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <button class="btns" style="padding:5px 10px;font-size:12px" onclick="doneAppt('${a.id}')">✓ Done</button>
          <button class="btnd" onclick="delAppt('${a.id}')">🗑️</button>
        </div>
      </div>`;
    });
  }
  // Add form
  h+=`<div class="card" style="background:var(--sbg);border-style:dashed;margin-bottom:16px">
    <div class="lbl" style="margin-bottom:12px">Add appointment</div>

// ===== AUTO INTERACTION CHECK =====
async function autoInteractionCheck(newMed,others){
  showToast(`⚠️ Checking interactions for ${newMed}…`);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:'You are a medication safety assistant. Be brief and clear. General info only, not medical advice.',messages:[{role:'user',content:`Quick check: are there any notable interactions between ${newMed} and: ${others}? If yes, briefly state what. If none known, say "No known interactions found." Keep under 3 sentences.`}]})});
    const d=await r.json();
    const txt=d.content?.map(b=>b.text||'').join('')||'';
    if(txt.toLowerCase().includes('no known'))showToast(`✅ No known interactions with ${newMed}`);
    else if(txt){
      if(confirm(`⚠️ Possible interaction found for ${newMed}:\n\n${txt}\n\nOpen the Interactions checker for details?`))
        {toolTab='check';goTo('tools');}
    }
  }catch(e){console.log('Auto-check failed silently');}
}

const BADGES=[
  {id:'first',ico:'🌱',lbl:'First dose',desc:'Check off your first dose',check:p=>Object.values(p.history||{}).some(d=>Object.values(d).some(v=>v&&(v===true||v.taken)))},
  {id:'week',ico:'⭐',lbl:'7-day streak',desc:'7 days in a row',check:p=>calcStreak(p)>=7},
  {id:'fortnight',ico:'🌟',lbl:'2-week streak',desc:'14 days in a row',check:p=>calcStreak(p)>=14},
  {id:'month',ico:'🏆',lbl:'30-day streak',desc:'30 days in a row',check:p=>calcStreak(p)>=30},
  {id:'century',ico:'💎',lbl:'100 days',desc:'100-day streak',check:p=>calcStreak(p)>=100},
  {id:'journaler',ico:'📓',lbl:'Journaler',desc:'Write 10 journal entries',check:p=>(p.journal||[]).length>=10},
  {id:'goalset',ico:'🎯',lbl:'Goal setter',desc:'Set a wellness goal',check:p=>(p.goals||[]).length>=1},
  {id:'hydrated',ico:'💧',lbl:'Hydrated',desc:'Hit water goal 3 days',check:p=>checkWaterBadge(p)},
];

function calcStreak(p){
  const hist=p.history||{};
  const total=(p.meds||[]).reduce((a,m)=>a+(m.times?.length||0),0);
  if(!total)return 0;
  let streak=0,d=new Date();d.setDate(d.getDate()-1);
  for(let i=0;i<200;i++){
    const dh=hist[d.toDateString()];
    if(!dh)break;
    if(Object.values(dh).filter(v=>v&&(v===true||v.taken)).length<total)break;
    streak++;d.setDate(d.getDate()-1);
  }
  return streak;
}

function checkWaterBadge(p){
  const wh=p.waterHistory||{};
  const goal=(p.goals||[]).find(g=>g.type==='water');
  const target=goal?goal.target:8;
  return Object.values(wh).filter(v=>v>=target).length>=3;
}

  {id:'glucose',lbl:'Blood glucose',icon:'🩸',unit:'mg/dL',placeholder:'e.g. 95'},

function rVitals(){
  const p=ap(),vitals=p.vitals||[];
  const latest={};
  vitals.forEach(v=>{if(!latest[v.type]||new Date(v.date)>new Date(latest[v.type].date))latest[v.type]=v;});

  let h=`<div class="sectitle" style="margin-bottom:4px">🌡️ Vitals</div>
  <div style="font-size:15px;color:var(--txt2);margin-bottom:16px">Track blood pressure, glucose, weight and more</div>`;

  if(Object.keys(latest).length){
    h+=`<div class="vitals-grid">`;
    VITAL_TYPES.filter(vt=>latest[vt.id]).forEach(vt=>{
      const v=latest[vt.id];
      const prev=vitals.filter(x=>x.type===vt.id).slice(-2);
      let trend='same',trendTxt='';
      if(prev.length>=2){
        const diff=parseFloat(v.value)-parseFloat(prev[prev.length-2].value);
        if(!isNaN(diff)&&Math.abs(diff)>0.1){trend=diff>0?'up':'down';trendTxt=`${diff>0?'↑':'↓'} ${Math.abs(diff).toFixed(1)}${vt.unit}`;}
      }
      h+=`<div class="vital-card">

        <div class="vital-val">${esc(v.value)}</div>
        <div class="vital-unit">${vt.unit}</div>
        ${trendTxt?`<div class="vital-trend ${trend}">${trendTxt}</div>`:''}
        <div style="font-size:11px;color:var(--txt3);margin-top:4px">${new Date(v.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  h+=`<div class="card" style="background:var(--sbg);border-style:dashed;margin-bottom:14px">
    <div class="lbl" style="margin-bottom:12px">Log a reading</div>
    <select class="inp" id="vtype" style="margin-bottom:8px">
      ${buildVitalOpts()}
    </select>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input class="inp" id="vval" placeholder="Value" style="flex:1">
      <input class="inp" type="datetime-local" id="vdate" style="flex:1" value="${new Date().toISOString().slice(0,16)}">
    </div>
    <input class="inp" id="vnote" placeholder="Notes (optional)" style="margin-bottom:10px">
    <button class="btnp" style="width:100%;padding:12px" onclick="logVital()">+ Log reading</button>
  </div>`;

  // History log
  if(vitals.length){
    h+=`<div class="card"><div style="font-size:15px;font-weight:800;color:var(--txt);margin-bottom:12px">Recent readings</div>`;
    vitals.slice().reverse().slice(0,15).forEach(v=>{
      const vt=VITAL_TYPES.find(x=>x.id===v.type);
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--brd)">
        <span style="font-size:18px">${vt?.icon||'📊'}</span>
        <div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--txt)">${vt?.lbl||v.type} — <span style="color:var(--grn)">${esc(v.value)} ${vt?.unit||''}</span></div>${v.note?`<div style="font-size:12px;color:var(--txt3)">${esc(v.note)}</div>`:''}</div>
        <div style="font-size:12px;color:var(--txt3)">${new Date(v.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
        <button class="btnd" style="padding:4px 8px;font-size:11px" onclick="delVital('${v.id}')">✕</button>
      </div>`;
    });
    h+=`</div>`;
  }

  return h;
}

let suggestOn=false;
async function suggestTiming(){
  const name=(document.getElementById('fn')?.value||'').trim();
  if(!name){alert('Enter a medication or supplement name first.');return;}
  const box=document.getElementById('suggest-box');
  if(!box)return;
  box.innerHTML=`<div style="font-size:13px;color:var(--grn);font-weight:700;padding:8px 0">✨ Analyzing ${name}...</div>`;
  const others=(ap().meds||[]).filter(m=>m.name!==name).map(m=>`${m.name}${m.dosage?' ('+m.dosage+')':''}${m.times?.length?' – '+m.times.join('/'):''}${m.withFood?' – with food':''}`).join(', ');
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,
      system:'You are a friendly medication timing expert. Give practical, specific advice. Always note this is general information only, not medical advice. Respond ONLY in this exact JSON format with no other text: {"bestTime":"morning|afternoon|evening|night|as_needed","withFood":true|false,"reasoning":"1-2 sentence explanation why","tips":"1-2 practical tips","conflict":"any timing conflict with other meds, or empty string"}',
      messages:[{role:'user',content:`Best time to take: ${name}. Current medications the person also takes: ${others||'none'}. Provide timing recommendation.`}]})
    });
    const d=await r.json();
    const raw=d.content?.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    const info=JSON.parse(raw);

    // Map bestTime to SLOT id
    const timeMap={'morning':'morning','afternoon':'afternoon','evening':'evening','night':'night','as_needed':'as_needed'};
    const slotId=timeMap[info.bestTime]||'morning';
    const slotLabel={'morning':'🌅 Morning','afternoon':'☀️ Afternoon','evening':'🌆 Evening','night':'🌙 Night','as_needed':'⚡ As needed'}[slotId]||'🌅 Morning';

    box.innerHTML=`<div style="background:var(--grn-l);border:1.5px solid var(--grn-b);border-radius:14px;padding:14px;margin-top:4px">
      <div style="font-size:14px;font-weight:800;color:var(--grn);margin-bottom:8px">✨ Recommendation for ${esc(name)}</div>
      <div style="display:flex;gap:10px;margin-bottom:10px">
        <div style="background:var(--card);border:1.5px solid var(--grn-b);border-radius:10px;padding:8px 14px;font-size:14px;font-weight:700;color:var(--txt)">⏰ ${slotLabel}</div>
        <div style="background:var(--card);border:1.5px solid var(--grn-b);border-radius:10px;padding:8px 14px;font-size:14px;font-weight:700;color:var(--txt)">${info.withFood?'🍽️ With food':'💧 Without food'}</div>
      </div>
      <div style="font-size:14px;color:var(--txt);line-height:1.65;margin-bottom:8px">${esc(info.reasoning)}</div>
      ${info.tips?`<div style="font-size:13px;color:var(--txt2);line-height:1.65;margin-bottom:8px">💡 ${esc(info.tips)}</div>`:''}
      ${info.conflict?`<div style="font-size:13px;color:#C85858;font-weight:700;background:var(--rose-l);border:1px solid var(--rose-b);border-radius:8px;padding:8px 12px;margin-bottom:8px">⚠️ ${esc(info.conflict)}</div>`:''}
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btnp" style="font-size:13px;padding:8px 14px" onclick="applyTimingSuggestion('${slotId}',${info.withFood})">✅ Apply this suggestion</button>
        <div style="font-size:11px;color:var(--txt3);align-self:center;font-style:italic">General info only — not medical advice</div>
      </div>
    </div>`;
  }catch(e){
    box.innerHTML=`<div style="font-size:13px;color:var(--txt3);padding:8px 0">Could not get suggestion. Check your connection and try again.</div>`;
  }
}

function applyTimingSuggestion(slotId, withFood){
  // Set the time slot
  if(!editing.times)editing.times=[];
  if(!editing.times.includes(slotId))editing.times=[slotId];
  editing.withFood=withFood;
  // Update UI checkboxes
  document.querySelectorAll('.tt').forEach(el=>{
    el.classList.toggle('on',el.dataset.s===slotId);
  });
  const ff2=document.getElementById('ff2');
  if(ff2)ff2.checked=withFood;
  // Show confirmation
  const box=document.getElementById('suggest-box');
  if(box){
    const existing=box.querySelector('[style*="grn-l"]');
    if(existing){
      const confirm=document.createElement('div');
      confirm.style.cssText='font-size:13px;font-weight:800;color:var(--grn);margin-top:8px;padding:6px 10px;background:var(--grn-l);border-radius:8px';
      confirm.textContent='✅ Applied! Scroll down to review and save.';
      box.appendChild(confirm);
    }
  }
  showToast('✅ Timing suggestion applied!');
}
